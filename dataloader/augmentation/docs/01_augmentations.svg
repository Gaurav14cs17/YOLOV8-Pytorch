<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280">
  <defs>
    <linearGradient id="bgAug" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  <rect width="700" height="280" fill="url(#bgAug)"/>
  <text x="350" y="25" fill="#fff" font-family="Georgia, serif" font-size="18" text-anchor="middle" font-weight="bold">Data Augmentation Pipeline</text>
  
  <!-- augment_hsv -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="140" height="70" rx="8" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="70" y="20" fill="#ff6b6b" font-family="Consolas" font-size="10" text-anchor="middle" font-weight="bold">augment_hsv</text>
    <text x="70" y="40" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Hue shift</text>
    <text x="70" y="52" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Saturation scale</text>
    <text x="70" y="64" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Value scale</text>
  </g>
  
  <!-- random_perspective -->
  <g transform="translate(220, 50)">
    <rect x="0" y="0" width="140" height="70" rx="8" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="70" y="20" fill="#4ecdc4" font-family="Consolas" font-size="10" text-anchor="middle" font-weight="bold">perspective</text>
    <text x="70" y="40" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Rotation, Scale</text>
    <text x="70" y="52" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Shear, Translate</text>
    <text x="70" y="64" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Updates boxes</text>
  </g>
  
  <!-- mix_up -->
  <g transform="translate(390, 50)">
    <rect x="0" y="0" width="140" height="70" rx="8" fill="#252547" stroke="#ffd93d" stroke-width="2"/>
    <text x="70" y="20" fill="#ffd93d" font-family="Consolas" font-size="10" text-anchor="middle" font-weight="bold">mix_up</text>
    <text x="70" y="40" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Alpha blending</text>
    <text x="70" y="52" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Beta distribution</text>
    <text x="70" y="64" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Concat labels</text>
  </g>
  
  <!-- Albumentations -->
  <g transform="translate(530, 50)">
    <rect x="0" y="0" width="140" height="70" rx="8" fill="#252547" stroke="#9b59b6" stroke-width="2"/>
    <text x="70" y="20" fill="#9b59b6" font-family="Consolas" font-size="10" text-anchor="middle" font-weight="bold">Albumentations</text>
    <text x="70" y="40" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Blur, CLAHE</text>
    <text x="70" y="52" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">ToGray</text>
    <text x="70" y="64" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">MedianBlur</text>
  </g>
  
  <!-- Flow -->
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="620" height="100" rx="8" fill="#1a1a2e"/>
    <text x="310" y="20" fill="#fff" font-family="Consolas" font-size="11" text-anchor="middle" font-weight="bold">Augmentation Order</text>
    <text x="310" y="50" fill="#888" font-family="Consolas" font-size="9" text-anchor="middle">
      Mosaic → MixUp → Perspective → HSV → Albumentations → Flip
    </text>
    <text x="310" y="75" fill="#4ecdc4" font-family="Consolas" font-size="9" text-anchor="middle">
      All augmentations also update bounding box coordinates
    </text>
    <text x="310" y="92" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">
      Probabilities controlled by params dict (mosaic=0.5, mix_up=0.1, flip_lr=0.5)
    </text>
  </g>
</svg>

