<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280">
  <defs>
    <linearGradient id="bgDs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  <rect width="700" height="280" fill="url(#bgDs)"/>
  <text x="350" y="25" fill="#fff" font-family="Georgia, serif" font-size="18" text-anchor="middle" font-weight="bold">Dataset __getitem__ Flow</text>
  
  <!-- Flow -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="90" height="45" rx="4" fill="#ff6b6b"/>
    <text x="45" y="20" fill="#000" font-family="Consolas" font-size="9" text-anchor="middle">load_image</text>
    <text x="45" y="35" fill="#000" font-family="Consolas" font-size="8" text-anchor="middle">cv2.imread</text>
  </g>
  <text x="155" y="75" fill="#fff" font-size="14">→</text>
  <g transform="translate(170, 50)">
    <rect x="0" y="0" width="90" height="45" rx="4" fill="#4ecdc4"/>
    <text x="45" y="20" fill="#000" font-family="Consolas" font-size="9" text-anchor="middle">mosaic?</text>
    <text x="45" y="35" fill="#000" font-family="Consolas" font-size="8" text-anchor="middle">4 images</text>
  </g>
  <text x="275" y="75" fill="#fff" font-size="14">→</text>
  <g transform="translate(290, 50)">
    <rect x="0" y="0" width="90" height="45" rx="4" fill="#ffd93d"/>
    <text x="45" y="20" fill="#000" font-family="Consolas" font-size="9" text-anchor="middle">augment</text>
    <text x="45" y="35" fill="#000" font-family="Consolas" font-size="8" text-anchor="middle">transform</text>
  </g>
  <text x="395" y="75" fill="#fff" font-size="14">→</text>
  <g transform="translate(410, 50)">
    <rect x="0" y="0" width="90" height="45" rx="4" fill="#9b59b6"/>
    <text x="45" y="20" fill="#fff" font-family="Consolas" font-size="9" text-anchor="middle">to_tensor</text>
    <text x="45" y="35" fill="#fff" font-family="Consolas" font-size="8" text-anchor="middle">HWC to CHW</text>
  </g>
  <text x="515" y="75" fill="#fff" font-size="14">→</text>
  <g transform="translate(530, 50)">
    <rect x="0" y="0" width="90" height="45" rx="4" fill="#27ae60"/>
    <text x="45" y="20" fill="#fff" font-family="Consolas" font-size="9" text-anchor="middle">return</text>
    <text x="45" y="35" fill="#fff" font-family="Consolas" font-size="8" text-anchor="middle">(img, tgt, shp)</text>
  </g>
  
  <!-- Details -->
  <g transform="translate(50, 120)">
    <rect x="0" y="0" width="570" height="140" rx="8" fill="#1a1a2e"/>
    <text x="285" y="20" fill="#fff" font-family="Consolas" font-size="11" text-anchor="middle" font-weight="bold">Key Methods</text>
    <text x="20" y="45" fill="#ff6b6b" font-family="Consolas" font-size="9">_load_image(i):</text>
    <text x="140" y="45" fill="#888" font-family="Consolas" font-size="9">Load image, resize to fit input_size</text>
    <text x="20" y="65" fill="#4ecdc4" font-family="Consolas" font-size="9">_load_mosaic(index):</text>
    <text x="160" y="65" fill="#888" font-family="Consolas" font-size="9">Combine 4 images around random center</text>
    <text x="20" y="85" fill="#ffd93d" font-family="Consolas" font-size="9">load_label(filenames):</text>
    <text x="170" y="85" fill="#888" font-family="Consolas" font-size="9">Load and cache labels from .txt files</text>
    <text x="20" y="105" fill="#9b59b6" font-family="Consolas" font-size="9">collate_fn(batch):</text>
    <text x="150" y="105" fill="#888" font-family="Consolas" font-size="9">Stack images, concat targets with batch idx</text>
    <text x="20" y="130" fill="#ccc" font-family="Consolas" font-size="8">Labels cached to .cache file for faster subsequent runs</text>
  </g>
</svg>

