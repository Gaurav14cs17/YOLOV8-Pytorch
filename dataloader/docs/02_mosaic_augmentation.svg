<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgMosaic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgMosaic)"/>
  
  <!-- Title -->
  <text x="400" y="35" fill="#fff" font-family="Georgia, serif" font-size="24" text-anchor="middle" font-weight="bold">
    Mosaic Augmentation
  </text>
  
  <!-- 4 Input Images -->
  <g transform="translate(50, 60)">
    <text x="100" y="0" fill="#4ecdc4" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">
      4 Random Images
    </text>
    
    <rect x="0" y="15" width="90" height="70" rx="5" fill="#ff6b6b"/>
    <text x="45" y="55" fill="#000" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Image 1</text>
    
    <rect x="100" y="15" width="90" height="70" rx="5" fill="#4ecdc4"/>
    <text x="145" y="55" fill="#000" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Image 2</text>
    
    <rect x="0" y="95" width="90" height="70" rx="5" fill="#ffd93d"/>
    <text x="45" y="135" fill="#000" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Image 3</text>
    
    <rect x="100" y="95" width="90" height="70" rx="5" fill="#9b59b6"/>
    <text x="145" y="135" fill="#000" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Image 4</text>
  </g>
  
  <!-- Arrow -->
  <path d="M270,130 L330,130" stroke="#fff" stroke-width="2"/>
  <polygon points="330,125 350,130 330,135" fill="#fff"/>
  <text x="310" y="150" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Random</text>
  <text x="310" y="162" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Center</text>
  
  <!-- Mosaic Composition -->
  <g transform="translate(370, 60)">
    <text x="100" y="0" fill="#ffd93d" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">
      Mosaic (2x input size)
    </text>
    
    <rect x="0" y="15" width="200" height="160" rx="5" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
    
    <!-- Center point -->
    <circle cx="85" cy="90" r="5" fill="#fff"/>
    <text x="85" y="110" fill="#fff" font-family="Consolas, monospace" font-size="8" text-anchor="middle">(xc, yc)</text>
    
    <!-- Quadrants -->
    <rect x="5" y="20" width="75" height="65" rx="3" fill="#ff6b6b" opacity="0.7"/>
    <text x="42" y="55" fill="#fff" font-family="Consolas, monospace" font-size="9" text-anchor="middle">TL</text>
    
    <rect x="85" y="20" width="110" height="65" rx="3" fill="#4ecdc4" opacity="0.7"/>
    <text x="140" y="55" fill="#fff" font-family="Consolas, monospace" font-size="9" text-anchor="middle">TR</text>
    
    <rect x="5" y="90" width="75" height="80" rx="3" fill="#ffd93d" opacity="0.7"/>
    <text x="42" y="135" fill="#fff" font-family="Consolas, monospace" font-size="9" text-anchor="middle">BL</text>
    
    <rect x="85" y="90" width="110" height="80" rx="3" fill="#9b59b6" opacity="0.7"/>
    <text x="140" y="135" fill="#fff" font-family="Consolas, monospace" font-size="9" text-anchor="middle">BR</text>
    
    <text x="100" y="195" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      1280x1280 (2x640)
    </text>
  </g>
  
  <!-- Arrow -->
  <path d="M590,130 L650,130" stroke="#fff" stroke-width="2"/>
  <polygon points="650,125 670,130 650,135" fill="#fff"/>
  <text x="630" y="150" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Crop +</text>
  <text x="630" y="162" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Transform</text>
  
  <!-- Final Output -->
  <g transform="translate(690, 60)">
    <text x="50" y="0" fill="#ff6b6b" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">
      Output
    </text>
    
    <rect x="0" y="15" width="100" height="100" rx="5" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    
    <!-- Mixed content representation -->
    <rect x="5" y="20" width="40" height="40" rx="2" fill="#ff6b6b" opacity="0.5"/>
    <rect x="50" y="20" width="45" height="40" rx="2" fill="#4ecdc4" opacity="0.5"/>
    <rect x="5" y="65" width="40" height="45" rx="2" fill="#ffd93d" opacity="0.5"/>
    <rect x="50" y="65" width="45" height="45" rx="2" fill="#9b59b6" opacity="0.5"/>
    
    <text x="50" y="135" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      640x640
    </text>
  </g>
  
  <!-- Benefits Section -->
  <g transform="translate(50, 280)">
    <rect x="0" y="0" width="700" height="150" rx="10" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
    <text x="350" y="25" fill="#fff" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      Why Mosaic Augmentation?
    </text>
    
    <g transform="translate(20, 45)">
      <circle cx="0" cy="8" r="5" fill="#4ecdc4"/>
      <text x="15" y="12" fill="#ccc" font-family="Arial, sans-serif" font-size="11">
        Increases context: Single training sample contains 4 different images
      </text>
    </g>
    <g transform="translate(20, 70)">
      <circle cx="0" cy="8" r="5" fill="#ffd93d"/>
      <text x="15" y="12" fill="#ccc" font-family="Arial, sans-serif" font-size="11">
        Better small object detection: Objects appear at various scales and positions
      </text>
    </g>
    <g transform="translate(20, 95)">
      <circle cx="0" cy="8" r="5" fill="#ff6b6b"/>
      <text x="15" y="12" fill="#ccc" font-family="Arial, sans-serif" font-size="11">
        Reduced batch size needs: Effective batch size = 4x actual batch size
      </text>
    </g>
    <g transform="translate(20, 120)">
      <circle cx="0" cy="8" r="5" fill="#9b59b6"/>
      <text x="15" y="12" fill="#ccc" font-family="Arial, sans-serif" font-size="11">
        Natural regularization: Random cropping and placement prevents overfitting
      </text>
    </g>
  </g>
</svg>

