<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgCoords" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgCoords)"/>
  
  <!-- Title -->
  <text x="400" y="35" fill="#fff" font-family="Georgia, serif" font-size="24" text-anchor="middle" font-weight="bold">
    Bounding Box Coordinate Formats
  </text>
  
  <!-- YOLO Format (wh) -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="200" height="200" rx="10" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="100" y="25" fill="#4ecdc4" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      YOLO Format
    </text>
    <text x="100" y="45" fill="#888" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
      [cx, cy, w, h] normalized
    </text>
    
    <!-- Image boundary -->
    <rect x="20" y="60" width="160" height="120" fill="#1a1a2e" stroke="#666" stroke-width="1"/>
    
    <!-- Box -->
    <rect x="60" y="90" width="80" height="60" fill="none" stroke="#4ecdc4" stroke-width="2"/>
    
    <!-- Center point -->
    <circle cx="100" cy="120" r="4" fill="#ff6b6b"/>
    <text x="100" y="135" fill="#ff6b6b" font-family="Consolas, monospace" font-size="8" text-anchor="middle">(cx, cy)</text>
    
    <!-- Width arrow -->
    <line x1="60" y1="155" x2="140" y2="155" stroke="#ffd93d" stroke-width="1"/>
    <text x="100" y="168" fill="#ffd93d" font-family="Consolas, monospace" font-size="8" text-anchor="middle">w</text>
    
    <!-- Height arrow -->
    <line x1="145" y1="90" x2="145" y2="150" stroke="#ffd93d" stroke-width="1"/>
    <text x="155" y="120" fill="#ffd93d" font-family="Consolas, monospace" font-size="8" text-anchor="middle">h</text>
    
    <text x="100" y="195" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      Values in [0, 1]
    </text>
  </g>
  
  <!-- Arrow wh2xy -->
  <g transform="translate(270, 160)">
    <path d="M0,0 L60,0" stroke="#4ecdc4" stroke-width="2"/>
    <polygon points="60,-5 75,0 60,5" fill="#4ecdc4"/>
    <text x="37" y="-10" fill="#4ecdc4" font-family="Consolas, monospace" font-size="10" text-anchor="middle">wh2xy</text>
    
    <path d="M60,20 L0,20" stroke="#ffd93d" stroke-width="2"/>
    <polygon points="0,15 -15,20 0,25" fill="#ffd93d"/>
    <text x="37" y="35" fill="#ffd93d" font-family="Consolas, monospace" font-size="10" text-anchor="middle">xy2wh</text>
  </g>
  
  <!-- XY Format (absolute) -->
  <g transform="translate(370, 70)">
    <rect x="0" y="0" width="200" height="200" rx="10" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="100" y="25" fill="#ff6b6b" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      XY Format
    </text>
    <text x="100" y="45" fill="#888" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
      [x1, y1, x2, y2] absolute
    </text>
    
    <!-- Image boundary -->
    <rect x="20" y="60" width="160" height="120" fill="#1a1a2e" stroke="#666" stroke-width="1"/>
    
    <!-- Box -->
    <rect x="60" y="90" width="80" height="60" fill="none" stroke="#ff6b6b" stroke-width="2"/>
    
    <!-- Corner points -->
    <circle cx="60" cy="90" r="4" fill="#4ecdc4"/>
    <text x="45" y="85" fill="#4ecdc4" font-family="Consolas, monospace" font-size="8" text-anchor="middle">(x1,y1)</text>
    
    <circle cx="140" cy="150" r="4" fill="#ffd93d"/>
    <text x="155" y="165" fill="#ffd93d" font-family="Consolas, monospace" font-size="8" text-anchor="middle">(x2,y2)</text>
    
    <text x="100" y="195" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      Pixels (0 to W/H)
    </text>
  </g>
  
  <!-- Conversion formulas -->
  <g transform="translate(600, 70)">
    <rect x="0" y="0" width="180" height="200" rx="10" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
    <text x="90" y="25" fill="#fff" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">
      Conversion
    </text>
    
    <g transform="translate(10, 45)">
      <text x="0" y="0" fill="#4ecdc4" font-family="Consolas, monospace" font-size="9">wh2xy:</text>
      <text x="0" y="18" fill="#888" font-family="Consolas, monospace" font-size="8">x1 = (cx - w/2) * W</text>
      <text x="0" y="33" fill="#888" font-family="Consolas, monospace" font-size="8">y1 = (cy - h/2) * H</text>
      <text x="0" y="48" fill="#888" font-family="Consolas, monospace" font-size="8">x2 = (cx + w/2) * W</text>
      <text x="0" y="63" fill="#888" font-family="Consolas, monospace" font-size="8">y2 = (cy + h/2) * H</text>
    </g>
    
    <g transform="translate(10, 120)">
      <text x="0" y="0" fill="#ffd93d" font-family="Consolas, monospace" font-size="9">xy2wh:</text>
      <text x="0" y="18" fill="#888" font-family="Consolas, monospace" font-size="8">cx = (x1 + x2) / 2 / W</text>
      <text x="0" y="33" fill="#888" font-family="Consolas, monospace" font-size="8">cy = (y1 + y2) / 2 / H</text>
      <text x="0" y="48" fill="#888" font-family="Consolas, monospace" font-size="8">w = (x2 - x1) / W</text>
      <text x="0" y="63" fill="#888" font-family="Consolas, monospace" font-size="8">h = (y2 - y1) / H</text>
    </g>
  </g>
  
  <!-- Usage note -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="700" height="90" rx="10" fill="#252547"/>
    <text x="350" y="25" fill="#fff" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">
      When to Use Each Format
    </text>
    
    <g transform="translate(20, 45)">
      <circle cx="0" cy="8" r="5" fill="#4ecdc4"/>
      <text x="15" y="12" fill="#ccc" font-family="Arial, sans-serif" font-size="10">
        YOLO format (wh): Storage, label files, model output (normalized, scale-invariant)
      </text>
    </g>
    <g transform="translate(20, 70)">
      <circle cx="0" cy="8" r="5" fill="#ff6b6b"/>
      <text x="15" y="12" fill="#ccc" font-family="Arial, sans-serif" font-size="10">
        XY format: Augmentation, visualization, IoU calculation (absolute coordinates)
      </text>
    </g>
  </g>
</svg>

