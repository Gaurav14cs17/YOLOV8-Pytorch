<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450">
  <defs>
    <linearGradient id="bgDataloader" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="450" fill="url(#bgDataloader)"/>
  
  <!-- Title -->
  <text x="450" y="35" fill="#fff" font-family="Georgia, serif" font-size="24" text-anchor="middle" font-weight="bold">
    YOLO DataLoader Pipeline
  </text>
  
  <!-- Input -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="140" height="80" rx="10" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="70" y="30" fill="#ff6b6b" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">
      Images + Labels
    </text>
    <text x="70" y="50" fill="#888" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
      .jpg/.png
    </text>
    <text x="70" y="65" fill="#888" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
      .txt (YOLO format)
    </text>
  </g>
  
  <!-- Arrow -->
  <path d="M200,110 L240,110" stroke="#4ecdc4" stroke-width="2"/>
  <polygon points="240,105 255,110 240,115" fill="#4ecdc4"/>
  
  <!-- Dataset -->
  <g transform="translate(270, 60)">
    <rect x="0" y="0" width="160" height="100" rx="10" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="80" y="25" fill="#4ecdc4" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      Dataset
    </text>
    <text x="80" y="45" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      __getitem__
    </text>
    <text x="80" y="60" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      load_image
    </text>
    <text x="80" y="75" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      load_mosaic
    </text>
    <text x="80" y="90" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      collate_fn
    </text>
  </g>
  
  <!-- Arrow -->
  <path d="M440,110 L480,110" stroke="#4ecdc4" stroke-width="2"/>
  <polygon points="480,105 495,110 480,115" fill="#4ecdc4"/>
  
  <!-- Augmentation -->
  <g transform="translate(510, 60)">
    <rect x="0" y="0" width="160" height="100" rx="10" fill="#252547" stroke="#ffd93d" stroke-width="2"/>
    <text x="80" y="25" fill="#ffd93d" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      Augmentation
    </text>
    <text x="80" y="45" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      Mosaic
    </text>
    <text x="80" y="60" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      MixUp
    </text>
    <text x="80" y="75" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      HSV / Flip
    </text>
    <text x="80" y="90" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      Perspective
    </text>
  </g>
  
  <!-- Arrow -->
  <path d="M680,110 L720,110" stroke="#4ecdc4" stroke-width="2"/>
  <polygon points="720,105 735,110 720,115" fill="#4ecdc4"/>
  
  <!-- Output -->
  <g transform="translate(750, 70)">
    <rect x="0" y="0" width="120" height="80" rx="10" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="60" y="30" fill="#ff6b6b" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">
      Batched
    </text>
    <text x="60" y="50" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      [B, 3, 640, 640]
    </text>
    <text x="60" y="65" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      targets
    </text>
  </g>
  
  <!-- Package Structure -->
  <g transform="translate(50, 190)">
    <rect x="0" y="0" width="800" height="240" rx="10" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
    <text x="400" y="25" fill="#fff" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      Package Structure
    </text>
    
    <!-- Dataset module -->
    <g transform="translate(30, 45)">
      <rect x="0" y="0" width="220" height="80" rx="8" fill="#252547" stroke="#4ecdc4" stroke-width="1"/>
      <text x="110" y="20" fill="#4ecdc4" font-family="Consolas, monospace" font-size="11" text-anchor="middle" font-weight="bold">
        dataset/
      </text>
      <text x="110" y="40" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
        Dataset class
      </text>
      <text x="110" y="55" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
        Image/label loading
      </text>
      <text x="110" y="70" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
        Mosaic composition
      </text>
    </g>
    
    <!-- Transforms module -->
    <g transform="translate(280, 45)">
      <rect x="0" y="0" width="220" height="80" rx="8" fill="#252547" stroke="#ffd93d" stroke-width="1"/>
      <text x="110" y="20" fill="#ffd93d" font-family="Consolas, monospace" font-size="11" text-anchor="middle" font-weight="bold">
        transforms/
      </text>
      <text x="110" y="40" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
        wh2xy, xy2wh
      </text>
      <text x="110" y="55" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
        resize, resample
      </text>
      <text x="110" y="70" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
        Coordinate conversion
      </text>
    </g>
    
    <!-- Augmentation module -->
    <g transform="translate(530, 45)">
      <rect x="0" y="0" width="220" height="80" rx="8" fill="#252547" stroke="#ff6b6b" stroke-width="1"/>
      <text x="110" y="20" fill="#ff6b6b" font-family="Consolas, monospace" font-size="11" text-anchor="middle" font-weight="bold">
        augmentation/
      </text>
      <text x="110" y="40" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
        augment_hsv
      </text>
      <text x="110" y="55" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
        random_perspective
      </text>
      <text x="110" y="70" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
        mix_up, Albumentations
      </text>
    </g>
    
    <!-- Data flow description -->
    <g transform="translate(30, 145)">
      <text x="0" y="0" fill="#4ecdc4" font-family="Consolas, monospace" font-size="11">Data Flow:</text>
      <text x="0" y="20" fill="#888" font-family="Arial, sans-serif" font-size="10">
        1. Load image and labels from disk (Dataset._load_image, load_label)
      </text>
      <text x="0" y="38" fill="#888" font-family="Arial, sans-serif" font-size="10">
        2. Apply mosaic augmentation if enabled (4 images combined)
      </text>
      <text x="0" y="56" fill="#888" font-family="Arial, sans-serif" font-size="10">
        3. Apply geometric transforms (perspective, flip, scale)
      </text>
      <text x="0" y="74" fill="#888" font-family="Arial, sans-serif" font-size="10">
        4. Apply color transforms (HSV, albumentations)
      </text>
      <text x="0" y="92" fill="#888" font-family="Arial, sans-serif" font-size="10">
        5. Convert to tensor and batch (collate_fn)
      </text>
    </g>
  </g>
</svg>

