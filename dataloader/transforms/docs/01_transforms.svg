<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250">
  <defs>
    <linearGradient id="bgTr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  <rect width="700" height="250" fill="url(#bgTr)"/>
  <text x="350" y="25" fill="#fff" font-family="Georgia, serif" font-size="18" text-anchor="middle" font-weight="bold">Coordinate Transforms</text>
  
  <!-- wh2xy -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="280" height="80" rx="8" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="140" y="20" fill="#4ecdc4" font-family="Consolas" font-size="11" text-anchor="middle" font-weight="bold">wh2xy()</text>
    <text x="140" y="40" fill="#888" font-family="Consolas" font-size="9" text-anchor="middle">[cx, cy, w, h] normalized</text>
    <text x="140" y="55" fill="#fff" font-family="Consolas" font-size="10" text-anchor="middle">↓</text>
    <text x="140" y="70" fill="#ff6b6b" font-family="Consolas" font-size="9" text-anchor="middle">[x1, y1, x2, y2] absolute</text>
  </g>
  
  <!-- xy2wh -->
  <g transform="translate(370, 50)">
    <rect x="0" y="0" width="280" height="80" rx="8" fill="#252547" stroke="#ffd93d" stroke-width="2"/>
    <text x="140" y="20" fill="#ffd93d" font-family="Consolas" font-size="11" text-anchor="middle" font-weight="bold">xy2wh()</text>
    <text x="140" y="40" fill="#ff6b6b" font-family="Consolas" font-size="9" text-anchor="middle">[x1, y1, x2, y2] absolute</text>
    <text x="140" y="55" fill="#fff" font-family="Consolas" font-size="10" text-anchor="middle">↓</text>
    <text x="140" y="70" fill="#888" font-family="Consolas" font-size="9" text-anchor="middle">[cx, cy, w, h] normalized</text>
  </g>
  
  <!-- resize -->
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="280" height="80" rx="8" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="140" y="20" fill="#ff6b6b" font-family="Consolas" font-size="11" text-anchor="middle" font-weight="bold">resize()</text>
    <text x="140" y="40" fill="#888" font-family="Consolas" font-size="9" text-anchor="middle">Resize with letterboxing</text>
    <text x="140" y="55" fill="#888" font-family="Consolas" font-size="9" text-anchor="middle">Preserve aspect ratio</text>
    <text x="140" y="70" fill="#888" font-family="Consolas" font-size="9" text-anchor="middle">Returns: (img, ratio, pad)</text>
  </g>
  
  <!-- candidates -->
  <g transform="translate(370, 150)">
    <rect x="0" y="0" width="280" height="80" rx="8" fill="#252547" stroke="#9b59b6" stroke-width="2"/>
    <text x="140" y="20" fill="#9b59b6" font-family="Consolas" font-size="11" text-anchor="middle" font-weight="bold">candidates()</text>
    <text x="140" y="40" fill="#888" font-family="Consolas" font-size="9" text-anchor="middle">Filter valid boxes after transform</text>
    <text x="140" y="55" fill="#888" font-family="Consolas" font-size="9" text-anchor="middle">Check: size, aspect ratio, area</text>
    <text x="140" y="70" fill="#888" font-family="Consolas" font-size="9" text-anchor="middle">Returns: boolean mask</text>
  </g>
</svg>

