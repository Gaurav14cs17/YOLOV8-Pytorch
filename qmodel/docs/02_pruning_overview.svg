<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450">
  <defs>
    <linearGradient id="bgPrune" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="450" fill="url(#bgPrune)"/>
  
  <!-- Title -->
  <text x="450" y="35" fill="#fff" font-family="Georgia, serif" font-size="24" text-anchor="middle" font-weight="bold">
    YOLOv8 Weight Pruning
  </text>
  
  <!-- Before Pruning -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="250" height="150" rx="10" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="125" y="25" fill="#ff6b6b" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      Dense Weights
    </text>
    
    <!-- Weight grid (dense) -->
    <g transform="translate(25, 45)">
      <rect x="0" y="0" width="20" height="20" fill="#4ecdc4"/>
      <rect x="25" y="0" width="20" height="20" fill="#ff6b6b"/>
      <rect x="50" y="0" width="20" height="20" fill="#ffd93d"/>
      <rect x="75" y="0" width="20" height="20" fill="#4ecdc4"/>
      <rect x="100" y="0" width="20" height="20" fill="#ff6b6b"/>
      <rect x="125" y="0" width="20" height="20" fill="#ffd93d"/>
      <rect x="150" y="0" width="20" height="20" fill="#4ecdc4"/>
      <rect x="175" y="0" width="20" height="20" fill="#ff6b6b"/>
      
      <rect x="0" y="25" width="20" height="20" fill="#ffd93d"/>
      <rect x="25" y="25" width="20" height="20" fill="#4ecdc4"/>
      <rect x="50" y="25" width="20" height="20" fill="#ff6b6b"/>
      <rect x="75" y="25" width="20" height="20" fill="#ffd93d"/>
      <rect x="100" y="25" width="20" height="20" fill="#4ecdc4"/>
      <rect x="125" y="25" width="20" height="20" fill="#ff6b6b"/>
      <rect x="150" y="25" width="20" height="20" fill="#ffd93d"/>
      <rect x="175" y="25" width="20" height="20" fill="#4ecdc4"/>
      
      <rect x="0" y="50" width="20" height="20" fill="#ff6b6b"/>
      <rect x="25" y="50" width="20" height="20" fill="#ffd93d"/>
      <rect x="50" y="50" width="20" height="20" fill="#4ecdc4"/>
      <rect x="75" y="50" width="20" height="20" fill="#ff6b6b"/>
      <rect x="100" y="50" width="20" height="20" fill="#ffd93d"/>
      <rect x="125" y="50" width="20" height="20" fill="#4ecdc4"/>
      <rect x="150" y="50" width="20" height="20" fill="#ff6b6b"/>
      <rect x="175" y="50" width="20" height="20" fill="#ffd93d"/>
    </g>
    
    <text x="125" y="130" fill="#888" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
      All weights non-zero
    </text>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(320, 135)">
    <path d="M0,0 L80,0" stroke="#4ecdc4" stroke-width="3"/>
    <polygon points="80,-5 95,0 80,5" fill="#4ecdc4"/>
    <text x="40" y="-10" fill="#4ecdc4" font-family="Consolas, monospace" font-size="10" text-anchor="middle">L1 Prune</text>
    <text x="40" y="20" fill="#888" font-family="Consolas, monospace" font-size="8" text-anchor="middle">20%</text>
  </g>
  
  <!-- After Pruning -->
  <g transform="translate(430, 70)">
    <rect x="0" y="0" width="250" height="150" rx="10" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="125" y="25" fill="#4ecdc4" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      Sparse Weights
    </text>
    
    <!-- Weight grid (sparse - some zeros) -->
    <g transform="translate(25, 45)">
      <rect x="0" y="0" width="20" height="20" fill="#4ecdc4"/>
      <rect x="25" y="0" width="20" height="20" fill="#333"/>
      <rect x="50" y="0" width="20" height="20" fill="#ffd93d"/>
      <rect x="75" y="0" width="20" height="20" fill="#333"/>
      <rect x="100" y="0" width="20" height="20" fill="#ff6b6b"/>
      <rect x="125" y="0" width="20" height="20" fill="#ffd93d"/>
      <rect x="150" y="0" width="20" height="20" fill="#333"/>
      <rect x="175" y="0" width="20" height="20" fill="#ff6b6b"/>
      
      <rect x="0" y="25" width="20" height="20" fill="#333"/>
      <rect x="25" y="25" width="20" height="20" fill="#4ecdc4"/>
      <rect x="50" y="25" width="20" height="20" fill="#ff6b6b"/>
      <rect x="75" y="25" width="20" height="20" fill="#ffd93d"/>
      <rect x="100" y="25" width="20" height="20" fill="#333"/>
      <rect x="125" y="25" width="20" height="20" fill="#333"/>
      <rect x="150" y="25" width="20" height="20" fill="#ffd93d"/>
      <rect x="175" y="25" width="20" height="20" fill="#4ecdc4"/>
      
      <rect x="0" y="50" width="20" height="20" fill="#ff6b6b"/>
      <rect x="25" y="50" width="20" height="20" fill="#333"/>
      <rect x="50" y="50" width="20" height="20" fill="#4ecdc4"/>
      <rect x="75" y="50" width="20" height="20" fill="#333"/>
      <rect x="100" y="50" width="20" height="20" fill="#ffd93d"/>
      <rect x="125" y="50" width="20" height="20" fill="#4ecdc4"/>
      <rect x="150" y="50" width="20" height="20" fill="#ff6b6b"/>
      <rect x="175" y="50" width="20" height="20" fill="#333"/>
    </g>
    
    <text x="125" y="115" fill="#888" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
      20% weights = 0
    </text>
    <text x="125" y="130" fill="#4ecdc4" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      (dark = pruned)
    </text>
  </g>
  
  <!-- Compression ratio -->
  <g transform="translate(700, 70)">
    <rect x="0" y="0" width="180" height="150" rx="10" fill="#1a1a2e" stroke="#ffd93d" stroke-width="2"/>
    <text x="90" y="25" fill="#ffd93d" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">
      Compression
    </text>
    
    <text x="90" y="55" fill="#888" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
      Prune: 20%
    </text>
    <text x="90" y="75" fill="#888" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
      + Quantize: INT8
    </text>
    <line x1="20" y1="90" x2="160" y2="90" stroke="#666"/>
    <text x="90" y="115" fill="#4ecdc4" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">
      ~5x smaller
    </text>
    <text x="90" y="135" fill="#ff6b6b" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
      ~2-3x faster
    </text>
  </g>
  
  <!-- Pruning Methods -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="800" height="180" rx="10" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
    <text x="400" y="25" fill="#fff" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      Pruning Methods
    </text>
    
    <!-- L1 Unstructured -->
    <g transform="translate(30, 50)">
      <rect x="0" y="0" width="230" height="100" rx="5" fill="#252547" stroke="#ff6b6b" stroke-width="1"/>
      <text x="115" y="20" fill="#ff6b6b" font-family="Consolas, monospace" font-size="11" text-anchor="middle" font-weight="bold">
        L1 Unstructured
      </text>
      <text x="115" y="45" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
        Remove smallest |w| values
      </text>
      <text x="115" y="65" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
        Per-layer or global
      </text>
      <text x="115" y="85" fill="#4ecdc4" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
        Best accuracy retention
      </text>
    </g>
    
    <!-- Global Pruning -->
    <g transform="translate(280, 50)">
      <rect x="0" y="0" width="230" height="100" rx="5" fill="#252547" stroke="#4ecdc4" stroke-width="1"/>
      <text x="115" y="20" fill="#4ecdc4" font-family="Consolas, monospace" font-size="11" text-anchor="middle" font-weight="bold">
        Global Pruning
      </text>
      <text x="115" y="45" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
        Compare across all layers
      </text>
      <text x="115" y="65" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
        Uniform sparsity target
      </text>
      <text x="115" y="85" fill="#ffd93d" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
        More aggressive compression
      </text>
    </g>
    
    <!-- Structured Pruning -->
    <g transform="translate(530, 50)">
      <rect x="0" y="0" width="230" height="100" rx="5" fill="#252547" stroke="#ffd93d" stroke-width="1"/>
      <text x="115" y="20" fill="#ffd93d" font-family="Consolas, monospace" font-size="11" text-anchor="middle" font-weight="bold">
        Structured (Future)
      </text>
      <text x="115" y="45" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
        Remove entire channels
      </text>
      <text x="115" y="65" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
        Hardware-friendly
      </text>
      <text x="115" y="85" fill="#ff6b6b" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
        Real speedup (not just smaller)
      </text>
    </g>
  </g>
</svg>

