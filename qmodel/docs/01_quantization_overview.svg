<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450">
  <defs>
    <linearGradient id="bgQuant" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="450" fill="url(#bgQuant)"/>
  
  <!-- Title -->
  <text x="450" y="35" fill="#fff" font-family="Georgia, serif" font-size="24" text-anchor="middle" font-weight="bold">
    YOLOv8 Quantization
  </text>
  
  <!-- FP32 Model -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="200" height="120" rx="10" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="100" y="30" fill="#ff6b6b" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      FP32 Model
    </text>
    <text x="100" y="55" fill="#888" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
      32-bit floating point
    </text>
    <text x="100" y="75" fill="#888" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
      Weights: 4 bytes each
    </text>
    <text x="100" y="95" fill="#ff6b6b" font-family="Consolas, monospace" font-size="11" text-anchor="middle">
      ~25 MB (YOLOv8s)
    </text>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(270, 120)">
    <path d="M0,0 L100,0" stroke="#4ecdc4" stroke-width="3"/>
    <polygon points="100,-5 115,0 100,5" fill="#4ecdc4"/>
    <text x="50" y="-10" fill="#4ecdc4" font-family="Consolas, monospace" font-size="10" text-anchor="middle">QAT</text>
  </g>
  
  <!-- INT8 Model -->
  <g transform="translate(400, 70)">
    <rect x="0" y="0" width="200" height="120" rx="10" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="100" y="30" fill="#4ecdc4" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      INT8 Model
    </text>
    <text x="100" y="55" fill="#888" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
      8-bit integer
    </text>
    <text x="100" y="75" fill="#888" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
      Weights: 1 byte each
    </text>
    <text x="100" y="95" fill="#4ecdc4" font-family="Consolas, monospace" font-size="11" text-anchor="middle">
      ~6 MB (4x smaller)
    </text>
  </g>
  
  <!-- Benefits -->
  <g transform="translate(650, 70)">
    <rect x="0" y="0" width="200" height="120" rx="10" fill="#1a1a2e" stroke="#ffd93d" stroke-width="2"/>
    <text x="100" y="25" fill="#ffd93d" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">
      Benefits
    </text>
    <text x="100" y="50" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      4x smaller model
    </text>
    <text x="100" y="70" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      2-4x faster inference
    </text>
    <text x="100" y="90" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      Lower power usage
    </text>
    <text x="100" y="110" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      Edge deployment
    </text>
  </g>
  
  <!-- QAT Pipeline -->
  <g transform="translate(50, 220)">
    <rect x="0" y="0" width="800" height="200" rx="10" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
    <text x="400" y="25" fill="#fff" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      Quantization-Aware Training (QAT) Pipeline
    </text>
    
    <!-- Step 1 -->
    <g transform="translate(30, 50)">
      <rect x="0" y="0" width="140" height="70" rx="5" fill="#ff6b6b"/>
      <text x="70" y="25" fill="#000" font-family="Consolas, monospace" font-size="10" text-anchor="middle" font-weight="bold">1. QuantStub</text>
      <text x="70" y="45" fill="#000" font-family="Consolas, monospace" font-size="9" text-anchor="middle">FP32 to INT8</text>
      <text x="70" y="60" fill="#000" font-family="Consolas, monospace" font-size="8" text-anchor="middle">Input quantization</text>
    </g>
    
    <text x="185" y="90" fill="#fff" font-size="18">→</text>
    
    <!-- Step 2 -->
    <g transform="translate(200, 50)">
      <rect x="0" y="0" width="140" height="70" rx="5" fill="#4ecdc4"/>
      <text x="70" y="25" fill="#000" font-family="Consolas, monospace" font-size="10" text-anchor="middle" font-weight="bold">2. QNN Layers</text>
      <text x="70" y="45" fill="#000" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Fake quantization</text>
      <text x="70" y="60" fill="#000" font-family="Consolas, monospace" font-size="8" text-anchor="middle">Simulate INT8 ops</text>
    </g>
    
    <text x="355" y="90" fill="#fff" font-size="18">→</text>
    
    <!-- Step 3 -->
    <g transform="translate(370, 50)">
      <rect x="0" y="0" width="140" height="70" rx="5" fill="#ffd93d"/>
      <text x="70" y="25" fill="#000" font-family="Consolas, monospace" font-size="10" text-anchor="middle" font-weight="bold">3. FloatFunctional</text>
      <text x="70" y="45" fill="#000" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Add, Cat, Mul</text>
      <text x="70" y="60" fill="#000" font-family="Consolas, monospace" font-size="8" text-anchor="middle">Quantized ops</text>
    </g>
    
    <text x="525" y="90" fill="#fff" font-size="18">→</text>
    
    <!-- Step 4 -->
    <g transform="translate(540, 50)">
      <rect x="0" y="0" width="140" height="70" rx="5" fill="#9b59b6"/>
      <text x="70" y="25" fill="#fff" font-family="Consolas, monospace" font-size="10" text-anchor="middle" font-weight="bold">4. DeQuantStub</text>
      <text x="70" y="45" fill="#fff" font-family="Consolas, monospace" font-size="9" text-anchor="middle">INT8 to FP32</text>
      <text x="70" y="60" fill="#fff" font-family="Consolas, monospace" font-size="8" text-anchor="middle">Output dequant</text>
    </g>
    
    <!-- Key components -->
    <g transform="translate(30, 140)">
      <text x="0" y="0" fill="#4ecdc4" font-family="Consolas, monospace" font-size="11">Key Components:</text>
      <text x="0" y="20" fill="#888" font-family="Consolas, monospace" font-size="9">
        - Swish: Uses nnq.FloatFunctional.mul() for quantized sigmoid * x
      </text>
      <text x="0" y="38" fill="#888" font-family="Consolas, monospace" font-size="9">
        - ResidualBlock: Uses nnq.FloatFunctional.add() for skip connections
      </text>
      <text x="0" y="56" fill="#888" font-family="Consolas, monospace" font-size="9">
        - CSPBlock/FPN: Uses nnq.FloatFunctional.cat() for feature concatenation
      </text>
    </g>
  </g>
</svg>

