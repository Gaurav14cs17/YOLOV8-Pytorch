<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250">
  <defs>
    <linearGradient id="bgPr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  <rect width="700" height="250" fill="url(#bgPr)"/>
  <text x="350" y="25" fill="#fff" font-family="Georgia, serif" font-size="18" text-anchor="middle" font-weight="bold">Weight Pruning Methods</text>
  
  <!-- L1 Unstructured -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="190" height="80" rx="8" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="95" y="20" fill="#ff6b6b" font-family="Consolas" font-size="10" text-anchor="middle" font-weight="bold">L1 Unstructured</text>
    <text x="95" y="40" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Remove smallest |w| values</text>
    <text x="95" y="55" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Per-layer or global</text>
    <text x="95" y="70" fill="#4ecdc4" font-family="Consolas" font-size="8" text-anchor="middle">Best accuracy retention</text>
  </g>
  
  <!-- Global Pruning -->
  <g transform="translate(260, 50)">
    <rect x="0" y="0" width="190" height="80" rx="8" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="95" y="20" fill="#4ecdc4" font-family="Consolas" font-size="10" text-anchor="middle" font-weight="bold">Global Pruning</text>
    <text x="95" y="40" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Compare across all layers</text>
    <text x="95" y="55" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Uniform sparsity target</text>
    <text x="95" y="70" fill="#ffd93d" font-family="Consolas" font-size="8" text-anchor="middle">More aggressive</text>
  </g>
  
  <!-- Structured -->
  <g transform="translate(470, 50)">
    <rect x="0" y="0" width="190" height="80" rx="8" fill="#252547" stroke="#ffd93d" stroke-width="2"/>
    <text x="95" y="20" fill="#ffd93d" font-family="Consolas" font-size="10" text-anchor="middle" font-weight="bold">Structured (Future)</text>
    <text x="95" y="40" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Remove entire channels</text>
    <text x="95" y="55" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Hardware-friendly</text>
    <text x="95" y="70" fill="#ff6b6b" font-family="Consolas" font-size="8" text-anchor="middle">Real speedup</text>
  </g>
  
  <!-- Config -->
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="610" height="80" rx="8" fill="#1a1a2e"/>
    <text x="305" y="20" fill="#fff" font-family="Consolas" font-size="10" text-anchor="middle" font-weight="bold">Pruning Configuration</text>
    <text x="20" y="45" fill="#888" font-family="Consolas" font-size="9">pruning_cfg = {</text>
    <text x="40" y="60" fill="#4ecdc4" font-family="Consolas" font-size="9">'prune_conv': True, 'amount': 0.2, 'global_prune': True</text>
    <text x="20" y="75" fill="#888" font-family="Consolas" font-size="9">}</text>
  </g>
</svg>

