<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <defs>
    <linearGradient id="bgLoss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="600" fill="url(#bgLoss)"/>
  
  <!-- Title -->
  <text x="500" y="40" fill="#fff" font-family="Georgia, serif" font-size="26" text-anchor="middle" font-weight="bold">
    YOLOv8 Loss Function Overview
  </text>
  
  <!-- Total Loss Formula -->
  <g transform="translate(200, 70)">
    <rect x="0" y="0" width="600" height="60" rx="10" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="300" y="38" fill="#fff" font-family="Georgia, serif" font-size="22" text-anchor="middle">
      L = L_cls + L_box + L_dfl
    </text>
  </g>
  
  <!-- Three Loss Components -->
  <!-- Classification Loss -->
  <g transform="translate(50, 160)">
    <rect x="0" y="0" width="280" height="200" rx="15" fill="#252547" stroke="#ff6b6b" stroke-width="3"/>
    <text x="140" y="35" fill="#ff6b6b" font-family="Consolas, monospace" font-size="18" text-anchor="middle" font-weight="bold">
      Classification Loss
    </text>
    
    <rect x="20" y="55" width="240" height="50" rx="8" fill="#1a1a2e"/>
    <text x="140" y="85" fill="#fff" font-family="Georgia, serif" font-size="14" text-anchor="middle">
      BCE with Logits
    </text>
    
    <text x="140" y="125" fill="#ccc" font-family="Consolas, monospace" font-size="11" text-anchor="middle">
      loss_cls = BCE(pred, target)
    </text>
    <text x="140" y="145" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      Binary Cross Entropy
    </text>
    <text x="140" y="165" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      for multi-label classification
    </text>
    
    <text x="140" y="190" fill="#ff6b6b" font-family="Consolas, monospace" font-size="12" text-anchor="middle">
      weight: cls=0.5
    </text>
  </g>
  
  <!-- Box Loss -->
  <g transform="translate(360, 160)">
    <rect x="0" y="0" width="280" height="200" rx="15" fill="#252547" stroke="#4ecdc4" stroke-width="3"/>
    <text x="140" y="35" fill="#4ecdc4" font-family="Consolas, monospace" font-size="18" text-anchor="middle" font-weight="bold">
      Box Regression Loss
    </text>
    
    <rect x="20" y="55" width="240" height="50" rx="8" fill="#1a1a2e"/>
    <text x="140" y="85" fill="#fff" font-family="Georgia, serif" font-size="14" text-anchor="middle">
      Complete IoU (CIoU)
    </text>
    
    <text x="140" y="125" fill="#ccc" font-family="Consolas, monospace" font-size="11" text-anchor="middle">
      loss_box = 1 - CIoU
    </text>
    <text x="140" y="145" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      Considers overlap, distance,
    </text>
    <text x="140" y="165" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      and aspect ratio
    </text>
    
    <text x="140" y="190" fill="#4ecdc4" font-family="Consolas, monospace" font-size="12" text-anchor="middle">
      weight: box=7.5
    </text>
  </g>
  
  <!-- DFL Loss -->
  <g transform="translate(670, 160)">
    <rect x="0" y="0" width="280" height="200" rx="15" fill="#252547" stroke="#ffd93d" stroke-width="3"/>
    <text x="140" y="35" fill="#ffd93d" font-family="Consolas, monospace" font-size="18" text-anchor="middle" font-weight="bold">
      Distribution Focal Loss
    </text>
    
    <rect x="20" y="55" width="240" height="50" rx="8" fill="#1a1a2e"/>
    <text x="140" y="85" fill="#fff" font-family="Georgia, serif" font-size="14" text-anchor="middle">
      DFL (Generalized)
    </text>
    
    <text x="140" y="125" fill="#ccc" font-family="Consolas, monospace" font-size="11" text-anchor="middle">
      loss_dfl = CE(pred, target)
    </text>
    <text x="140" y="145" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      Distributes bbox regression
    </text>
    <text x="140" y="165" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      across discrete bins
    </text>
    
    <text x="140" y="190" fill="#ffd93d" font-family="Consolas, monospace" font-size="12" text-anchor="middle">
      weight: dfl=1.5
    </text>
  </g>
  
  <!-- Pipeline Flow -->
  <g transform="translate(50, 390)">
    <rect x="0" y="0" width="900" height="190" rx="10" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
    <text x="450" y="30" fill="#fff" font-family="Consolas, monospace" font-size="16" text-anchor="middle" font-weight="bold">
      Loss Computation Pipeline
    </text>
    
    <!-- Step 1 -->
    <g transform="translate(20, 50)">
      <rect x="0" y="0" width="140" height="60" rx="8" fill="#252547" stroke="#ff6b6b" stroke-width="1"/>
      <text x="70" y="25" fill="#ff6b6b" font-family="Consolas, monospace" font-size="10" text-anchor="middle">1. Decode</text>
      <text x="70" y="42" fill="#ccc" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Predictions</text>
      <text x="70" y="55" fill="#888" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">[B, 4+nc, 8400]</text>
    </g>
    
    <!-- Arrow -->
    <path d="M170,80 L200,80" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Step 2 -->
    <g transform="translate(210, 50)">
      <rect x="0" y="0" width="140" height="60" rx="8" fill="#252547" stroke="#4ecdc4" stroke-width="1"/>
      <text x="70" y="25" fill="#4ecdc4" font-family="Consolas, monospace" font-size="10" text-anchor="middle">2. Make</text>
      <text x="70" y="42" fill="#ccc" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Anchors</text>
      <text x="70" y="55" fill="#888" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">[8400, 2]</text>
    </g>
    
    <!-- Arrow -->
    <path d="M360,80 L390,80" stroke="#666" stroke-width="2"/>
    
    <!-- Step 3 -->
    <g transform="translate(400, 50)">
      <rect x="0" y="0" width="140" height="60" rx="8" fill="#252547" stroke="#ffd93d" stroke-width="1"/>
      <text x="70" y="25" fill="#ffd93d" font-family="Consolas, monospace" font-size="10" text-anchor="middle">3. Assign</text>
      <text x="70" y="42" fill="#ccc" font-family="Consolas, monospace" font-size="9" text-anchor="middle">TAL Matcher</text>
      <text x="70" y="55" fill="#888" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">fg_mask, targets</text>
    </g>
    
    <!-- Arrow -->
    <path d="M550,80 L580,80" stroke="#666" stroke-width="2"/>
    
    <!-- Step 4 -->
    <g transform="translate(590, 50)">
      <rect x="0" y="0" width="140" height="60" rx="8" fill="#252547" stroke="#ff6b6b" stroke-width="1"/>
      <text x="70" y="25" fill="#ff6b6b" font-family="Consolas, monospace" font-size="10" text-anchor="middle">4. Compute</text>
      <text x="70" y="42" fill="#ccc" font-family="Consolas, monospace" font-size="9" text-anchor="middle">All Losses</text>
      <text x="70" y="55" fill="#888" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">cls + box + dfl</text>
    </g>
    
    <!-- Arrow -->
    <path d="M740,80 L770,80" stroke="#666" stroke-width="2"/>
    
    <!-- Step 5 -->
    <g transform="translate(780, 50)">
      <rect x="0" y="0" width="100" height="60" rx="8" fill="#4ecdc4" stroke="#4ecdc4" stroke-width="1"/>
      <text x="50" y="25" fill="#000" font-family="Consolas, monospace" font-size="10" text-anchor="middle">5. Total</text>
      <text x="50" y="42" fill="#000" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Loss</text>
      <text x="50" y="55" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">backprop</text>
    </g>
    
    <!-- Key formula at bottom -->
    <text x="450" y="145" fill="#ccc" font-family="Consolas, monospace" font-size="12" text-anchor="middle">
      Total = 0.5 * L_cls + 7.5 * L_box + 1.5 * L_dfl
    </text>
    <text x="450" y="170" fill="#888" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">
      All losses normalized by target_scores_sum for balanced training
    </text>
  </g>
</svg>

