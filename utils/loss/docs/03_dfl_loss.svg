<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <defs>
    <linearGradient id="bgDFL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="600" fill="url(#bgDFL)"/>
  
  <!-- Title -->
  <text x="500" y="35" fill="#fff" font-family="Georgia, serif" font-size="26" text-anchor="middle" font-weight="bold">
    Distribution Focal Loss (DFL)
  </text>
  <text x="500" y="60" fill="#888" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">
    Generalized Focal Loss V2: Learning Reliable Localization Quality Estimation (CVPR 2021)
  </text>
  
  <!-- Traditional vs DFL Comparison -->
  <g transform="translate(50, 90)">
    <!-- Traditional Regression -->
    <g>
      <rect x="0" y="0" width="420" height="200" rx="15" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
      <text x="210" y="30" fill="#ff6b6b" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
        Traditional: Direct Regression
      </text>
      
      <g transform="translate(30, 50)">
        <!-- Single value output -->
        <rect x="0" y="0" width="80" height="40" fill="#ff6b6b" rx="5"/>
        <text x="40" y="25" fill="#fff" font-family="Consolas, monospace" font-size="12" text-anchor="middle">pred</text>
        
        <text x="100" y="25" fill="#fff" font-size="20">=</text>
        
        <rect x="120" y="0" width="80" height="40" fill="#4ecdc4" rx="5"/>
        <text x="160" y="25" fill="#fff" font-family="Consolas, monospace" font-size="12" text-anchor="middle">3.7</text>
        
        <text x="210" y="80" fill="#888" font-family="Arial, sans-serif" font-size="11">
          Single scalar value
        </text>
        <text x="210" y="100" fill="#888" font-family="Arial, sans-serif" font-size="11">
          Cannot express uncertainty
        </text>
      </g>
      
      <!-- Problem illustration -->
      <g transform="translate(30, 140)">
        <line x1="0" y1="20" x2="350" y2="20" stroke="#666" stroke-width="2"/>
        <circle cx="120" cy="20" r="8" fill="#ff6b6b"/>
        <text x="120" y="45" fill="#ff6b6b" font-family="Consolas, monospace" font-size="10" text-anchor="middle">target</text>
        <circle cx="140" cy="20" r="6" fill="#4ecdc4"/>
        <text x="140" y="8" fill="#4ecdc4" font-family="Consolas, monospace" font-size="10" text-anchor="middle">pred</text>
      </g>
    </g>
    
    <!-- DFL Approach -->
    <g transform="translate(480, 0)">
      <rect x="0" y="0" width="450" height="200" rx="15" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
      <text x="225" y="30" fill="#4ecdc4" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
        DFL: Distribution Over Discrete Bins
      </text>
      
      <g transform="translate(20, 50)">
        <!-- Distribution bars -->
        <text x="200" y="-5" fill="#888" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
          Probability Distribution (16 bins)
        </text>
        
        <!-- Bars representing distribution -->
        <rect x="20" y="20" width="20" height="15" fill="#4ecdc4" fill-opacity="0.2"/>
        <rect x="45" y="20" width="20" height="20" fill="#4ecdc4" fill-opacity="0.3"/>
        <rect x="70" y="20" width="20" height="35" fill="#4ecdc4" fill-opacity="0.5"/>
        <rect x="95" y="20" width="20" height="70" fill="#4ecdc4" fill-opacity="0.8"/>
        <rect x="120" y="20" width="20" height="50" fill="#4ecdc4" fill-opacity="0.6"/>
        <rect x="145" y="20" width="20" height="30" fill="#4ecdc4" fill-opacity="0.4"/>
        <rect x="170" y="20" width="20" height="15" fill="#4ecdc4" fill-opacity="0.2"/>
        <rect x="195" y="20" width="20" height="10" fill="#4ecdc4" fill-opacity="0.1"/>
        
        <!-- Baseline -->
        <line x1="15" y1="90" x2="220" y2="90" stroke="#666" stroke-width="1"/>
        <text x="20" y="105" fill="#888" font-family="Consolas, monospace" font-size="9">0</text>
        <text x="95" y="105" fill="#ffd93d" font-family="Consolas, monospace" font-size="9">3</text>
        <text x="120" y="105" fill="#ffd93d" font-family="Consolas, monospace" font-size="9">4</text>
        <text x="210" y="105" fill="#888" font-family="Consolas, monospace" font-size="9">15</text>
        
        <!-- Target annotation -->
        <line x1="107" y1="10" x2="107" y2="90" stroke="#ffd93d" stroke-width="2" stroke-dasharray="3,3"/>
        <text x="107" y="125" fill="#ffd93d" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
          target=3.7
        </text>
      </g>
      
      <!-- Formula -->
      <text x="320" y="80" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
        pred = sum(prob[i] * i)
      </text>
      <text x="320" y="100" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
        = softmax(logits) @ bins
      </text>
    </g>
  </g>
  
  <!-- DFL Loss Formula -->
  <g transform="translate(50, 310)">
    <rect x="0" y="0" width="900" height="120" rx="15" fill="#252547" stroke="#ffd93d" stroke-width="2"/>
    <text x="450" y="30" fill="#ffd93d" font-family="Consolas, monospace" font-size="16" text-anchor="middle" font-weight="bold">
      DFL Loss Formulation
    </text>
    
    <text x="50" y="65" fill="#fff" font-family="Georgia, serif" font-size="16">
      DFL(S, y) = -((y_r - y) * log(S_l) + (y - y_l) * log(S_r))
    </text>
    
    <text x="50" y="95" fill="#888" font-family="Arial, sans-serif" font-size="12">
      where y_l = floor(y), y_r = y_l + 1, S_l = softmax(pred)[y_l], S_r = softmax(pred)[y_r]
    </text>
    
    <text x="620" y="65" fill="#4ecdc4" font-family="Consolas, monospace" font-size="12">
      Weighted CE between
    </text>
    <text x="620" y="85" fill="#4ecdc4" font-family="Consolas, monospace" font-size="12">
      adjacent bin indices
    </text>
  </g>
  
  <!-- Code Implementation -->
  <g transform="translate(50, 450)">
    <rect x="0" y="0" width="900" height="130" rx="10" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
    <text x="20" y="25" fill="#4ecdc4" font-family="Consolas, monospace" font-size="14" font-weight="bold">
      df_loss(pred_dist, target):
    </text>
    
    <text x="30" y="55" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      tl = target.long()           # target left (floor)
    </text>
    <text x="30" y="75" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      tr = tl + 1                  # target right (ceil)
    </text>
    <text x="30" y="95" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      wl = tr - target             # weight left
    </text>
    <text x="30" y="115" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      wr = 1 - wl                  # weight right
    </text>
    
    <text x="450" y="55" fill="#ff6b6b" font-family="Consolas, monospace" font-size="11"># Cross-entropy for left and right bins</text>
    <text x="450" y="75" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      l_loss = cross_entropy(pred_dist, tl)
    </text>
    <text x="450" y="95" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      r_loss = cross_entropy(pred_dist, tr)
    </text>
    <text x="450" y="115" fill="#4ecdc4" font-family="Consolas, monospace" font-size="11">
      return (l_loss * wl + r_loss * wr).mean(-1)
    </text>
  </g>
</svg>

