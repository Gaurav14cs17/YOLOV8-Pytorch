<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650">
  <defs>
    <linearGradient id="bgCIoU" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="650" fill="url(#bgCIoU)"/>
  
  <!-- Title -->
  <text x="500" y="35" fill="#fff" font-family="Georgia, serif" font-size="26" text-anchor="middle" font-weight="bold">
    Complete IoU (CIoU) Loss
  </text>
  <text x="500" y="60" fill="#888" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">
    Distance-IoU Loss: Faster and Better Learning for Bounding Box Regression (AAAI 2020)
  </text>
  
  <!-- Visual Diagram -->
  <g transform="translate(50, 90)">
    <rect x="0" y="0" width="400" height="300" rx="15" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="200" y="30" fill="#4ecdc4" font-family="Consolas, monospace" font-size="16" text-anchor="middle" font-weight="bold">
      CIoU Components Visualized
    </text>
    
    <!-- Coordinate system -->
    <g transform="translate(50, 60)">
      <!-- Convex hull (enclosing box) -->
      <rect x="0" y="0" width="280" height="200" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>
      <text x="285" y="15" fill="#666" font-family="Consolas, monospace" font-size="9">c (convex)</text>
      
      <!-- Predicted box (blue) -->
      <rect x="20" y="30" width="140" height="100" fill="rgba(78,205,196,0.3)" stroke="#4ecdc4" stroke-width="2"/>
      <text x="90" y="85" fill="#4ecdc4" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Predicted</text>
      
      <!-- Ground truth box (red) -->
      <rect x="100" y="80" width="160" height="110" fill="rgba(255,107,107,0.3)" stroke="#ff6b6b" stroke-width="2"/>
      <text x="180" y="140" fill="#ff6b6b" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Ground Truth</text>
      
      <!-- Intersection (yellow) -->
      <rect x="100" y="80" width="60" height="50" fill="rgba(255,215,0,0.5)" stroke="#ffd93d" stroke-width="1"/>
      
      <!-- Center points -->
      <circle cx="90" cy="80" r="6" fill="#4ecdc4"/>
      <circle cx="180" cy="135" r="6" fill="#ff6b6b"/>
      
      <!-- Distance rho -->
      <line x1="90" y1="80" x2="180" y2="135" stroke="#fff" stroke-width="2" stroke-dasharray="3,3"/>
      <text x="145" y="100" fill="#fff" font-family="Georgia, serif" font-size="11">rho</text>
      
      <!-- Diagonal c -->
      <line x1="0" y1="0" x2="280" y2="200" stroke="#666" stroke-width="1" stroke-dasharray="2,2"/>
    </g>
  </g>
  
  <!-- Formula Box -->
  <g transform="translate(480, 90)">
    <rect x="0" y="0" width="480" height="300" rx="15" fill="#252547" stroke="#ffd93d" stroke-width="2"/>
    <text x="240" y="30" fill="#ffd93d" font-family="Consolas, monospace" font-size="16" text-anchor="middle" font-weight="bold">
      CIoU Formula
    </text>
    
    <!-- Main formula -->
    <rect x="20" y="50" width="440" height="50" rx="8" fill="#1a1a2e"/>
    <text x="240" y="80" fill="#fff" font-family="Georgia, serif" font-size="18" text-anchor="middle">
      CIoU = IoU - rho(b,b_gt)/c + alpha*v
    </text>
    
    <!-- Component breakdown -->
    <text x="30" y="130" fill="#4ecdc4" font-family="Consolas, monospace" font-size="12">IoU:</text>
    <text x="80" y="130" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      Intersection / Union
    </text>
    
    <text x="30" y="160" fill="#ff6b6b" font-family="Consolas, monospace" font-size="12">rho/c:</text>
    <text x="80" y="160" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      Center distance / Convex diagonal
    </text>
    
    <text x="30" y="190" fill="#ffd93d" font-family="Consolas, monospace" font-size="12">v:</text>
    <text x="80" y="190" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      (4/pi^2) * (atan(w_gt/h_gt) - atan(w/h))^2
    </text>
    
    <text x="30" y="220" fill="#fff" font-family="Consolas, monospace" font-size="12">alpha:</text>
    <text x="80" y="220" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      v / (v - IoU + 1) [trade-off param]
    </text>
    
    <!-- Loss output -->
    <rect x="20" y="245" width="440" height="40" rx="8" fill="#4ecdc4"/>
    <text x="240" y="272" fill="#000" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      Loss = 1 - CIoU
    </text>
  </g>
  
  <!-- Code Implementation -->
  <g transform="translate(50, 410)">
    <rect x="0" y="0" width="910" height="220" rx="10" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
    <text x="20" y="25" fill="#4ecdc4" font-family="Consolas, monospace" font-size="14" font-weight="bold">
      Implementation: iou(box1, box2, eps=1e-7)
    </text>
    
    <!-- Code -->
    <text x="20" y="55" fill="#ff6b6b" font-family="Consolas, monospace" font-size="11"># Get box corners</text>
    <text x="20" y="72" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      b1_x1, b1_y1, b1_x2, b1_y2 = box1.chunk(4, -1)
    </text>
    
    <text x="20" y="97" fill="#ff6b6b" font-family="Consolas, monospace" font-size="11"># Intersection area</text>
    <text x="20" y="114" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      inter = (min(x2) - max(x1)).clamp(0) * (min(y2) - max(y1)).clamp(0)
    </text>
    
    <text x="20" y="139" fill="#ff6b6b" font-family="Consolas, monospace" font-size="11"># IoU and convex diagonal</text>
    <text x="20" y="156" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      iou = inter / union;  c2 = cw**2 + ch**2 + eps
    </text>
    
    <text x="20" y="181" fill="#ff6b6b" font-family="Consolas, monospace" font-size="11"># Aspect ratio consistency and center distance</text>
    <text x="20" y="198" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      v = (4/pi**2) * (atan(w2/h2) - atan(w1/h1))**2;  rho2 = center_dist**2
    </text>
    
    <text x="500" y="55" fill="#ffd93d" font-family="Consolas, monospace" font-size="11"># Alpha with no gradient</text>
    <text x="500" y="72" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      with torch.no_grad():
    </text>
    <text x="520" y="89" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      alpha = v / (v - iou + 1 + eps)
    </text>
    
    <text x="500" y="120" fill="#ffd93d" font-family="Consolas, monospace" font-size="11"># Final CIoU</text>
    <text x="500" y="137" fill="#4ecdc4" font-family="Consolas, monospace" font-size="12">
      return iou - (rho2/c2 + v*alpha)
    </text>
    
    <!-- IoU variants comparison -->
    <rect x="500" y="160" width="380" height="50" rx="5" fill="#252547"/>
    <text x="510" y="180" fill="#888" font-family="Consolas, monospace" font-size="10">
      IoU: overlap only | GIoU: + enclosing area
    </text>
    <text x="510" y="198" fill="#888" font-family="Consolas, monospace" font-size="10">
      DIoU: + center dist | CIoU: + aspect ratio
    </text>
  </g>
</svg>

