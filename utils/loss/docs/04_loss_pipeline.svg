<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700">
  <defs>
    <linearGradient id="bgPipe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="700" fill="url(#bgPipe)"/>
  
  <!-- Title -->
  <text x="500" y="35" fill="#fff" font-family="Georgia, serif" font-size="24" text-anchor="middle" font-weight="bold">
    ComputeLoss Pipeline - Step by Step
  </text>
  
  <!-- Step 1: Input Processing -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="420" height="130" rx="10" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="210" y="25" fill="#ff6b6b" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      Step 1: Parse Model Outputs
    </text>
    
    <text x="20" y="50" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      x = outputs[1] if isinstance(outputs, tuple) else outputs
    </text>
    <text x="20" y="70" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      output = concat([i.view(B, no, -1) for i in x], dim=2)
    </text>
    <text x="20" y="90" fill="#4ecdc4" font-family="Consolas, monospace" font-size="11">
      pred_output, pred_scores = output.split((4*dfl_ch, nc), 1)
    </text>
    
    <text x="20" y="115" fill="#888" font-family="Arial, sans-serif" font-size="10">
      Shape: [B, 4*16+nc, 8400] to [B, 8400, 64] and [B, 8400, nc]
    </text>
  </g>
  
  <!-- Step 2: Make Anchors -->
  <g transform="translate(520, 60)">
    <rect x="0" y="0" width="420" height="130" rx="10" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="210" y="25" fill="#4ecdc4" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      Step 2: Generate Anchors
    </text>
    
    <text x="20" y="50" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      anchor_points, stride_tensor = make_anchors(x, stride)
    </text>
    <text x="20" y="70" fill="#888" font-family="Arial, sans-serif" font-size="10">
      anchor_points: [8400, 2] - center of each grid cell
    </text>
    <text x="20" y="90" fill="#888" font-family="Arial, sans-serif" font-size="10">
      stride_tensor: [8400, 1] - 8, 16, or 32 per anchor
    </text>
    <text x="20" y="115" fill="#ffd93d" font-family="Consolas, monospace" font-size="10">
      P3: 6400 | P4: 1600 | P5: 400 = 8400 total
    </text>
  </g>
  
  <!-- Step 3: Process Targets -->
  <g transform="translate(50, 210)">
    <rect x="0" y="0" width="420" height="130" rx="10" fill="#252547" stroke="#ffd93d" stroke-width="2"/>
    <text x="210" y="25" fill="#ffd93d" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      Step 3: Process Ground Truth
    </text>
    
    <text x="20" y="50" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      gt[j, :n] = targets[matches, 1:]  # Per-image targets
    </text>
    <text x="20" y="70" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      gt_bboxes = wh2xy(gt[..., 1:5] * size)  # Scale to pixels
    </text>
    <text x="20" y="90" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      gt_labels, gt_bboxes = gt.split((1, 4), 2)
    </text>
    <text x="20" y="115" fill="#888" font-family="Arial, sans-serif" font-size="10">
      mask_gt: boolean mask for valid ground truth boxes
    </text>
  </g>
  
  <!-- Step 4: Decode Predictions -->
  <g transform="translate(520, 210)">
    <rect x="0" y="0" width="420" height="130" rx="10" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="210" y="25" fill="#ff6b6b" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      Step 4: Decode Bounding Boxes
    </text>
    
    <text x="20" y="50" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      pred_bboxes = pred_output.view(b, a, 4, 16).softmax(3)
    </text>
    <text x="20" y="70" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      pred_bboxes = pred_bboxes.matmul(project)  # DFL decode
    </text>
    <text x="20" y="90" fill="#4ecdc4" font-family="Consolas, monospace" font-size="11">
      pred_bboxes = cat((anchor - a, anchor + b), -1)
    </text>
    <text x="20" y="115" fill="#888" font-family="Arial, sans-serif" font-size="10">
      Convert from (left, top, right, bottom) to (x1, y1, x2, y2)
    </text>
  </g>
  
  <!-- Step 5: Task-Aligned Assignment -->
  <g transform="translate(50, 360)">
    <rect x="0" y="0" width="890" height="100" rx="10" fill="#252547" stroke="#4ecdc4" stroke-width="3"/>
    <text x="445" y="25" fill="#4ecdc4" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      Step 5: Task-Aligned Assignment (TAL)
    </text>
    
    <text x="30" y="55" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      target_bboxes, target_scores, fg_mask = self.assigner(scores, bboxes, gt_labels, gt_bboxes, ...)
    </text>
    <text x="30" y="80" fill="#888" font-family="Arial, sans-serif" font-size="10">
      Assigns ground truth to anchors using alignment metric = score^0.5 * IoU^6.0 | Returns foreground mask and soft targets
    </text>
  </g>
  
  <!-- Step 6: Compute Losses -->
  <g transform="translate(50, 480)">
    <rect x="0" y="0" width="890" height="200" rx="10" fill="#1a1a2e" stroke="#ffd93d" stroke-width="2"/>
    <text x="445" y="25" fill="#ffd93d" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      Step 6: Compute All Losses
    </text>
    
    <!-- Classification Loss -->
    <g transform="translate(20, 45)">
      <rect x="0" y="0" width="270" height="70" rx="8" fill="#252547" stroke="#ff6b6b" stroke-width="1"/>
      <text x="135" y="20" fill="#ff6b6b" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">
        Classification Loss
      </text>
      <text x="135" y="40" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
        loss_cls = BCE(pred_scores, target_scores)
      </text>
      <text x="135" y="58" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
        / target_scores_sum
      </text>
    </g>
    
    <!-- Box Loss -->
    <g transform="translate(310, 45)">
      <rect x="0" y="0" width="270" height="70" rx="8" fill="#252547" stroke="#4ecdc4" stroke-width="1"/>
      <text x="135" y="20" fill="#4ecdc4" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">
        Box Loss (CIoU)
      </text>
      <text x="135" y="40" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
        loss_box = (1 - CIoU) * weight
      </text>
      <text x="135" y="58" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
        Only for fg_mask positions
      </text>
    </g>
    
    <!-- DFL Loss -->
    <g transform="translate(600, 45)">
      <rect x="0" y="0" width="270" height="70" rx="8" fill="#252547" stroke="#ffd93d" stroke-width="1"/>
      <text x="135" y="20" fill="#ffd93d" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">
        DFL Loss
      </text>
      <text x="135" y="40" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
        loss_dfl = df_loss(pred, target_lt_rb)
      </text>
      <text x="135" y="58" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
        Clamped to [0, dfl_ch-1.01]
      </text>
    </g>
    
    <!-- Final combination -->
    <g transform="translate(20, 130)">
      <rect x="0" y="0" width="850" height="50" rx="8" fill="#4ecdc4"/>
      <text x="425" y="22" fill="#000" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
        Total Loss = 0.5 * loss_cls + 7.5 * loss_box + 1.5 * loss_dfl
      </text>
      <text x="425" y="40" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">
        Weights from params dict: cls=0.5, box=7.5, dfl=1.5
      </text>
    </g>
  </g>
</svg>

