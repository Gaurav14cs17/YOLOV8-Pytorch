<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgModel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgModel)"/>
  
  <!-- Title -->
  <text x="450" y="35" fill="#fff" font-family="Georgia, serif" font-size="24" text-anchor="middle" font-weight="bold">
    Model Utilities for Training and Deployment
  </text>
  
  <!-- strip_optimizer() -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="400" height="200" rx="15" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="200" y="30" fill="#4ecdc4" font-family="Consolas, monospace" font-size="16" text-anchor="middle" font-weight="bold">
      strip_optimizer()
    </text>
    <text x="200" y="50" fill="#888" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">
      Prepare checkpoint for deployment
    </text>
    
    <!-- Before -->
    <g transform="translate(20, 70)">
      <rect x="0" y="0" width="160" height="110" rx="8" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="1"/>
      <text x="80" y="20" fill="#ff6b6b" font-family="Consolas, monospace" font-size="11" text-anchor="middle">Before</text>
      <text x="15" y="42" fill="#ccc" font-family="Consolas, monospace" font-size="9">model: FP32</text>
      <text x="15" y="58" fill="#ccc" font-family="Consolas, monospace" font-size="9">optimizer: Adam</text>
      <text x="15" y="74" fill="#ccc" font-family="Consolas, monospace" font-size="9">scheduler: ...</text>
      <text x="15" y="90" fill="#ff6b6b" font-family="Consolas, monospace" font-size="9">~200MB</text>
    </g>
    
    <!-- Arrow -->
    <path d="M195,125 L215,125" stroke="#fff" stroke-width="2" marker-end="url(#arrow)"/>
    
    <!-- After -->
    <g transform="translate(220, 70)">
      <rect x="0" y="0" width="160" height="110" rx="8" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1"/>
      <text x="80" y="20" fill="#4ecdc4" font-family="Consolas, monospace" font-size="11" text-anchor="middle">After</text>
      <text x="15" y="42" fill="#ccc" font-family="Consolas, monospace" font-size="9">model: FP16</text>
      <text x="15" y="58" fill="#888" font-family="Consolas, monospace" font-size="9">no optimizer</text>
      <text x="15" y="74" fill="#888" font-family="Consolas, monospace" font-size="9">no scheduler</text>
      <text x="15" y="90" fill="#4ecdc4" font-family="Consolas, monospace" font-size="9">~100MB (50%)</text>
    </g>
  </g>
  
  <!-- clip_gradients() -->
  <g transform="translate(480, 70)">
    <rect x="0" y="0" width="380" height="200" rx="15" fill="#252547" stroke="#ffd93d" stroke-width="2"/>
    <text x="190" y="30" fill="#ffd93d" font-family="Consolas, monospace" font-size="16" text-anchor="middle" font-weight="bold">
      clip_gradients()
    </text>
    <text x="190" y="50" fill="#888" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">
      Prevent exploding gradients
    </text>
    
    <!-- Visualization -->
    <g transform="translate(30, 70)">
      <rect x="0" y="0" width="320" height="110" rx="8" fill="#1a1a2e"/>
      
      <!-- Gradient magnitude graph -->
      <line x1="30" y1="90" x2="290" y2="90" stroke="#666" stroke-width="1"/>
      <line x1="30" y1="20" x2="30" y2="90" stroke="#666" stroke-width="1"/>
      
      <!-- Threshold line -->
      <line x1="30" y1="50" x2="290" y2="50" stroke="#ffd93d" stroke-width="2" stroke-dasharray="5,3"/>
      <text x="295" y="54" fill="#ffd93d" font-family="Consolas, monospace" font-size="8">max_norm=10</text>
      
      <!-- Original gradients (spiky) -->
      <path d="M40,70 L80,60 L120,40 L160,25 L200,65 L240,80 L280,75" 
            stroke="#ff6b6b" stroke-width="2" fill="none"/>
      
      <!-- Clipped gradients -->
      <path d="M40,70 L80,60 L120,50 L160,50 L200,65 L240,80 L280,75" 
            stroke="#4ecdc4" stroke-width="2" fill="none" stroke-dasharray="3,2"/>
      
      <text x="160" y="105" fill="#888" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">
        Training steps
      </text>
    </g>
  </g>
  
  <!-- Use Cases -->
  <g transform="translate(50, 300)">
    <rect x="0" y="0" width="810" height="180" rx="10" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
    <text x="405" y="25" fill="#fff" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      When to Use These Utilities
    </text>
    
    <!-- strip_optimizer use case -->
    <g transform="translate(30, 45)">
      <rect x="0" y="0" width="360" height="120" rx="8" fill="#252547" stroke="#4ecdc4" stroke-width="1"/>
      <text x="180" y="22" fill="#4ecdc4" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">
        strip_optimizer() Use Cases
      </text>
      <text x="15" y="48" fill="#ccc" font-family="Arial, sans-serif" font-size="10">1. Final model export for inference</text>
      <text x="15" y="68" fill="#ccc" font-family="Arial, sans-serif" font-size="10">2. Reduce checkpoint size for sharing</text>
      <text x="15" y="88" fill="#ccc" font-family="Arial, sans-serif" font-size="10">3. Deploy to edge devices (FP16)</text>
      <text x="15" y="108" fill="#888" font-family="Arial, sans-serif" font-size="9">Warning: Cannot resume training after!</text>
    </g>
    
    <!-- clip_gradients use case -->
    <g transform="translate(420, 45)">
      <rect x="0" y="0" width="360" height="120" rx="8" fill="#252547" stroke="#ffd93d" stroke-width="1"/>
      <text x="180" y="22" fill="#ffd93d" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">
        clip_gradients() Use Cases
      </text>
      <text x="15" y="48" fill="#ccc" font-family="Arial, sans-serif" font-size="10">1. Training with large learning rates</text>
      <text x="15" y="68" fill="#ccc" font-family="Arial, sans-serif" font-size="10">2. Unstable training (loss spikes)</text>
      <text x="15" y="88" fill="#ccc" font-family="Arial, sans-serif" font-size="10">3. Mixed precision training (FP16)</text>
      <text x="15" y="108" fill="#888" font-family="Arial, sans-serif" font-size="9">Default max_norm=10.0 works for most cases</text>
    </g>
  </g>
</svg>

