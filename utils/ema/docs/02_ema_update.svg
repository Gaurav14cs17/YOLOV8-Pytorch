<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450">
  <defs>
    <linearGradient id="bgEMA2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="450" fill="url(#bgEMA2)"/>
  
  <!-- Title -->
  <text x="450" y="35" fill="#fff" font-family="Georgia, serif" font-size="24" text-anchor="middle" font-weight="bold">
    EMA Update Process
  </text>
  
  <!-- Step 1: Training Model -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="220" height="150" rx="15" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="110" y="30" fill="#ff6b6b" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      Training Model
    </text>
    
    <rect x="30" y="50" width="160" height="30" fill="#ff6b6b" rx="5"/>
    <text x="110" y="70" fill="#fff" font-family="Consolas, monospace" font-size="11" text-anchor="middle">theta_t (new)</text>
    
    <text x="110" y="115" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      Updated by SGD/Adam
    </text>
    <text x="110" y="135" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      each training step
    </text>
  </g>
  
  <!-- Arrow with decay formula -->
  <g transform="translate(290, 130)">
    <path d="M0,0 L100,0" stroke="#fff" stroke-width="3"/>
    <polygon points="100,-8 118,0 100,8" fill="#fff"/>
    
    <rect x="15" y="20" width="80" height="40" rx="5" fill="#1a1a2e" stroke="#ffd93d" stroke-width="1"/>
    <text x="55" y="38" fill="#ffd93d" font-family="Consolas, monospace" font-size="9" text-anchor="middle">* (1-d)</text>
    <text x="55" y="52" fill="#888" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">small weight</text>
  </g>
  
  <!-- Plus sign -->
  <g transform="translate(420, 115)">
    <circle cx="20" cy="20" r="20" fill="#4ecdc4"/>
    <text x="20" y="27" fill="#000" font-family="Georgia, serif" font-size="24" text-anchor="middle">+</text>
  </g>
  
  <!-- Step 2: EMA Model -->
  <g transform="translate(480, 70)">
    <rect x="0" y="0" width="220" height="150" rx="15" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="110" y="30" fill="#4ecdc4" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      EMA Model
    </text>
    
    <rect x="30" y="50" width="160" height="30" fill="#4ecdc4" rx="5"/>
    <text x="110" y="70" fill="#000" font-family="Consolas, monospace" font-size="11" text-anchor="middle">EMA_{t-1} (old)</text>
    
    <text x="110" y="115" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      Slowly updated
    </text>
    <text x="110" y="135" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      running average
    </text>
  </g>
  
  <!-- Arrow with decay formula -->
  <g transform="translate(720, 130)">
    <rect x="-30" y="20" width="80" height="40" rx="5" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1"/>
    <text x="10" y="38" fill="#4ecdc4" font-family="Consolas, monospace" font-size="9" text-anchor="middle">* d</text>
    <text x="10" y="52" fill="#888" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">large weight</text>
  </g>
  
  <!-- Result Arrow -->
  <g transform="translate(450, 240)">
    <path d="M0,0 L0,50" stroke="#fff" stroke-width="3"/>
    <polygon points="-8,50 0,68 8,50" fill="#fff"/>
  </g>
  
  <!-- Result: New EMA -->
  <g transform="translate(280, 310)">
    <rect x="0" y="0" width="340" height="120" rx="15" fill="#252547" stroke="#ffd93d" stroke-width="3"/>
    <text x="170" y="30" fill="#ffd93d" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      New EMA_t
    </text>
    
    <rect x="30" y="45" width="280" height="35" fill="#ffd93d" rx="5"/>
    <text x="170" y="68" fill="#000" font-family="Consolas, monospace" font-size="12" text-anchor="middle">
      d * EMA_{t-1} + (1-d) * theta_t
    </text>
    
    <text x="170" y="105" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      d = 0.9999: 99.99% old + 0.01% new
    </text>
  </g>
  
  <!-- Code snippet -->
  <g transform="translate(650, 310)">
    <rect x="0" y="0" width="220" height="120" rx="10" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
    <text x="110" y="25" fill="#4ecdc4" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">
      Code
    </text>
    <text x="15" y="50" fill="#ccc" font-family="Consolas, monospace" font-size="9">for k, v in ema.items():</text>
    <text x="15" y="68" fill="#ccc" font-family="Consolas, monospace" font-size="9">  v *= d</text>
    <text x="15" y="86" fill="#ccc" font-family="Consolas, monospace" font-size="9">  v += (1-d) * msd[k]</text>
    <text x="15" y="110" fill="#888" font-family="Consolas, monospace" font-size="8">In-place update</text>
  </g>
</svg>

