<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="600" fill="url(#bgGrad2)"/>
  
  <!-- Title -->
  <text x="500" y="40" fill="#fff" font-family="Georgia, serif" font-size="26" text-anchor="middle" font-weight="bold">
    make_anchors() - Multi-Scale Anchor Point Generation
  </text>
  
  <!-- Feature Map P3 (8x stride) -->
  <g transform="translate(50, 80)">
    <text x="90" y="0" fill="#ff6b6b" font-family="Consolas, monospace" font-size="16" text-anchor="middle" font-weight="bold">
      P3 (stride=8)
    </text>
    <text x="90" y="18" fill="#888" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">
      80x80 grid
    </text>
    
    <rect x="0" y="25" width="180" height="180" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="2" rx="5"/>
    
    <!-- Grid cells 8x8 shown -->
    <g stroke="#ff6b6b" stroke-opacity="0.3" stroke-width="0.5">
      <line x1="22.5" y1="25" x2="22.5" y2="205"/>
      <line x1="45" y1="25" x2="45" y2="205"/>
      <line x1="67.5" y1="25" x2="67.5" y2="205"/>
      <line x1="90" y1="25" x2="90" y2="205"/>
      <line x1="112.5" y1="25" x2="112.5" y2="205"/>
      <line x1="135" y1="25" x2="135" y2="205"/>
      <line x1="157.5" y1="25" x2="157.5" y2="205"/>
      <line x1="0" y1="47.5" x2="180" y2="47.5"/>
      <line x1="0" y1="70" x2="180" y2="70"/>
      <line x1="0" y1="92.5" x2="180" y2="92.5"/>
      <line x1="0" y1="115" x2="180" y2="115"/>
      <line x1="0" y1="137.5" x2="180" y2="137.5"/>
      <line x1="0" y1="160" x2="180" y2="160"/>
      <line x1="0" y1="182.5" x2="180" y2="182.5"/>
    </g>
    
    <!-- Anchor points -->
    <circle cx="11" cy="36" r="3" fill="#ff6b6b"/>
    <circle cx="33.5" cy="36" r="3" fill="#ff6b6b"/>
    <circle cx="56" cy="36" r="3" fill="#ff6b6b"/>
    <circle cx="11" cy="58.5" r="3" fill="#ff6b6b"/>
    <circle cx="33.5" cy="58.5" r="3" fill="#ff6b6b"/>
    <circle cx="56" cy="58.5" r="3" fill="#ff6b6b"/>
    
    <text x="90" y="230" fill="#ff6b6b" font-family="Consolas, monospace" font-size="11" text-anchor="middle">
      6400 anchors
    </text>
    <text x="90" y="245" fill="#666" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      offset = 0.5
    </text>
  </g>
  
  <!-- Feature Map P4 (16x stride) -->
  <g transform="translate(280, 80)">
    <text x="75" y="0" fill="#4ecdc4" font-family="Consolas, monospace" font-size="16" text-anchor="middle" font-weight="bold">
      P4 (stride=16)
    </text>
    <text x="75" y="18" fill="#888" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">
      40x40 grid
    </text>
    
    <rect x="0" y="25" width="150" height="150" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="2" rx="5"/>
    
    <!-- Grid cells -->
    <g stroke="#4ecdc4" stroke-opacity="0.3" stroke-width="0.5">
      <line x1="25" y1="25" x2="25" y2="175"/>
      <line x1="50" y1="25" x2="50" y2="175"/>
      <line x1="75" y1="25" x2="75" y2="175"/>
      <line x1="100" y1="25" x2="100" y2="175"/>
      <line x1="125" y1="25" x2="125" y2="175"/>
      <line x1="0" y1="50" x2="150" y2="50"/>
      <line x1="0" y1="75" x2="150" y2="75"/>
      <line x1="0" y1="100" x2="150" y2="100"/>
      <line x1="0" y1="125" x2="150" y2="125"/>
      <line x1="0" y1="150" x2="150" y2="150"/>
    </g>
    
    <!-- Anchor points -->
    <circle cx="12.5" cy="37.5" r="4" fill="#4ecdc4"/>
    <circle cx="37.5" cy="37.5" r="4" fill="#4ecdc4"/>
    <circle cx="62.5" cy="37.5" r="4" fill="#4ecdc4"/>
    <circle cx="12.5" cy="62.5" r="4" fill="#4ecdc4"/>
    <circle cx="37.5" cy="62.5" r="4" fill="#4ecdc4"/>
    
    <text x="75" y="200" fill="#4ecdc4" font-family="Consolas, monospace" font-size="11" text-anchor="middle">
      1600 anchors
    </text>
  </g>
  
  <!-- Feature Map P5 (32x stride) -->
  <g transform="translate(480, 80)">
    <text x="60" y="0" fill="#ffd93d" font-family="Consolas, monospace" font-size="16" text-anchor="middle" font-weight="bold">
      P5 (stride=32)
    </text>
    <text x="60" y="18" fill="#888" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">
      20x20 grid
    </text>
    
    <rect x="0" y="25" width="120" height="120" fill="#1a1a2e" stroke="#ffd93d" stroke-width="2" rx="5"/>
    
    <!-- Grid cells -->
    <g stroke="#ffd93d" stroke-opacity="0.3" stroke-width="0.5">
      <line x1="30" y1="25" x2="30" y2="145"/>
      <line x1="60" y1="25" x2="60" y2="145"/>
      <line x1="90" y1="25" x2="90" y2="145"/>
      <line x1="0" y1="55" x2="120" y2="55"/>
      <line x1="0" y1="85" x2="120" y2="85"/>
      <line x1="0" y1="115" x2="120" y2="115"/>
    </g>
    
    <!-- Anchor points -->
    <circle cx="15" cy="40" r="5" fill="#ffd93d"/>
    <circle cx="45" cy="40" r="5" fill="#ffd93d"/>
    <circle cx="75" cy="40" r="5" fill="#ffd93d"/>
    <circle cx="15" cy="70" r="5" fill="#ffd93d"/>
    <circle cx="45" cy="70" r="5" fill="#ffd93d"/>
    
    <text x="60" y="170" fill="#ffd93d" font-family="Consolas, monospace" font-size="11" text-anchor="middle">
      400 anchors
    </text>
  </g>
  
  <!-- Concatenation Arrow -->
  <g transform="translate(620, 150)">
    <path d="M0,0 L60,0" stroke="#fff" stroke-width="3"/>
    <polygon points="60,-8 75,0 60,8" fill="#fff"/>
    <text x="35" y="25" fill="#888" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">concat</text>
  </g>
  
  <!-- Output Tensors -->
  <g transform="translate(720, 80)">
    <rect x="0" y="0" width="250" height="200" rx="10" fill="#252547" stroke="#888" stroke-width="2"/>
    <text x="125" y="30" fill="#fff" font-family="Consolas, monospace" font-size="16" text-anchor="middle" font-weight="bold">
      Output Tensors
    </text>
    
    <!-- anchor_points -->
    <rect x="20" y="50" width="210" height="55" rx="5" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1"/>
    <text x="125" y="70" fill="#4ecdc4" font-family="Consolas, monospace" font-size="12" text-anchor="middle">
      anchor_points
    </text>
    <text x="125" y="90" fill="#888" font-family="Consolas, monospace" font-size="11" text-anchor="middle">
      shape: [8400, 2]
    </text>
    
    <!-- stride_tensor -->
    <rect x="20" y="115" width="210" height="55" rx="5" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="1"/>
    <text x="125" y="135" fill="#ff6b6b" font-family="Consolas, monospace" font-size="12" text-anchor="middle">
      stride_tensor
    </text>
    <text x="125" y="155" fill="#888" font-family="Consolas, monospace" font-size="11" text-anchor="middle">
      shape: [8400, 1]
    </text>
  </g>
  
  <!-- Code Explanation -->
  <g transform="translate(50, 320)">
    <rect x="0" y="0" width="900" height="250" rx="10" fill="#1a1a2e" stroke="#444" stroke-width="1"/>
    <text x="20" y="30" fill="#4ecdc4" font-family="Consolas, monospace" font-size="14" font-weight="bold">
      Algorithm: make_anchors(features, strides, offset=0.5)
    </text>
    
    <!-- Step 1 -->
    <text x="20" y="60" fill="#ff6b6b" font-family="Consolas, monospace" font-size="12">Step 1:</text>
    <text x="80" y="60" fill="#ccc" font-family="Consolas, monospace" font-size="12">
      For each feature map, get height (h) and width (w)
    </text>
    
    <!-- Step 2 -->
    <text x="20" y="90" fill="#ff6b6b" font-family="Consolas, monospace" font-size="12">Step 2:</text>
    <text x="80" y="90" fill="#ccc" font-family="Consolas, monospace" font-size="12">
      sx = torch.arange(w) + offset  # [0.5, 1.5, 2.5, ...]
    </text>
    <text x="80" y="110" fill="#ccc" font-family="Consolas, monospace" font-size="12">
      sy = torch.arange(h) + offset  # [0.5, 1.5, 2.5, ...]
    </text>
    
    <!-- Step 3 -->
    <text x="20" y="140" fill="#ff6b6b" font-family="Consolas, monospace" font-size="12">Step 3:</text>
    <text x="80" y="140" fill="#ccc" font-family="Consolas, monospace" font-size="12">
      sy, sx = torch.meshgrid(sy, sx)  # Create 2D grid
    </text>
    
    <!-- Step 4 -->
    <text x="20" y="170" fill="#ff6b6b" font-family="Consolas, monospace" font-size="12">Step 4:</text>
    <text x="80" y="170" fill="#ccc" font-family="Consolas, monospace" font-size="12">
      anchor_points = torch.stack((sx, sy), -1).view(-1, 2)  # Flatten to [h*w, 2]
    </text>
    
    <!-- Step 5 -->
    <text x="20" y="200" fill="#ff6b6b" font-family="Consolas, monospace" font-size="12">Step 5:</text>
    <text x="80" y="200" fill="#ccc" font-family="Consolas, monospace" font-size="12">
      stride_tensor = torch.full((h*w, 1), stride)  # All same stride value
    </text>
    
    <!-- Total -->
    <text x="20" y="235" fill="#4ecdc4" font-family="Consolas, monospace" font-size="12">
      Total: 80x80 + 40x40 + 20x20 = 6400 + 1600 + 400 = 8400 anchor points
    </text>
  </g>
</svg>

