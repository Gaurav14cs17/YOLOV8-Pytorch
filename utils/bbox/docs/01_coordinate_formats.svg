<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="cxcyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a5a"/>
    </linearGradient>
    <linearGradient id="xyxyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#3db5ac"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgGrad1)"/>
  
  <!-- Title -->
  <text x="450" y="40" fill="#fff" font-family="Georgia, serif" font-size="24" text-anchor="middle" font-weight="bold">
    Bounding Box Coordinate Formats
  </text>
  
  <!-- CXCYWH Format (Left Side) -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="380" height="380" rx="15" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="190" y="35" fill="#ff6b6b" font-family="Consolas, monospace" font-size="18" text-anchor="middle" font-weight="bold">
      CXCYWH Format
    </text>
    <text x="190" y="55" fill="#aaa" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">
      (center_x, center_y, width, height)
    </text>
    
    <!-- Grid -->
    <g stroke="#444" stroke-width="0.5">
      <line x1="30" y1="80" x2="350" y2="80"/>
      <line x1="30" y1="140" x2="350" y2="140"/>
      <line x1="30" y1="200" x2="350" y2="200"/>
      <line x1="30" y1="260" x2="350" y2="260"/>
      <line x1="30" y1="320" x2="350" y2="320"/>
      <line x1="30" y1="80" x2="30" y2="320"/>
      <line x1="110" y1="80" x2="110" y2="320"/>
      <line x1="190" y1="80" x2="190" y2="320"/>
      <line x1="270" y1="80" x2="270" y2="320"/>
      <line x1="350" y1="80" x2="350" y2="320"/>
    </g>
    
    <!-- Bounding Box -->
    <rect x="110" y="140" width="160" height="120" fill="rgba(255,107,107,0.2)" stroke="#ff6b6b" stroke-width="3" stroke-dasharray="8,4"/>
    
    <!-- Center Point -->
    <circle cx="190" cy="200" r="8" fill="#ff6b6b"/>
    <text x="205" y="195" fill="#ff6b6b" font-family="Consolas, monospace" font-size="12">(cx, cy)</text>
    
    <!-- Width Arrow -->
    <line x1="110" y1="280" x2="270" y2="280" stroke="#ffcc00" stroke-width="2" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
    <text x="190" y="300" fill="#ffcc00" font-family="Consolas, monospace" font-size="12" text-anchor="middle">width</text>
    
    <!-- Height Arrow -->
    <line x1="290" y1="140" x2="290" y2="260" stroke="#00ff88" stroke-width="2"/>
    <text x="310" y="200" fill="#00ff88" font-family="Consolas, monospace" font-size="12">height</text>
    
    <!-- Formula -->
    <text x="190" y="355" fill="#ccc" font-family="Consolas, monospace" font-size="14" text-anchor="middle">
      [cx, cy, w, h]
    </text>
  </g>
  
  <!-- Arrow between formats -->
  <g transform="translate(440, 250)">
    <path d="M0,0 L40,0" stroke="#fff" stroke-width="3" fill="none"/>
    <polygon points="40,-8 55,0 40,8" fill="#fff"/>
    <text x="25" y="25" fill="#888" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">wh2xy()</text>
  </g>
  
  <!-- XYXY Format (Right Side) -->
  <g transform="translate(500, 80)">
    <rect x="0" y="0" width="380" height="380" rx="15" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="190" y="35" fill="#4ecdc4" font-family="Consolas, monospace" font-size="18" text-anchor="middle" font-weight="bold">
      XYXY Format
    </text>
    <text x="190" y="55" fill="#aaa" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">
      (x1, y1, x2, y2)
    </text>
    
    <!-- Grid -->
    <g stroke="#444" stroke-width="0.5">
      <line x1="30" y1="80" x2="350" y2="80"/>
      <line x1="30" y1="140" x2="350" y2="140"/>
      <line x1="30" y1="200" x2="350" y2="200"/>
      <line x1="30" y1="260" x2="350" y2="260"/>
      <line x1="30" y1="320" x2="350" y2="320"/>
      <line x1="30" y1="80" x2="30" y2="320"/>
      <line x1="110" y1="80" x2="110" y2="320"/>
      <line x1="190" y1="80" x2="190" y2="320"/>
      <line x1="270" y1="80" x2="270" y2="320"/>
      <line x1="350" y1="80" x2="350" y2="320"/>
    </g>
    
    <!-- Bounding Box -->
    <rect x="110" y="140" width="160" height="120" fill="rgba(78,205,196,0.2)" stroke="#4ecdc4" stroke-width="3"/>
    
    <!-- Corner Points -->
    <circle cx="110" cy="140" r="8" fill="#4ecdc4"/>
    <text x="80" y="135" fill="#4ecdc4" font-family="Consolas, monospace" font-size="11">(x1,y1)</text>
    
    <circle cx="270" cy="260" r="8" fill="#4ecdc4"/>
    <text x="280" y="275" fill="#4ecdc4" font-family="Consolas, monospace" font-size="11">(x2,y2)</text>
    
    <!-- Conversion formulas -->
    <text x="190" y="340" fill="#888" font-family="Consolas, monospace" font-size="11" text-anchor="middle">
      x1 = cx - w/2, y1 = cy - h/2
    </text>
    <text x="190" y="358" fill="#888" font-family="Consolas, monospace" font-size="11" text-anchor="middle">
      x2 = cx + w/2, y2 = cy + h/2
    </text>
  </g>
  
  <!-- Footer -->
  <text x="450" y="485" fill="#666" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">
    YOLOv8 uses CXCYWH internally and converts to XYXY for IoU calculation
  </text>
</svg>

