<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="550" fill="url(#bgGrad3)"/>
  
  <!-- Title -->
  <text x="450" y="35" fill="#fff" font-family="Georgia, serif" font-size="24" text-anchor="middle" font-weight="bold">
    box_iou() - Intersection over Union Calculation
  </text>
  
  <!-- Visual Diagram -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="380" height="280" rx="10" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="190" y="25" fill="#4ecdc4" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      IoU Visual Explanation
    </text>
    
    <!-- Box 1 (Red) -->
    <rect x="80" y="60" width="140" height="100" fill="rgba(255,107,107,0.4)" stroke="#ff6b6b" stroke-width="3"/>
    <text x="100" y="55" fill="#ff6b6b" font-family="Consolas, monospace" font-size="11">Box1 (a1, a2)</text>
    
    <!-- Box 2 (Blue) -->
    <rect x="140" y="100" width="160" height="120" fill="rgba(78,205,196,0.4)" stroke="#4ecdc4" stroke-width="3"/>
    <text x="220" y="235" fill="#4ecdc4" font-family="Consolas, monospace" font-size="11">Box2 (b1, b2)</text>
    
    <!-- Intersection (Yellow) -->
    <rect x="140" y="100" width="80" height="60" fill="rgba(255,215,0,0.7)" stroke="#ffd700" stroke-width="2"/>
    <text x="180" y="135" fill="#000" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" font-weight="bold">
      Intersection
    </text>
    
    <!-- Coordinates labels -->
    <text x="75" y="75" fill="#ff6b6b" font-family="Consolas, monospace" font-size="9">a1</text>
    <text x="220" y="170" fill="#ff6b6b" font-family="Consolas, monospace" font-size="9">a2</text>
    <text x="135" y="115" fill="#4ecdc4" font-family="Consolas, monospace" font-size="9">b1</text>
    <text x="300" y="225" fill="#4ecdc4" font-family="Consolas, monospace" font-size="9">b2</text>
  </g>
  
  <!-- Formula Box -->
  <g transform="translate(460, 60)">
    <rect x="0" y="0" width="400" height="280" rx="10" fill="#252547" stroke="#ffd93d" stroke-width="2"/>
    <text x="200" y="25" fill="#ffd93d" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      IoU Formula
    </text>
    
    <!-- Main Formula -->
    <text x="200" y="70" fill="#fff" font-family="Georgia, serif" font-size="20" text-anchor="middle">
      IoU = Intersection / Union
    </text>
    
    <!-- Intersection calculation -->
    <rect x="20" y="90" width="360" height="60" rx="5" fill="#1a1a2e"/>
    <text x="200" y="115" fill="#4ecdc4" font-family="Consolas, monospace" font-size="12" text-anchor="middle">
      Intersection = (min(a2,b2) - max(a1,b1)).clamp(0)
    </text>
    <text x="200" y="138" fill="#888" font-family="Consolas, monospace" font-size="11" text-anchor="middle">
      .prod(2)  # multiply width and height
    </text>
    
    <!-- Union calculation -->
    <rect x="20" y="160" width="360" height="50" rx="5" fill="#1a1a2e"/>
    <text x="200" y="185" fill="#ff6b6b" font-family="Consolas, monospace" font-size="12" text-anchor="middle">
      Union = area1 + area2 - Intersection
    </text>
    <text x="200" y="203" fill="#888" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
      area = (x2-x1) * (y2-y1)
    </text>
    
    <!-- Output shape -->
    <rect x="20" y="220" width="360" height="45" rx="5" fill="#1a1a2e"/>
    <text x="200" y="245" fill="#aaa" font-family="Consolas, monospace" font-size="11" text-anchor="middle">
      Output: [N, M] matrix for N and M boxes
    </text>
  </g>
  
  <!-- Code Implementation -->
  <g transform="translate(50, 360)">
    <rect x="0" y="0" width="810" height="170" rx="10" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
    <text x="20" y="25" fill="#4ecdc4" font-family="Consolas, monospace" font-size="13" font-weight="bold">
      Implementation Details:
    </text>
    
    <text x="20" y="55" fill="#ff6b6b" font-family="Consolas, monospace" font-size="11">
      # Split boxes into corners
    </text>
    <text x="20" y="75" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      (a1, a2), (b1, b2) = box1[:, None].chunk(2, 2), box2.chunk(2, 1)
    </text>
    
    <text x="20" y="100" fill="#ff6b6b" font-family="Consolas, monospace" font-size="11">
      # Compute intersection
    </text>
    <text x="20" y="120" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      intersection = (torch.min(a2, b2) - torch.max(a1, b1)).clamp(0).prod(2)
    </text>
    
    <text x="20" y="145" fill="#ff6b6b" font-family="Consolas, monospace" font-size="11">
      # IoU = intersection / (area1 + area2 - intersection)
    </text>
    <text x="20" y="162" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      return intersection / (area1[:, None] + area2 - intersection)
    </text>
  </g>
</svg>

