<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650">
  <defs>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="650" fill="url(#bgGrad4)"/>
  
  <!-- Title -->
  <text x="500" y="35" fill="#fff" font-family="Georgia, serif" font-size="24" text-anchor="middle" font-weight="bold">
    Non-Maximum Suppression (NMS) Pipeline
  </text>
  
  <!-- Step 1: Input -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="200" height="120" rx="10" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="100" y="25" fill="#ff6b6b" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      1. Input Predictions
    </text>
    
    <rect x="20" y="40" width="160" height="65" rx="5" fill="#1a1a2e"/>
    <text x="100" y="60" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
      prediction[B, 4+nc, 8400]
    </text>
    <text x="100" y="78" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      B = batch size
    </text>
    <text x="100" y="93" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      4 = bbox coords + nc classes
    </text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M260,120 L300,120" stroke="#fff" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Step 2: Confidence Filter -->
  <g transform="translate(310, 60)">
    <rect x="0" y="0" width="200" height="120" rx="10" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="100" y="25" fill="#4ecdc4" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      2. Confidence Filter
    </text>
    
    <rect x="20" y="40" width="160" height="65" rx="5" fill="#1a1a2e"/>
    <text x="100" y="60" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
      max_class_score &gt; 0.25
    </text>
    <text x="100" y="78" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      conf_threshold = 0.25
    </text>
    <text x="100" y="93" fill="#ffd93d" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      8400 to ~500 boxes
    </text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M520,120 L560,120" stroke="#fff" stroke-width="2" fill="none"/>
  
  <!-- Step 3: Format Conversion -->
  <g transform="translate(570, 60)">
    <rect x="0" y="0" width="200" height="120" rx="10" fill="#252547" stroke="#ffd93d" stroke-width="2"/>
    <text x="100" y="25" fill="#ffd93d" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      3. CXCYWH to XYXY
    </text>
    
    <rect x="20" y="40" width="160" height="65" rx="5" fill="#1a1a2e"/>
    <text x="100" y="60" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
      box = wh2xy(box)
    </text>
    <text x="100" y="78" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      Convert format for
    </text>
    <text x="100" y="93" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      torchvision.ops.nms
    </text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M780,120 L820,120" stroke="#fff" stroke-width="2" fill="none"/>
  
  <!-- Step 4: Sort -->
  <g transform="translate(780, 60)">
    <rect x="0" y="0" width="200" height="120" rx="10" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="100" y="25" fill="#ff6b6b" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      4. Sort by Score
    </text>
    
    <rect x="20" y="40" width="160" height="65" rx="5" fill="#1a1a2e"/>
    <text x="100" y="60" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
      argsort(descending)
    </text>
    <text x="100" y="78" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      max_nms = 30000
    </text>
    <text x="100" y="93" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      Keep top 30k boxes
    </text>
  </g>
  
  <!-- NMS Process Diagram -->
  <g transform="translate(50, 210)">
    <rect x="0" y="0" width="900" height="200" rx="10" fill="#1a1a2e" stroke="#888" stroke-width="2"/>
    <text x="450" y="25" fill="#fff" font-family="Consolas, monospace" font-size="16" text-anchor="middle" font-weight="bold">
      5. Batched NMS Process
    </text>
    
    <!-- Before NMS -->
    <g transform="translate(20, 40)">
      <text x="100" y="0" fill="#ff6b6b" font-family="Consolas, monospace" font-size="12" text-anchor="middle">Before NMS</text>
      <rect x="0" y="10" width="200" height="140" fill="#252547" stroke="#ff6b6b" stroke-width="1" rx="5"/>
      
      <!-- Multiple overlapping boxes -->
      <rect x="40" y="40" width="80" height="60" fill="none" stroke="#ff6b6b" stroke-width="2"/>
      <rect x="50" y="50" width="80" height="60" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-opacity="0.7"/>
      <rect x="60" y="45" width="70" height="55" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-opacity="0.5"/>
      <rect x="55" y="55" width="75" height="50" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-opacity="0.3"/>
      
      <text x="100" y="130" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
        Many overlapping detections
      </text>
    </g>
    
    <!-- Arrow -->
    <g transform="translate(250, 80)">
      <path d="M0,20 L80,20" stroke="#4ecdc4" stroke-width="3"/>
      <polygon points="80,12 95,20 80,28" fill="#4ecdc4"/>
      <text x="40" y="50" fill="#4ecdc4" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
        IoU &gt; 0.45
      </text>
      <text x="40" y="65" fill="#888" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">
        Suppress
      </text>
    </g>
    
    <!-- After NMS -->
    <g transform="translate(380, 40)">
      <text x="100" y="0" fill="#4ecdc4" font-family="Consolas, monospace" font-size="12" text-anchor="middle">After NMS</text>
      <rect x="0" y="10" width="200" height="140" fill="#252547" stroke="#4ecdc4" stroke-width="1" rx="5"/>
      
      <!-- Single clean box -->
      <rect x="50" y="45" width="80" height="60" fill="rgba(78,205,196,0.3)" stroke="#4ecdc4" stroke-width="3"/>
      
      <text x="100" y="130" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
        Best detection kept
      </text>
    </g>
    
    <!-- Class offset trick -->
    <g transform="translate(620, 40)">
      <text x="130" y="0" fill="#ffd93d" font-family="Consolas, monospace" font-size="12" text-anchor="middle">Class Offset Trick</text>
      <rect x="0" y="10" width="260" height="140" fill="#252547" stroke="#ffd93d" stroke-width="1" rx="5"/>
      
      <text x="130" y="40" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
        c = class_id * max_wh
      </text>
      <text x="130" y="60" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
        boxes = boxes + c
      </text>
      <text x="130" y="90" fill="#888" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">
        Offset boxes by class to prevent
      </text>
      <text x="130" y="105" fill="#888" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">
        cross-class suppression
      </text>
      <text x="130" y="130" fill="#ffd93d" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
        max_wh = 7680 pixels
      </text>
    </g>
  </g>
  
  <!-- Output -->
  <g transform="translate(50, 430)">
    <rect x="0" y="0" width="900" height="100" rx="10" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="450" y="25" fill="#4ecdc4" font-family="Consolas, monospace" font-size="16" text-anchor="middle" font-weight="bold">
      6. Output: [N, 6] per image
    </text>
    
    <g transform="translate(100, 45)">
      <rect x="0" y="0" width="80" height="35" fill="#ff6b6b" rx="5"/>
      <text x="40" y="22" fill="#fff" font-family="Consolas, monospace" font-size="11" text-anchor="middle">x1</text>
    </g>
    <g transform="translate(190, 45)">
      <rect x="0" y="0" width="80" height="35" fill="#ff6b6b" rx="5"/>
      <text x="40" y="22" fill="#fff" font-family="Consolas, monospace" font-size="11" text-anchor="middle">y1</text>
    </g>
    <g transform="translate(280, 45)">
      <rect x="0" y="0" width="80" height="35" fill="#ff6b6b" rx="5"/>
      <text x="40" y="22" fill="#fff" font-family="Consolas, monospace" font-size="11" text-anchor="middle">x2</text>
    </g>
    <g transform="translate(370, 45)">
      <rect x="0" y="0" width="80" height="35" fill="#ff6b6b" rx="5"/>
      <text x="40" y="22" fill="#fff" font-family="Consolas, monospace" font-size="11" text-anchor="middle">y2</text>
    </g>
    <g transform="translate(460, 45)">
      <rect x="0" y="0" width="80" height="35" fill="#4ecdc4" rx="5"/>
      <text x="40" y="22" fill="#fff" font-family="Consolas, monospace" font-size="11" text-anchor="middle">conf</text>
    </g>
    <g transform="translate(550, 45)">
      <rect x="0" y="0" width="80" height="35" fill="#ffd93d" rx="5"/>
      <text x="40" y="22" fill="#000" font-family="Consolas, monospace" font-size="11" text-anchor="middle">class</text>
    </g>
    
    <text x="720" y="68" fill="#888" font-family="Consolas, monospace" font-size="11">
      max_det = 300
    </text>
  </g>
  
  <!-- Settings -->
  <g transform="translate(50, 550)">
    <rect x="0" y="0" width="900" height="80" rx="10" fill="#1a1a2e" stroke="#666" stroke-width="1"/>
    <text x="20" y="25" fill="#ffd93d" font-family="Consolas, monospace" font-size="12" font-weight="bold">
      Key Parameters:
    </text>
    <text x="20" y="50" fill="#ccc" font-family="Consolas, monospace" font-size="11">
      conf_threshold = 0.25 | iou_threshold = 0.45 | max_det = 300 | max_nms = 30000 | max_wh = 7680
    </text>
    <text x="20" y="70" fill="#888" font-family="Consolas, monospace" font-size="10">
      Time limit: 0.5s + 0.05s per image to prevent slowdown on edge cases
    </text>
  </g>
</svg>

