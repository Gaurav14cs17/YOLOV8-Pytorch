<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
    <linearGradient id="bgMetrics" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="550" fill="url(#bgMetrics)"/>
  
  <!-- Title -->
  <text x="450" y="35" fill="#fff" font-family="Georgia, serif" font-size="24" text-anchor="middle" font-weight="bold">
    Precision-Recall and Average Precision
  </text>
  
  <!-- Confusion Matrix Visual -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="350" height="200" rx="10" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="175" y="25" fill="#4ecdc4" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      Detection Outcomes
    </text>
    
    <!-- 2x2 Grid -->
    <g transform="translate(50, 45)">
      <!-- Labels -->
      <text x="70" y="15" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Predicted</text>
      <text x="70" y="28" fill="#4ecdc4" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Positive</text>
      <text x="170" y="28" fill="#ff6b6b" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Negative</text>
      
      <text x="-10" y="70" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="end" transform="rotate(-90, -10, 70)">Actual</text>
      <text x="10" y="70" fill="#4ecdc4" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Pos</text>
      <text x="10" y="120" fill="#ff6b6b" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Neg</text>
      
      <!-- TP -->
      <rect x="20" y="40" width="100" height="50" fill="#4ecdc4" rx="5"/>
      <text x="70" y="70" fill="#000" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">TP</text>
      
      <!-- FN -->
      <rect x="130" y="40" width="100" height="50" fill="#ff6b6b" fill-opacity="0.5" rx="5"/>
      <text x="180" y="70" fill="#fff" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">FN</text>
      
      <!-- FP -->
      <rect x="20" y="100" width="100" height="50" fill="#ffd93d" fill-opacity="0.5" rx="5"/>
      <text x="70" y="130" fill="#000" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">FP</text>
      
      <!-- TN -->
      <rect x="130" y="100" width="100" height="50" fill="#666" rx="5"/>
      <text x="180" y="130" fill="#fff" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">TN</text>
    </g>
  </g>
  
  <!-- Formulas -->
  <g transform="translate(430, 70)">
    <rect x="0" y="0" width="420" height="200" rx="10" fill="#252547" stroke="#ffd93d" stroke-width="2"/>
    <text x="210" y="25" fill="#ffd93d" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      Key Metrics
    </text>
    
    <!-- Precision -->
    <rect x="20" y="45" width="180" height="60" rx="8" fill="#1a1a2e"/>
    <text x="110" y="65" fill="#4ecdc4" font-family="Georgia, serif" font-size="14" text-anchor="middle">Precision</text>
    <text x="110" y="90" fill="#fff" font-family="Georgia, serif" font-size="14" text-anchor="middle">
      TP / (TP + FP)
    </text>
    
    <!-- Recall -->
    <rect x="220" y="45" width="180" height="60" rx="8" fill="#1a1a2e"/>
    <text x="310" y="65" fill="#ff6b6b" font-family="Georgia, serif" font-size="14" text-anchor="middle">Recall</text>
    <text x="310" y="90" fill="#fff" font-family="Georgia, serif" font-size="14" text-anchor="middle">
      TP / (TP + FN)
    </text>
    
    <!-- F1 Score -->
    <rect x="20" y="120" width="380" height="60" rx="8" fill="#1a1a2e"/>
    <text x="210" y="145" fill="#ffd93d" font-family="Georgia, serif" font-size="14" text-anchor="middle">F1 Score = 2 * Precision * Recall / (Precision + Recall)</text>
    <text x="210" y="170" fill="#888" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">
      Harmonic mean of Precision and Recall
    </text>
  </g>
  
  <!-- PR Curve -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="400" height="240" rx="10" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
    <text x="200" y="25" fill="#fff" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      Precision-Recall Curve
    </text>
    
    <!-- Axes -->
    <line x1="60" y1="200" x2="370" y2="200" stroke="#666" stroke-width="2"/>
    <line x1="60" y1="40" x2="60" y2="200" stroke="#666" stroke-width="2"/>
    
    <text x="215" y="225" fill="#888" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Recall</text>
    <text x="25" y="120" fill="#888" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" transform="rotate(-90, 25, 120)">Precision</text>
    
    <!-- Axis labels -->
    <text x="60" y="215" fill="#666" font-family="Consolas, monospace" font-size="9" text-anchor="middle">0</text>
    <text x="370" y="215" fill="#666" font-family="Consolas, monospace" font-size="9" text-anchor="middle">1</text>
    <text x="55" y="200" fill="#666" font-family="Consolas, monospace" font-size="9" text-anchor="end">0</text>
    <text x="55" y="45" fill="#666" font-family="Consolas, monospace" font-size="9" text-anchor="end">1</text>
    
    <!-- PR Curve (typical shape) -->
    <path d="M60,45 Q100,50 150,60 Q200,80 250,100 Q300,140 350,180 L370,200" 
          stroke="#4ecdc4" stroke-width="3" fill="none"/>
    
    <!-- Shaded area (AP) -->
    <path d="M60,45 Q100,50 150,60 Q200,80 250,100 Q300,140 350,180 L370,200 L60,200 Z" 
          fill="#4ecdc4" fill-opacity="0.2"/>
    
    <text x="180" y="150" fill="#4ecdc4" font-family="Consolas, monospace" font-size="12" text-anchor="middle">
      AP = Area
    </text>
  </g>
  
  <!-- AP Explanation -->
  <g transform="translate(480, 290)">
    <rect x="0" y="0" width="370" height="240" rx="10" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="185" y="25" fill="#4ecdc4" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      Average Precision (AP)
    </text>
    
    <text x="20" y="55" fill="#ccc" font-family="Arial, sans-serif" font-size="11">
      AP = Area under PR curve
    </text>
    <text x="20" y="80" fill="#ccc" font-family="Arial, sans-serif" font-size="11">
      Computed using 101-point interpolation (COCO)
    </text>
    
    <rect x="20" y="100" width="330" height="50" rx="5" fill="#1a1a2e"/>
    <text x="185" y="120" fill="#ffd93d" font-family="Consolas, monospace" font-size="11" text-anchor="middle">
      AP@0.5: IoU threshold = 0.5
    </text>
    <text x="185" y="140" fill="#ffd93d" font-family="Consolas, monospace" font-size="11" text-anchor="middle">
      AP@0.5:0.95: Average over 10 IoU thresholds
    </text>
    
    <text x="20" y="175" fill="#4ecdc4" font-family="Consolas, monospace" font-size="12">mAP (mean AP):</text>
    <text x="20" y="195" fill="#888" font-family="Arial, sans-serif" font-size="10">
      Average AP across all classes
    </text>
    
    <text x="20" y="225" fill="#888" font-family="Consolas, monospace" font-size="10">
      Higher AP = Better detection performance
    </text>
  </g>
</svg>

