<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="bgInference" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="400" fill="url(#bgInference)"/>
  
  <!-- Title -->
  <text x="450" y="35" fill="#fff" font-family="Georgia, serif" font-size="24" text-anchor="middle" font-weight="bold">
    YOLOv8 Inference Pipeline
  </text>
  
  <!-- Pipeline -->
  <!-- Input Image -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="140" height="100" rx="10" fill="#252547" stroke="#888" stroke-width="2"/>
    <text x="70" y="30" fill="#fff" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">
      INPUT
    </text>
    <rect x="20" y="45" width="100" height="40" fill="#1a1a2e" rx="5"/>
    <text x="70" y="70" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      Image
    </text>
  </g>
  
  <!-- Arrow -->
  <path d="M200,120 L230,120" stroke="#4ecdc4" stroke-width="3"/>
  <polygon points="230,112 248,120 230,128" fill="#4ecdc4"/>
  
  <!-- Model -->
  <g transform="translate(260, 70)">
    <rect x="0" y="0" width="140" height="100" rx="10" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="70" y="30" fill="#4ecdc4" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">
      MODEL
    </text>
    <rect x="20" y="45" width="100" height="40" fill="#1a1a2e" rx="5"/>
    <text x="70" y="70" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
      YOLOv8
    </text>
  </g>
  
  <!-- Arrow -->
  <path d="M410,120 L440,120" stroke="#4ecdc4" stroke-width="3"/>
  <polygon points="440,112 458,120 440,128" fill="#4ecdc4"/>
  
  <!-- NMS -->
  <g transform="translate(470, 70)">
    <rect x="0" y="0" width="180" height="100" rx="10" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="90" y="25" fill="#ff6b6b" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">
      POST-PROCESS
    </text>
    <rect x="15" y="38" width="150" height="25" rx="5" fill="#1a1a2e"/>
    <text x="90" y="55" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
      non_max_suppression()
    </text>
    <text x="90" y="85" fill="#ff6b6b" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      bbox/
    </text>
  </g>
  
  <!-- Arrow -->
  <path d="M660,120 L690,120" stroke="#4ecdc4" stroke-width="3"/>
  <polygon points="690,112 708,120 690,128" fill="#4ecdc4"/>
  
  <!-- Scale -->
  <g transform="translate(720, 70)">
    <rect x="0" y="0" width="140" height="100" rx="10" fill="#252547" stroke="#ffd93d" stroke-width="2"/>
    <text x="70" y="25" fill="#ffd93d" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">
      SCALE
    </text>
    <rect x="15" y="38" width="110" height="25" rx="5" fill="#1a1a2e"/>
    <text x="70" y="55" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
      scale()
    </text>
    <text x="70" y="85" fill="#ffd93d" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      bbox/
    </text>
  </g>
  
  <!-- Output Arrow -->
  <g transform="translate(790, 180)">
    <path d="M0,0 L0,30" stroke="#4ecdc4" stroke-width="3"/>
    <polygon points="-8,30 0,48 8,30" fill="#4ecdc4"/>
  </g>
  
  <!-- Output -->
  <g transform="translate(720, 240)">
    <rect x="0" y="0" width="140" height="80" rx="10" fill="#4ecdc4" stroke="#fff" stroke-width="2"/>
    <text x="70" y="30" fill="#000" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">
      OUTPUT
    </text>
    <text x="70" y="55" fill="#000" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      [x1, y1, x2, y2,
    </text>
    <text x="70" y="70" fill="#000" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      conf, class]
    </text>
  </g>
  
  <!-- NMS Details -->
  <g transform="translate(50, 200)">
    <rect x="0" y="0" width="620" height="180" rx="10" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
    <text x="310" y="25" fill="#fff" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      Non-Maximum Suppression Details
    </text>
    
    <!-- Step boxes -->
    <g transform="translate(20, 45)">
      <rect x="0" y="0" width="130" height="55" rx="5" fill="#252547" stroke="#ff6b6b" stroke-width="1"/>
      <text x="65" y="20" fill="#ff6b6b" font-family="Consolas, monospace" font-size="10" text-anchor="middle">1. Filter</text>
      <text x="65" y="38" fill="#888" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">conf &gt; 0.25</text>
      <text x="65" y="50" fill="#666" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">8400 to ~500</text>
    </g>
    
    <g transform="translate(170, 45)">
      <rect x="0" y="0" width="130" height="55" rx="5" fill="#252547" stroke="#4ecdc4" stroke-width="1"/>
      <text x="65" y="20" fill="#4ecdc4" font-family="Consolas, monospace" font-size="10" text-anchor="middle">2. Convert</text>
      <text x="65" y="38" fill="#888" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">wh2xy()</text>
      <text x="65" y="50" fill="#666" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">CXCYWH to XYXY</text>
    </g>
    
    <g transform="translate(320, 45)">
      <rect x="0" y="0" width="130" height="55" rx="5" fill="#252547" stroke="#ffd93d" stroke-width="1"/>
      <text x="65" y="20" fill="#ffd93d" font-family="Consolas, monospace" font-size="10" text-anchor="middle">3. Sort</text>
      <text x="65" y="38" fill="#888" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">by confidence</text>
      <text x="65" y="50" fill="#666" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">descending</text>
    </g>
    
    <g transform="translate(470, 45)">
      <rect x="0" y="0" width="130" height="55" rx="5" fill="#252547" stroke="#ff6b6b" stroke-width="1"/>
      <text x="65" y="20" fill="#ff6b6b" font-family="Consolas, monospace" font-size="10" text-anchor="middle">4. NMS</text>
      <text x="65" y="38" fill="#888" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">IoU &gt; 0.45</text>
      <text x="65" y="50" fill="#666" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">suppress</text>
    </g>
    
    <!-- Parameters -->
    <g transform="translate(20, 115)">
      <text x="0" y="15" fill="#4ecdc4" font-family="Consolas, monospace" font-size="11">Parameters:</text>
      <text x="100" y="15" fill="#ccc" font-family="Consolas, monospace" font-size="10">conf_threshold=0.25</text>
      <text x="270" y="15" fill="#ccc" font-family="Consolas, monospace" font-size="10">iou_threshold=0.45</text>
      <text x="420" y="15" fill="#ccc" font-family="Consolas, monospace" font-size="10">max_det=300</text>
      
      <text x="0" y="40" fill="#ffd93d" font-family="Consolas, monospace" font-size="11">Output:</text>
      <text x="70" y="40" fill="#ccc" font-family="Consolas, monospace" font-size="10">List[Tensor[N, 6]] - [x1, y1, x2, y2, confidence, class_id] per image</text>
    </g>
  </g>
</svg>

