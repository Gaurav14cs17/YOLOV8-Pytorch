<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400">
  <defs>
    <linearGradient id="bgOverview" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="400" fill="url(#bgOverview)"/>
  
  <!-- Title -->
  <text x="500" y="40" fill="#fff" font-family="Georgia, serif" font-size="28" text-anchor="middle" font-weight="bold">
    YOLOv8 Utils Package Architecture
  </text>
  
  <!-- Main utils box -->
  <g transform="translate(350, 70)">
    <rect x="0" y="0" width="300" height="60" rx="10" fill="#4ecdc4" stroke="#fff" stroke-width="2"/>
    <text x="150" y="38" fill="#000" font-family="Consolas, monospace" font-size="20" text-anchor="middle" font-weight="bold">
      utils/
    </text>
  </g>
  
  <!-- Connection lines -->
  <g stroke="#666" stroke-width="2">
    <line x1="500" y1="130" x2="500" y2="160"/>
    <line x1="150" y1="160" x2="850" y2="160"/>
    <line x1="150" y1="160" x2="150" y2="190"/>
    <line x1="325" y1="160" x2="325" y2="190"/>
    <line x1="500" y1="160" x2="500" y2="190"/>
    <line x1="675" y1="160" x2="675" y2="190"/>
    <line x1="850" y1="160" x2="850" y2="190"/>
  </g>
  
  <!-- Module boxes - Row 1 -->
  <!-- Assigner -->
  <g transform="translate(50, 190)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="100" y="25" fill="#ff6b6b" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      assigner/
    </text>
    <text x="100" y="48" fill="#ccc" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">
      TaskAlignedAssigner
    </text>
    <text x="100" y="68" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      Dynamic label assignment
    </text>
  </g>
  
  <!-- BBox -->
  <g transform="translate(225, 190)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="100" y="25" fill="#4ecdc4" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      bbox/
    </text>
    <text x="100" y="48" fill="#ccc" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">
      IoU, NMS, Anchors
    </text>
    <text x="100" y="68" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      Box operations
    </text>
  </g>
  
  <!-- Loss -->
  <g transform="translate(400, 190)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="#252547" stroke="#ffd93d" stroke-width="2"/>
    <text x="100" y="25" fill="#ffd93d" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      loss/
    </text>
    <text x="100" y="48" fill="#ccc" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">
      BCE + CIoU + DFL
    </text>
    <text x="100" y="68" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      Loss computation
    </text>
  </g>
  
  <!-- EMA -->
  <g transform="translate(575, 190)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="100" y="25" fill="#ff6b6b" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      ema/
    </text>
    <text x="100" y="48" fill="#ccc" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">
      EMA Class
    </text>
    <text x="100" y="68" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      Weight averaging
    </text>
  </g>
  
  <!-- Metrics -->
  <g transform="translate(750, 190)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="100" y="25" fill="#4ecdc4" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      metrics/
    </text>
    <text x="100" y="48" fill="#ccc" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">
      AP, Precision, Recall
    </text>
    <text x="100" y="68" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      COCO evaluation
    </text>
  </g>
  
  <!-- Row 2 connection -->
  <g stroke="#666" stroke-width="2">
    <line x1="150" y1="270" x2="150" y2="300"/>
    <line x1="500" y1="270" x2="500" y2="300"/>
    <line x1="850" y1="270" x2="850" y2="300"/>
  </g>
  
  <!-- Module boxes - Row 2 -->
  <!-- Env -->
  <g transform="translate(50, 300)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="#252547" stroke="#ffd93d" stroke-width="2"/>
    <text x="100" y="25" fill="#ffd93d" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      env/
    </text>
    <text x="100" y="48" fill="#ccc" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">
      setup_seed, setup_multi
    </text>
    <text x="100" y="68" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      Environment config
    </text>
  </g>
  
  <!-- Meters -->
  <g transform="translate(400, 300)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="100" y="25" fill="#4ecdc4" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      meters/
    </text>
    <text x="100" y="48" fill="#ccc" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">
      AverageMeter
    </text>
    <text x="100" y="68" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      Training statistics
    </text>
  </g>
  
  <!-- Model Utils -->
  <g transform="translate(750, 300)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="100" y="25" fill="#ff6b6b" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      model_utils/
    </text>
    <text x="100" y="48" fill="#ccc" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">
      strip_optimizer, clip_grad
    </text>
    <text x="100" y="68" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      Model utilities
    </text>
  </g>
  
</svg>
