<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <!-- Background -->
  <rect width="900" height="600" fill="#0F172A"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="22" font-weight="bold">
    Step 5: Complete Assigner Flow
  </text>
  
  <!-- Flow diagram -->
  <defs>
    <marker id="flowArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60A5FA"/>
    </marker>
  </defs>
  
  <!-- Step 1: Inputs -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="#1E293B" stroke="#8B5CF6" stroke-width="2"/>
    <text x="80" y="25" text-anchor="middle" fill="#A78BFA" font-family="Arial, sans-serif" font-size="12" font-weight="bold">1. INPUTS</text>
    <text x="80" y="45" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="9">pred_scores [B,8400,NC]</text>
    <text x="80" y="58" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="9">pred_bboxes [B,8400,4]</text>
    <text x="80" y="71" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="9">gt_bboxes [B,N,4]</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M 220,110 L 260,110" stroke="#60A5FA" stroke-width="2" marker-end="url(#flowArrow)"/>
  
  <!-- Step 2: IoU -->
  <g transform="translate(270, 70)">
    <rect x="0" y="0" width="140" height="80" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="2"/>
    <text x="70" y="25" text-anchor="middle" fill="#60A5FA" font-family="Arial, sans-serif" font-size="12" font-weight="bold">2. COMPUTE IoU</text>
    <text x="70" y="48" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="9">CIoU(pred, gt)</text>
    <text x="70" y="65" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="8">[B, N, 8400]</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M 420,110 L 460,110" stroke="#60A5FA" stroke-width="2" marker-end="url(#flowArrow)"/>
  
  <!-- Step 3: Alignment -->
  <g transform="translate(470, 70)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="2"/>
    <text x="80" y="25" text-anchor="middle" fill="#34D399" font-family="Arial, sans-serif" font-size="12" font-weight="bold">3. ALIGN METRIC</text>
    <text x="80" y="48" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="9">score^α × IoU^β</text>
    <text x="80" y="65" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="8">[B, N, 8400]</text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M 640,110 L 680,110" stroke="#60A5FA" stroke-width="2" marker-end="url(#flowArrow)"/>
  
  <!-- Step 4: Top-K -->
  <g transform="translate(690, 70)">
    <rect x="0" y="0" width="140" height="80" rx="8" fill="#1E293B" stroke="#F59E0B" stroke-width="2"/>
    <text x="70" y="25" text-anchor="middle" fill="#FBBF24" font-family="Arial, sans-serif" font-size="12" font-weight="bold">4. TOP-K</text>
    <text x="70" y="48" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="9">Select k=10 best</text>
    <text x="70" y="65" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="8">per GT box</text>
  </g>
  
  <!-- Arrow down -->
  <path d="M 760,160 L 760,190" stroke="#60A5FA" stroke-width="2" marker-end="url(#flowArrow)"/>
  
  <!-- Step 5: Mask -->
  <g transform="translate(690, 200)">
    <rect x="0" y="0" width="140" height="80" rx="8" fill="#1E293B" stroke="#EC4899" stroke-width="2"/>
    <text x="70" y="25" text-anchor="middle" fill="#F472B6" font-family="Arial, sans-serif" font-size="12" font-weight="bold">5. MASK</text>
    <text x="70" y="48" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="9">top_k ∩ inside_gt</text>
    <text x="70" y="65" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="8">mask_pos [B,N,8400]</text>
  </g>
  
  <!-- Arrow left -->
  <path d="M 680,240 L 640,240" stroke="#60A5FA" stroke-width="2" marker-end="url(#flowArrow)"/>
  
  <!-- Step 6: Resolve -->
  <g transform="translate(470, 200)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="#1E293B" stroke="#EF4444" stroke-width="2"/>
    <text x="80" y="25" text-anchor="middle" fill="#F87171" font-family="Arial, sans-serif" font-size="12" font-weight="bold">6. RESOLVE</text>
    <text x="80" y="45" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="9">Handle conflicts</text>
    <text x="80" y="58" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="9">(1 anchor to 2+ GTs)</text>
    <text x="80" y="71" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="8">Keep max IoU</text>
  </g>
  
  <!-- Arrow left -->
  <path d="M 460,240 L 420,240" stroke="#60A5FA" stroke-width="2" marker-end="url(#flowArrow)"/>
  
  <!-- Step 7: fg_mask -->
  <g transform="translate(270, 200)">
    <rect x="0" y="0" width="140" height="80" rx="8" fill="#1E293B" stroke="#6366F1" stroke-width="2"/>
    <text x="70" y="25" text-anchor="middle" fill="#818CF8" font-family="Arial, sans-serif" font-size="12" font-weight="bold">7. FG_MASK</text>
    <text x="70" y="48" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="9">Sum over GTs</text>
    <text x="70" y="65" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="8">[B, 8400] bool</text>
  </g>
  
  <!-- Arrow left -->
  <path d="M 260,240 L 220,240" stroke="#60A5FA" stroke-width="2" marker-end="url(#flowArrow)"/>
  
  <!-- Step 8: Outputs -->
  <g transform="translate(50, 200)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="#065F46" stroke="#10B981" stroke-width="2"/>
    <text x="80" y="25" text-anchor="middle" fill="#34D399" font-family="Arial, sans-serif" font-size="12" font-weight="bold">8. OUTPUTS</text>
    <text x="80" y="45" text-anchor="middle" fill="#D1FAE5" font-family="monospace" font-size="9">target_bboxes</text>
    <text x="80" y="58" text-anchor="middle" fill="#D1FAE5" font-family="monospace" font-size="9">target_scores</text>
    <text x="80" y="71" text-anchor="middle" fill="#D1FAE5" font-family="monospace" font-size="9">fg_mask</text>
  </g>
  
  <!-- Visual Grid Example -->
  <g transform="translate(50, 320)">
    <text x="400" y="0" text-anchor="middle" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Visual: Grid Assignment Result
    </text>
    
    <!-- Image grid -->
    <rect x="100" y="20" width="200" height="200" rx="4" fill="#1E3A8A" opacity="0.3"/>
    
    <!-- Grid lines -->
    <g stroke="#3B82F6" stroke-width="0.5" opacity="0.3">
      <line x1="125" y1="20" x2="125" y2="220"/><line x1="150" y1="20" x2="150" y2="220"/>
      <line x1="175" y1="20" x2="175" y2="220"/><line x1="200" y1="20" x2="200" y2="220"/>
      <line x1="225" y1="20" x2="225" y2="220"/><line x1="250" y1="20" x2="250" y2="220"/>
      <line x1="275" y1="20" x2="275" y2="220"/>
      <line x1="100" y1="45" x2="300" y2="45"/><line x1="100" y1="70" x2="300" y2="70"/>
      <line x1="100" y1="95" x2="300" y2="95"/><line x1="100" y1="120" x2="300" y2="120"/>
      <line x1="100" y1="145" x2="300" y2="145"/><line x1="100" y1="170" x2="300" y2="170"/>
      <line x1="100" y1="195" x2="300" y2="195"/>
    </g>
    
    <!-- GT Box 1 (red) -->
    <rect x="125" y="45" width="75" height="75" fill="none" stroke="#EF4444" stroke-width="2"/>
    <text x="162" y="40" text-anchor="middle" fill="#EF4444" font-family="Arial, sans-serif" font-size="10">GT₀</text>
    
    <!-- Positive anchors for GT1 -->
    <circle cx="137" cy="57" r="6" fill="#EF4444" opacity="0.7"/>
    <circle cx="162" cy="57" r="6" fill="#EF4444" opacity="0.7"/>
    <circle cx="187" cy="57" r="6" fill="#EF4444" opacity="0.7"/>
    <circle cx="137" cy="82" r="6" fill="#EF4444" opacity="0.7"/>
    <circle cx="162" cy="82" r="6" fill="#EF4444" opacity="0.7"/>
    <circle cx="187" cy="82" r="6" fill="#EF4444" opacity="0.7"/>
    <circle cx="137" cy="107" r="6" fill="#EF4444" opacity="0.7"/>
    <circle cx="162" cy="107" r="6" fill="#EF4444" opacity="0.7"/>
    <circle cx="187" cy="107" r="6" fill="#EF4444" opacity="0.7"/>
    
    <!-- GT Box 2 (green) -->
    <rect x="200" y="120" width="75" height="75" fill="none" stroke="#10B981" stroke-width="2"/>
    <text x="237" y="115" text-anchor="middle" fill="#10B981" font-family="Arial, sans-serif" font-size="10">GT₁</text>
    
    <!-- Positive anchors for GT2 -->
    <circle cx="212" cy="132" r="6" fill="#10B981" opacity="0.7"/>
    <circle cx="237" cy="132" r="6" fill="#10B981" opacity="0.7"/>
    <circle cx="262" cy="132" r="6" fill="#10B981" opacity="0.7"/>
    <circle cx="212" cy="157" r="6" fill="#10B981" opacity="0.7"/>
    <circle cx="237" cy="157" r="6" fill="#10B981" opacity="0.7"/>
    <circle cx="262" cy="157" r="6" fill="#10B981" opacity="0.7"/>
    <circle cx="212" cy="182" r="6" fill="#10B981" opacity="0.7"/>
    <circle cx="237" cy="182" r="6" fill="#10B981" opacity="0.7"/>
    <circle cx="262" cy="182" r="6" fill="#10B981" opacity="0.7"/>
    
    <!-- Negative anchors (gray dots) -->
    <g fill="#475569" opacity="0.5">
      <circle cx="112" cy="32" r="3"/><circle cx="137" cy="32" r="3"/><circle cx="162" cy="32" r="3"/>
      <circle cx="187" cy="32" r="3"/><circle cx="212" cy="32" r="3"/><circle cx="237" cy="32" r="3"/>
      <circle cx="262" cy="32" r="3"/><circle cx="287" cy="32" r="3"/>
      <circle cx="112" cy="207" r="3"/><circle cx="137" cy="207" r="3"/><circle cx="162" cy="207" r="3"/>
      <circle cx="287" cy="207" r="3"/>
    </g>
    
    <!-- Legend -->
    <g transform="translate(350, 40)">
      <rect x="0" y="0" width="200" height="160" rx="8" fill="#1E293B" stroke="#334155"/>
      <text x="100" y="25" text-anchor="middle" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Legend</text>
      
      <circle cx="20" cy="55" r="6" fill="#EF4444"/>
      <text x="35" y="60" fill="#94A3B8" font-family="Arial, sans-serif" font-size="10">Positive for GT₀</text>
      
      <circle cx="20" cy="85" r="6" fill="#10B981"/>
      <text x="35" y="90" fill="#94A3B8" font-family="Arial, sans-serif" font-size="10">Positive for GT₁</text>
      
      <circle cx="20" cy="115" r="4" fill="#475569"/>
      <text x="35" y="120" fill="#94A3B8" font-family="Arial, sans-serif" font-size="10">Negative (background)</text>
      
      <rect x="14" y="135" width="12" height="12" fill="none" stroke="#EF4444" stroke-width="2"/>
      <text x="35" y="147" fill="#94A3B8" font-family="Arial, sans-serif" font-size="10">Ground Truth Box</text>
    </g>
    
    <!-- Stats -->
    <g transform="translate(600, 40)">
      <rect x="0" y="0" width="180" height="160" rx="8" fill="#1E293B" stroke="#334155"/>
      <text x="90" y="25" text-anchor="middle" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Assignment Stats</text>
      
      <text x="20" y="55" fill="#94A3B8" font-family="Arial, sans-serif" font-size="10">Total Anchors:</text>
      <text x="160" y="55" text-anchor="end" fill="#F8FAFC" font-family="monospace" font-size="10">8400</text>
      
      <text x="20" y="80" fill="#94A3B8" font-family="Arial, sans-serif" font-size="10">Positive (GT₀):</text>
      <text x="160" y="80" text-anchor="end" fill="#EF4444" font-family="monospace" font-size="10">9</text>
      
      <text x="20" y="105" fill="#94A3B8" font-family="Arial, sans-serif" font-size="10">Positive (GT₁):</text>
      <text x="160" y="105" text-anchor="end" fill="#10B981" font-family="monospace" font-size="10">9</text>
      
      <text x="20" y="130" fill="#94A3B8" font-family="Arial, sans-serif" font-size="10">Negative:</text>
      <text x="160" y="130" text-anchor="end" fill="#64748B" font-family="monospace" font-size="10">8382</text>
      
      <text x="20" y="150" fill="#64748B" font-family="Arial, sans-serif" font-size="9">(Only ~0.2% are positive!)</text>
    </g>
  </g>
</svg>

