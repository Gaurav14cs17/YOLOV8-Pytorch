<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="tensorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F87171;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="600" fill="#0F172A"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="24" font-weight="bold">
    Step 1: Input Tensors Structure
  </text>
  
  <!-- pred_scores tensor -->
  <g transform="translate(50, 80)">
    <text x="100" y="0" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="14">pred_scores</text>
    <rect x="0" y="10" width="200" height="150" rx="8" fill="url(#scoreGrad)" opacity="0.9"/>
    <text x="100" y="50" text-anchor="middle" fill="white" font-family="monospace" font-size="12">[Batch, Anchors, Classes]</text>
    <text x="100" y="75" text-anchor="middle" fill="white" font-family="monospace" font-size="11">[B, 8400, 80]</text>
    
    <!-- Dimension breakdown -->
    <rect x="10" y="95" width="180" height="55" rx="4" fill="rgba(255,255,255,0.1)"/>
    <text x="100" y="115" text-anchor="middle" fill="#D1FAE5" font-family="monospace" font-size="10">B = batch size</text>
    <text x="100" y="130" text-anchor="middle" fill="#D1FAE5" font-family="monospace" font-size="10">8400 = 80×80 + 40×40 + 20×20</text>
    <text x="100" y="145" text-anchor="middle" fill="#D1FAE5" font-family="monospace" font-size="10">80 = num_classes (COCO)</text>
  </g>
  
  <!-- pred_bboxes tensor -->
  <g transform="translate(280, 80)">
    <text x="100" y="0" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="14">pred_bboxes</text>
    <rect x="0" y="10" width="200" height="150" rx="8" fill="url(#tensorGrad)" opacity="0.9"/>
    <text x="100" y="50" text-anchor="middle" fill="white" font-family="monospace" font-size="12">[Batch, Anchors, 4]</text>
    <text x="100" y="75" text-anchor="middle" fill="white" font-family="monospace" font-size="11">[B, 8400, 4]</text>
    
    <!-- Box format -->
    <rect x="10" y="95" width="180" height="55" rx="4" fill="rgba(255,255,255,0.1)"/>
    <text x="100" y="115" text-anchor="middle" fill="#C7D2FE" font-family="monospace" font-size="10">4 = (x1, y1, x2, y2)</text>
    <text x="100" y="130" text-anchor="middle" fill="#C7D2FE" font-family="monospace" font-size="10">Corner format</text>
    <text x="100" y="145" text-anchor="middle" fill="#C7D2FE" font-family="monospace" font-size="10">Absolute coordinates</text>
  </g>
  
  <!-- true_bboxes tensor -->
  <g transform="translate(510, 80)">
    <text x="100" y="0" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="14">true_bboxes (GT)</text>
    <rect x="0" y="10" width="200" height="150" rx="8" fill="url(#gtGrad)" opacity="0.9"/>
    <text x="100" y="50" text-anchor="middle" fill="white" font-family="monospace" font-size="12">[Batch, MaxBoxes, 4]</text>
    <text x="100" y="75" text-anchor="middle" fill="white" font-family="monospace" font-size="11">[B, N, 4]</text>
    
    <rect x="10" y="95" width="180" height="55" rx="4" fill="rgba(255,255,255,0.1)"/>
    <text x="100" y="115" text-anchor="middle" fill="#FECACA" font-family="monospace" font-size="10">N = max GT boxes in batch</text>
    <text x="100" y="130" text-anchor="middle" fill="#FECACA" font-family="monospace" font-size="10">Padded with zeros</text>
    <text x="100" y="145" text-anchor="middle" fill="#FECACA" font-family="monospace" font-size="10">if fewer objects</text>
  </g>
  
  <!-- Anchors tensor -->
  <g transform="translate(740, 80)">
    <text x="75" y="0" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="14">anchors</text>
    <rect x="0" y="10" width="150" height="150" rx="8" fill="#F59E0B" opacity="0.9"/>
    <text x="75" y="50" text-anchor="middle" fill="white" font-family="monospace" font-size="12">[Anchors, 2]</text>
    <text x="75" y="75" text-anchor="middle" fill="white" font-family="monospace" font-size="11">[8400, 2]</text>
    
    <rect x="10" y="95" width="130" height="55" rx="4" fill="rgba(255,255,255,0.1)"/>
    <text x="75" y="115" text-anchor="middle" fill="#FEF3C7" font-family="monospace" font-size="10">2 = (x, y)</text>
    <text x="75" y="130" text-anchor="middle" fill="#FEF3C7" font-family="monospace" font-size="10">Grid center</text>
    <text x="75" y="145" text-anchor="middle" fill="#FEF3C7" font-family="monospace" font-size="10">positions</text>
  </g>
  
  <!-- 8400 Anchors Breakdown -->
  <g transform="translate(50, 280)">
    <text x="400" y="0" text-anchor="middle" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="18" font-weight="bold">
      8400 Anchors = Multi-Scale Feature Grid
    </text>
    
    <!-- Scale 1: 80x80 -->
    <g transform="translate(0, 30)">
      <rect x="0" y="0" width="200" height="120" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="2"/>
      <text x="100" y="25" text-anchor="middle" fill="#60A5FA" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Scale 1 (P3)</text>
      <text x="100" y="50" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="12">80 × 80 = 6400</text>
      <text x="100" y="70" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="10">stride = 8</text>
      <text x="100" y="90" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="10">Small objects</text>
      
      <!-- Mini grid -->
      <g transform="translate(70, 95)">
        <rect x="0" y="0" width="60" height="15" fill="#3B82F6" opacity="0.3" rx="2"/>
      </g>
    </g>
    
    <!-- Scale 2: 40x40 -->
    <g transform="translate(250, 30)">
      <rect x="0" y="0" width="200" height="120" rx="8" fill="#1E293B" stroke="#8B5CF6" stroke-width="2"/>
      <text x="100" y="25" text-anchor="middle" fill="#A78BFA" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Scale 2 (P4)</text>
      <text x="100" y="50" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="12">40 × 40 = 1600</text>
      <text x="100" y="70" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="10">stride = 16</text>
      <text x="100" y="90" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="10">Medium objects</text>
      
      <g transform="translate(70, 95)">
        <rect x="0" y="0" width="60" height="15" fill="#8B5CF6" opacity="0.3" rx="2"/>
      </g>
    </g>
    
    <!-- Scale 3: 20x20 -->
    <g transform="translate(500, 30)">
      <rect x="0" y="0" width="200" height="120" rx="8" fill="#1E293B" stroke="#EC4899" stroke-width="2"/>
      <text x="100" y="25" text-anchor="middle" fill="#F472B6" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Scale 3 (P5)</text>
      <text x="100" y="50" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="12">20 × 20 = 400</text>
      <text x="100" y="70" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="10">stride = 32</text>
      <text x="100" y="90" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="10">Large objects</text>
      
      <g transform="translate(70, 95)">
        <rect x="0" y="0" width="60" height="15" fill="#EC4899" opacity="0.3" rx="2"/>
      </g>
    </g>
    
    <!-- Sum -->
    <g transform="translate(750, 30)">
      <rect x="0" y="0" width="100" height="120" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="2"/>
      <text x="50" y="25" text-anchor="middle" fill="#34D399" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Total</text>
      <text x="50" y="60" text-anchor="middle" fill="#F8FAFC" font-family="monospace" font-size="16" font-weight="bold">8400</text>
      <text x="50" y="85" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="9">anchor</text>
      <text x="50" y="100" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="9">positions</text>
    </g>
  </g>
  
  <!-- Footer note -->
  <g transform="translate(50, 480)">
    <rect x="0" y="0" width="800" height="100" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="20" y="25" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Key Concept:</text>
    <text x="20" y="50" fill="#94A3B8" font-family="Arial, sans-serif" font-size="12">Each anchor point represents a grid cell center. The assigner's job is to match</text>
    <text x="20" y="70" fill="#94A3B8" font-family="Arial, sans-serif" font-size="12">ground truth boxes to these 8400 anchor positions based on alignment metrics.</text>
    <text x="20" y="90" fill="#64748B" font-family="monospace" font-size="11">Input: 640x640 image = Features at 3 scales = 8400 predictions per image</text>
  </g>
</svg>

