<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750">
  <defs>
    <linearGradient id="metricGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="750" fill="#0F172A"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="24" font-weight="bold">
    Step 3: Computing Alignment Metric
  </text>
  
  <!-- Formula Box -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="800" height="80" rx="8" fill="#1E293B" stroke="#8B5CF6" stroke-width="2"/>
    <text x="400" y="30" text-anchor="middle" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Task-Aligned Assignment Metric
    </text>
    <text x="400" y="60" text-anchor="middle" fill="#A78BFA" font-family="monospace" font-size="18">
      align_metric = pred_scores^α × IoU^β
    </text>
  </g>
  
  <!-- Component 1: Pred Scores -->
  <g transform="translate(50, 180)">
    <rect x="0" y="0" width="250" height="200" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="2"/>
    <text x="125" y="25" text-anchor="middle" fill="#10B981" font-family="Arial, sans-serif" font-size="14" font-weight="bold">pred_scores^α</text>
    <text x="125" y="45" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="10">(α = 0.5)</text>
    
    <!-- Explanation -->
    <text x="20" y="75" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11">Classification confidence</text>
    <text x="20" y="95" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11">for each anchor-GT pair</text>
    
    <!-- Visual: Score bar -->
    <rect x="20" y="115" width="210" height="20" rx="4" fill="#1F2937"/>
    <rect x="20" y="115" width="168" height="20" rx="4" fill="#10B981" opacity="0.8"/>
    <text x="200" y="130" fill="#F8FAFC" font-family="monospace" font-size="10">0.8</text>
    
    <!-- After power -->
    <text x="20" y="155" fill="#64748B" font-family="Arial, sans-serif" font-size="10">After α=0.5 power:</text>
    <rect x="20" y="165" width="210" height="20" rx="4" fill="#1F2937"/>
    <rect x="20" y="165" width="188" height="20" rx="4" fill="#34D399" opacity="0.8"/>
    <text x="200" y="180" fill="#F8FAFC" font-family="monospace" font-size="10">0.89</text>
  </g>
  
  <!-- Multiply symbol -->
  <g transform="translate(320, 260)">
    <text x="0" y="0" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="36" font-weight="bold">×</text>
  </g>
  
  <!-- Component 2: IoU -->
  <g transform="translate(370, 180)">
    <rect x="0" y="0" width="250" height="200" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="2"/>
    <text x="125" y="25" text-anchor="middle" fill="#3B82F6" font-family="Arial, sans-serif" font-size="14" font-weight="bold">IoU^β</text>
    <text x="125" y="45" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="10">(β = 6.0)</text>
    
    <!-- Explanation -->
    <text x="20" y="75" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11">Intersection over Union</text>
    <text x="20" y="95" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11">between pred_box and GT</text>
    
    <!-- Visual: IoU bar -->
    <rect x="20" y="115" width="210" height="20" rx="4" fill="#1F2937"/>
    <rect x="20" y="115" width="147" height="20" rx="4" fill="#3B82F6" opacity="0.8"/>
    <text x="200" y="130" fill="#F8FAFC" font-family="monospace" font-size="10">0.7</text>
    
    <!-- After power -->
    <text x="20" y="155" fill="#64748B" font-family="Arial, sans-serif" font-size="10">After β=6.0 power:</text>
    <rect x="20" y="165" width="210" height="20" rx="4" fill="#1F2937"/>
    <rect x="20" y="165" width="25" height="20" rx="4" fill="#60A5FA" opacity="0.8"/>
    <text x="200" y="180" fill="#F8FAFC" font-family="monospace" font-size="10">0.12</text>
  </g>
  
  <!-- Equals symbol -->
  <g transform="translate(640, 260)">
    <text x="0" y="0" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="36" font-weight="bold">=</text>
  </g>
  
  <!-- Result: Alignment Metric -->
  <g transform="translate(690, 180)">
    <rect x="0" y="0" width="160" height="200" rx="8" fill="#1E293B" stroke="#F59E0B" stroke-width="2"/>
    <text x="80" y="25" text-anchor="middle" fill="#F59E0B" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Metric</text>
    
    <text x="80" y="100" text-anchor="middle" fill="#F8FAFC" font-family="monospace" font-size="24" font-weight="bold">0.107</text>
    <text x="80" y="125" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="10">0.89 × 0.12</text>
    
    <rect x="20" y="150" width="120" height="30" rx="4" fill="#F59E0B" opacity="0.2"/>
    <text x="80" y="170" text-anchor="middle" fill="#FCD34D" font-family="Arial, sans-serif" font-size="11">Higher = Better</text>
  </g>
  
  <!-- Why these powers? -->
  <g transform="translate(50, 410)">
    <rect x="0" y="0" width="800" height="120" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="20" y="25" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Why α=0.5 and β=6.0?</text>
    
    <g transform="translate(20, 45)">
      <circle cx="8" cy="8" r="4" fill="#10B981"/>
      <text x="20" y="12" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11">α=0.5 (sqrt): Softens classification scores, preventing overconfident predictions from dominating</text>
    </g>
    
    <g transform="translate(20, 70)">
      <circle cx="8" cy="8" r="4" fill="#3B82F6"/>
      <text x="20" y="12" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11">β=6.0 (high power): Strongly emphasizes localization quality - only high IoU predictions survive</text>
    </g>
    
    <g transform="translate(20, 95)">
      <circle cx="8" cy="8" r="4" fill="#F59E0B"/>
      <text x="20" y="12" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11">Combined: Balances classification confidence with precise localization for optimal assignment</text>
    </g>
  </g>
  
  <!-- Metric Matrix Visualization -->
  <g transform="translate(50, 560)">
    <text x="400" y="0" text-anchor="middle" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Alignment Metric Matrix [Batch, NumGT, NumAnchors]
    </text>
    
    <rect x="0" y="20" width="800" height="160" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    
    <!-- Matrix header -->
    <text x="100" y="50" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="10">Anchors</text>
    <text x="30" y="100" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="10" transform="rotate(-90, 30, 100)">GT ↓</text>
    
    <!-- Heatmap grid -->
    <g transform="translate(80, 60)">
      <!-- GT 0 row -->
      <rect x="0" y="0" width="40" height="30" fill="#064E3B"/><text x="20" y="20" text-anchor="middle" fill="#6EE7B7" font-family="monospace" font-size="9">0.01</text>
      <rect x="45" y="0" width="40" height="30" fill="#065F46"/><text x="65" y="20" text-anchor="middle" fill="#6EE7B7" font-family="monospace" font-size="9">0.05</text>
      <rect x="90" y="0" width="40" height="30" fill="#047857"/><text x="110" y="20" text-anchor="middle" fill="#ECFDF5" font-family="monospace" font-size="9">0.21</text>
      <rect x="135" y="0" width="40" height="30" fill="#059669"/><text x="155" y="20" text-anchor="middle" fill="#ECFDF5" font-family="monospace" font-size="9">0.45</text>
      <rect x="180" y="0" width="40" height="30" fill="#10B981"/><text x="200" y="20" text-anchor="middle" fill="#ECFDF5" font-family="monospace" font-size="9" font-weight="bold">0.89</text>
      <rect x="225" y="0" width="40" height="30" fill="#34D399"/><text x="245" y="20" text-anchor="middle" fill="#064E3B" font-family="monospace" font-size="9" font-weight="bold">0.92</text>
      <rect x="270" y="0" width="40" height="30" fill="#047857"/><text x="290" y="20" text-anchor="middle" fill="#ECFDF5" font-family="monospace" font-size="9">0.34</text>
      <rect x="315" y="0" width="40" height="30" fill="#065F46"/><text x="335" y="20" text-anchor="middle" fill="#6EE7B7" font-family="monospace" font-size="9">0.08</text>
      
      <!-- GT 1 row -->
      <rect x="0" y="35" width="40" height="30" fill="#064E3B"/><text x="20" y="55" text-anchor="middle" fill="#6EE7B7" font-family="monospace" font-size="9">0.02</text>
      <rect x="45" y="35" width="40" height="30" fill="#064E3B"/><text x="65" y="55" text-anchor="middle" fill="#6EE7B7" font-family="monospace" font-size="9">0.01</text>
      <rect x="90" y="35" width="40" height="30" fill="#064E3B"/><text x="110" y="55" text-anchor="middle" fill="#6EE7B7" font-family="monospace" font-size="9">0.03</text>
      <rect x="135" y="35" width="40" height="30" fill="#065F46"/><text x="155" y="55" text-anchor="middle" fill="#6EE7B7" font-family="monospace" font-size="9">0.07</text>
      <rect x="180" y="35" width="40" height="30" fill="#065F46"/><text x="200" y="55" text-anchor="middle" fill="#6EE7B7" font-family="monospace" font-size="9">0.09</text>
      <rect x="225" y="35" width="40" height="30" fill="#047857"/><text x="245" y="55" text-anchor="middle" fill="#ECFDF5" font-family="monospace" font-size="9">0.28</text>
      <rect x="270" y="35" width="40" height="30" fill="#10B981"/><text x="290" y="55" text-anchor="middle" fill="#ECFDF5" font-family="monospace" font-size="9" font-weight="bold">0.76</text>
      <rect x="315" y="35" width="40" height="30" fill="#059669"/><text x="335" y="55" text-anchor="middle" fill="#ECFDF5" font-family="monospace" font-size="9">0.41</text>
      
      <!-- Labels -->
      <text x="-15" y="20" text-anchor="end" fill="#94A3B8" font-family="monospace" font-size="10">GT₀</text>
      <text x="-15" y="55" text-anchor="end" fill="#94A3B8" font-family="monospace" font-size="10">GT₁</text>
      
      <!-- Dots for more -->
      <text x="380" y="20" fill="#64748B" font-family="monospace" font-size="14">...</text>
      <text x="380" y="55" fill="#64748B" font-family="monospace" font-size="14">...</text>
      <text x="175" y="90" fill="#64748B" font-family="monospace" font-size="10">Select top-k anchors per GT based on this metric</text>
    </g>
    
    <!-- Color scale -->
    <g transform="translate(600, 60)">
      <rect x="0" y="0" width="150" height="15" rx="2" fill="url(#metricGrad)"/>
      <text x="0" y="30" fill="#64748B" font-family="monospace" font-size="9">0.0</text>
      <text x="70" y="30" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="9">0.5</text>
      <text x="145" y="30" text-anchor="end" fill="#64748B" font-family="monospace" font-size="9">1.0</text>
      <text x="75" y="50" text-anchor="middle" fill="#94A3B8" font-family="Arial, sans-serif" font-size="10">Alignment Score</text>
    </g>
  </g>
</svg>

