<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">
  <!-- Background -->
  <rect width="900" height="700" fill="#0F172A"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="24" font-weight="bold">
    Step 4: Top-K Selection &amp; Positive Mask
  </text>
  
  <!-- Top-K Selection Process -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="380" height="280" rx="8" fill="#1E293B" stroke="#8B5CF6" stroke-width="2"/>
    <text x="190" y="25" text-anchor="middle" fill="#A78BFA" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Top-K Selection (k=10)</text>
    
    <!-- Metric values for one GT -->
    <text x="20" y="55" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11">For GT₀: Alignment scores across 8400 anchors</text>
    
    <!-- Unsorted values -->
    <g transform="translate(20, 70)">
      <text x="0" y="0" fill="#64748B" font-family="monospace" font-size="10">Unsorted:</text>
      <g transform="translate(0, 10)">
        <rect x="0" y="0" width="35" height="25" rx="3" fill="#374151"/><text x="17" y="17" text-anchor="middle" fill="#9CA3AF" font-family="monospace" font-size="9">0.12</text>
        <rect x="40" y="0" width="35" height="25" rx="3" fill="#374151"/><text x="57" y="17" text-anchor="middle" fill="#9CA3AF" font-family="monospace" font-size="9">0.89</text>
        <rect x="80" y="0" width="35" height="25" rx="3" fill="#374151"/><text x="97" y="17" text-anchor="middle" fill="#9CA3AF" font-family="monospace" font-size="9">0.03</text>
        <rect x="120" y="0" width="35" height="25" rx="3" fill="#374151"/><text x="137" y="17" text-anchor="middle" fill="#9CA3AF" font-family="monospace" font-size="9">0.76</text>
        <rect x="160" y="0" width="35" height="25" rx="3" fill="#374151"/><text x="177" y="17" text-anchor="middle" fill="#9CA3AF" font-family="monospace" font-size="9">0.45</text>
        <rect x="200" y="0" width="35" height="25" rx="3" fill="#374151"/><text x="217" y="17" text-anchor="middle" fill="#9CA3AF" font-family="monospace" font-size="9">0.92</text>
        <rect x="240" y="0" width="35" height="25" rx="3" fill="#374151"/><text x="257" y="17" text-anchor="middle" fill="#9CA3AF" font-family="monospace" font-size="9">0.21</text>
        <text x="290" y="17" fill="#64748B" font-family="monospace" font-size="12">...</text>
      </g>
    </g>
    
    <!-- Arrow -->
    <path d="M 190,125 L 190,145" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrow2)"/>
    <defs>
      <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
      </marker>
    </defs>
    <text x="200" y="140" fill="#8B5CF6" font-family="monospace" font-size="10">torch.topk(k=10)</text>
    
    <!-- Sorted top-k values -->
    <g transform="translate(20, 160)">
      <text x="0" y="0" fill="#64748B" font-family="monospace" font-size="10">Top-10 (sorted desc):</text>
      <g transform="translate(0, 10)">
        <rect x="0" y="0" width="35" height="25" rx="3" fill="#10B981"/><text x="17" y="17" text-anchor="middle" fill="white" font-family="monospace" font-size="9" font-weight="bold">0.92</text>
        <rect x="40" y="0" width="35" height="25" rx="3" fill="#10B981"/><text x="57" y="17" text-anchor="middle" fill="white" font-family="monospace" font-size="9" font-weight="bold">0.89</text>
        <rect x="80" y="0" width="35" height="25" rx="3" fill="#10B981"/><text x="97" y="17" text-anchor="middle" fill="white" font-family="monospace" font-size="9" font-weight="bold">0.76</text>
        <rect x="120" y="0" width="35" height="25" rx="3" fill="#059669"/><text x="137" y="17" text-anchor="middle" fill="white" font-family="monospace" font-size="9">0.68</text>
        <rect x="160" y="0" width="35" height="25" rx="3" fill="#059669"/><text x="177" y="17" text-anchor="middle" fill="white" font-family="monospace" font-size="9">0.54</text>
        <rect x="200" y="0" width="35" height="25" rx="3" fill="#047857"/><text x="217" y="17" text-anchor="middle" fill="white" font-family="monospace" font-size="9">0.45</text>
        <rect x="240" y="0" width="35" height="25" rx="3" fill="#047857"/><text x="257" y="17" text-anchor="middle" fill="white" font-family="monospace" font-size="9">0.38</text>
        <text x="290" y="17" fill="#10B981" font-family="monospace" font-size="10">+3 more</text>
      </g>
    </g>
    
    <!-- Indices -->
    <g transform="translate(20, 215)">
      <text x="0" y="0" fill="#64748B" font-family="monospace" font-size="10">Top-K Indices:</text>
      <g transform="translate(0, 10)">
        <rect x="0" y="0" width="35" height="25" rx="3" fill="#1F2937" stroke="#F59E0B"/><text x="17" y="17" text-anchor="middle" fill="#FCD34D" font-family="monospace" font-size="9">5</text>
        <rect x="40" y="0" width="35" height="25" rx="3" fill="#1F2937" stroke="#F59E0B"/><text x="57" y="17" text-anchor="middle" fill="#FCD34D" font-family="monospace" font-size="9">1</text>
        <rect x="80" y="0" width="35" height="25" rx="3" fill="#1F2937" stroke="#F59E0B"/><text x="97" y="17" text-anchor="middle" fill="#FCD34D" font-family="monospace" font-size="9">3</text>
        <rect x="120" y="0" width="35" height="25" rx="3" fill="#1F2937" stroke="#F59E0B"/><text x="137" y="17" text-anchor="middle" fill="#FCD34D" font-family="monospace" font-size="9">42</text>
        <rect x="160" y="0" width="35" height="25" rx="3" fill="#1F2937" stroke="#F59E0B"/><text x="177" y="17" text-anchor="middle" fill="#FCD34D" font-family="monospace" font-size="9">18</text>
        <rect x="200" y="0" width="35" height="25" rx="3" fill="#1F2937" stroke="#F59E0B"/><text x="217" y="17" text-anchor="middle" fill="#FCD34D" font-family="monospace" font-size="9">4</text>
        <text x="260" y="17" fill="#F59E0B" font-family="monospace" font-size="10">...</text>
      </g>
      <text x="0" y="50" fill="#64748B" font-family="Arial, sans-serif" font-size="9">These anchor indices will be marked as positive for GT₀</text>
    </g>
  </g>
  
  <!-- Mask Creation -->
  <g transform="translate(470, 80)">
    <rect x="0" y="0" width="380" height="280" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="2"/>
    <text x="190" y="25" text-anchor="middle" fill="#60A5FA" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Creating Positive Mask</text>
    
    <!-- One-hot encoding -->
    <text x="20" y="55" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11">Convert indices to one-hot, Sum, Create mask</text>
    
    <!-- is_in_top_k visualization -->
    <g transform="translate(20, 75)">
      <text x="0" y="0" fill="#64748B" font-family="monospace" font-size="10">is_in_top_k [1, num_anchors]:</text>
      <g transform="translate(0, 15)">
        <!-- Anchor positions 0-9 -->
        <rect x="0" y="0" width="25" height="25" rx="2" fill="#1F2937" stroke="#334155"/>
        <text x="12" y="17" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">0</text>
        
        <rect x="28" y="0" width="25" height="25" rx="2" fill="#10B981"/>
        <text x="40" y="17" text-anchor="middle" fill="white" font-family="monospace" font-size="9" font-weight="bold">1</text>
        
        <rect x="56" y="0" width="25" height="25" rx="2" fill="#1F2937" stroke="#334155"/>
        <text x="68" y="17" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">0</text>
        
        <rect x="84" y="0" width="25" height="25" rx="2" fill="#10B981"/>
        <text x="96" y="17" text-anchor="middle" fill="white" font-family="monospace" font-size="9" font-weight="bold">1</text>
        
        <rect x="112" y="0" width="25" height="25" rx="2" fill="#10B981"/>
        <text x="124" y="17" text-anchor="middle" fill="white" font-family="monospace" font-size="9" font-weight="bold">1</text>
        
        <rect x="140" y="0" width="25" height="25" rx="2" fill="#10B981"/>
        <text x="152" y="17" text-anchor="middle" fill="white" font-family="monospace" font-size="9" font-weight="bold">1</text>
        
        <rect x="168" y="0" width="25" height="25" rx="2" fill="#1F2937" stroke="#334155"/>
        <text x="180" y="17" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">0</text>
        
        <text x="210" y="17" fill="#64748B" font-family="monospace" font-size="10">...</text>
        
        <!-- Index labels -->
        <text x="12" y="-5" text-anchor="middle" fill="#475569" font-family="monospace" font-size="7">0</text>
        <text x="40" y="-5" text-anchor="middle" fill="#10B981" font-family="monospace" font-size="7">1</text>
        <text x="68" y="-5" text-anchor="middle" fill="#475569" font-family="monospace" font-size="7">2</text>
        <text x="96" y="-5" text-anchor="middle" fill="#10B981" font-family="monospace" font-size="7">3</text>
        <text x="124" y="-5" text-anchor="middle" fill="#10B981" font-family="monospace" font-size="7">4</text>
        <text x="152" y="-5" text-anchor="middle" fill="#10B981" font-family="monospace" font-size="7">5</text>
        <text x="180" y="-5" text-anchor="middle" fill="#475569" font-family="monospace" font-size="7">6</text>
      </g>
    </g>
    
    <!-- Mask in GTs -->
    <g transform="translate(20, 145)">
      <text x="0" y="0" fill="#64748B" font-family="monospace" font-size="10">mask_in_gts (anchor inside GT box):</text>
      <g transform="translate(0, 15)">
        <rect x="0" y="0" width="25" height="25" rx="2" fill="#1F2937" stroke="#334155"/>
        <text x="12" y="17" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">0</text>
        
        <rect x="28" y="0" width="25" height="25" rx="2" fill="#1F2937" stroke="#334155"/>
        <text x="40" y="17" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">0</text>
        
        <rect x="56" y="0" width="25" height="25" rx="2" fill="#1F2937" stroke="#334155"/>
        <text x="68" y="17" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">0</text>
        
        <rect x="84" y="0" width="25" height="25" rx="2" fill="#F59E0B"/>
        <text x="96" y="17" text-anchor="middle" fill="white" font-family="monospace" font-size="9" font-weight="bold">1</text>
        
        <rect x="112" y="0" width="25" height="25" rx="2" fill="#F59E0B"/>
        <text x="124" y="17" text-anchor="middle" fill="white" font-family="monospace" font-size="9" font-weight="bold">1</text>
        
        <rect x="140" y="0" width="25" height="25" rx="2" fill="#F59E0B"/>
        <text x="152" y="17" text-anchor="middle" fill="white" font-family="monospace" font-size="9" font-weight="bold">1</text>
        
        <rect x="168" y="0" width="25" height="25" rx="2" fill="#F59E0B"/>
        <text x="180" y="17" text-anchor="middle" fill="white" font-family="monospace" font-size="9" font-weight="bold">1</text>
        
        <text x="210" y="17" fill="#64748B" font-family="monospace" font-size="10">...</text>
      </g>
    </g>
    
    <!-- Final mask_pos -->
    <g transform="translate(20, 215)">
      <text x="0" y="0" fill="#64748B" font-family="monospace" font-size="10">mask_pos = is_in_top_k × mask_in_gts:</text>
      <g transform="translate(0, 15)">
        <rect x="0" y="0" width="25" height="25" rx="2" fill="#1F2937" stroke="#334155"/>
        <text x="12" y="17" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">0</text>
        
        <rect x="28" y="0" width="25" height="25" rx="2" fill="#1F2937" stroke="#334155"/>
        <text x="40" y="17" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">0</text>
        
        <rect x="56" y="0" width="25" height="25" rx="2" fill="#1F2937" stroke="#334155"/>
        <text x="68" y="17" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">0</text>
        
        <rect x="84" y="0" width="25" height="25" rx="2" fill="#EF4444"/>
        <text x="96" y="17" text-anchor="middle" fill="white" font-family="monospace" font-size="9" font-weight="bold">1</text>
        
        <rect x="112" y="0" width="25" height="25" rx="2" fill="#EF4444"/>
        <text x="124" y="17" text-anchor="middle" fill="white" font-family="monospace" font-size="9" font-weight="bold">1</text>
        
        <rect x="140" y="0" width="25" height="25" rx="2" fill="#EF4444"/>
        <text x="152" y="17" text-anchor="middle" fill="white" font-family="monospace" font-size="9" font-weight="bold">1</text>
        
        <rect x="168" y="0" width="25" height="25" rx="2" fill="#1F2937" stroke="#334155"/>
        <text x="180" y="17" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">0</text>
        
        <text x="210" y="17" fill="#64748B" font-family="monospace" font-size="10">...</text>
      </g>
      <text x="0" y="50" fill="#EF4444" font-family="Arial, sans-serif" font-size="10" font-weight="bold">✓ Positive anchors: in top-k AND inside GT box</text>
    </g>
  </g>
  
  <!-- Foreground Mask (fg_mask) -->
  <g transform="translate(50, 390)">
    <rect x="0" y="0" width="800" height="140" rx="8" fill="#1E293B" stroke="#EC4899" stroke-width="2"/>
    <text x="400" y="25" text-anchor="middle" fill="#F472B6" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
      Foreground Mask (fg_mask) - Final Positive Assignments
    </text>
    
    <text x="30" y="55" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11">fg_mask = mask_pos.sum(dim=GT_axis) = [Batch, NumAnchors]</text>
    
    <!-- Visual representation -->
    <g transform="translate(30, 75)">
      <text x="0" y="0" fill="#64748B" font-family="monospace" font-size="10">fg_mask (per anchor):</text>
      <g transform="translate(0, 15)">
        <rect x="0" y="0" width="30" height="30" rx="3" fill="#1F2937" stroke="#334155"/><text x="15" y="20" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">0</text>
        <rect x="35" y="0" width="30" height="30" rx="3" fill="#1F2937" stroke="#334155"/><text x="50" y="20" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">0</text>
        <rect x="70" y="0" width="30" height="30" rx="3" fill="#1F2937" stroke="#334155"/><text x="85" y="20" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">0</text>
        <rect x="105" y="0" width="30" height="30" rx="3" fill="#EC4899"/><text x="120" y="20" text-anchor="middle" fill="white" font-family="monospace" font-size="10" font-weight="bold">1</text>
        <rect x="140" y="0" width="30" height="30" rx="3" fill="#EC4899"/><text x="155" y="20" text-anchor="middle" fill="white" font-family="monospace" font-size="10" font-weight="bold">1</text>
        <rect x="175" y="0" width="30" height="30" rx="3" fill="#BE185D"/><text x="190" y="20" text-anchor="middle" fill="white" font-family="monospace" font-size="10" font-weight="bold">2</text>
        <rect x="210" y="0" width="30" height="30" rx="3" fill="#1F2937" stroke="#334155"/><text x="225" y="20" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">0</text>
        <rect x="245" y="0" width="30" height="30" rx="3" fill="#EC4899"/><text x="260" y="20" text-anchor="middle" fill="white" font-family="monospace" font-size="10" font-weight="bold">1</text>
        <text x="295" y="20" fill="#64748B" font-family="monospace" font-size="14">...</text>
        
        <!-- Labels -->
        <text x="190" y="-8" text-anchor="middle" fill="#BE185D" font-family="Arial, sans-serif" font-size="8">2 GTs share this!</text>
      </g>
    </g>
    
    <!-- Note about conflict resolution -->
    <g transform="translate(400, 75)">
      <rect x="0" y="0" width="370" height="45" rx="4" fill="#1F2937" stroke="#BE185D" stroke-width="1"/>
      <text x="15" y="18" fill="#F472B6" font-family="Arial, sans-serif" font-size="10" font-weight="bold">⚠️ Conflict: anchor assigned to multiple GTs</text>
      <text x="15" y="35" fill="#94A3B8" font-family="Arial, sans-serif" font-size="9">Resolved by keeping only the GT with highest IoU overlap</text>
    </g>
  </g>
  
  <!-- Output Summary -->
  <g transform="translate(50, 560)">
    <rect x="0" y="0" width="800" height="120" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="2"/>
    <text x="400" y="25" text-anchor="middle" fill="#34D399" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
      Assignment Output Summary
    </text>
    
    <g transform="translate(30, 50)">
      <rect x="0" y="0" width="230" height="50" rx="4" fill="#065F46"/>
      <text x="115" y="20" text-anchor="middle" fill="#D1FAE5" font-family="monospace" font-size="11">target_bboxes</text>
      <text x="115" y="38" text-anchor="middle" fill="#6EE7B7" font-family="monospace" font-size="9">[B, 8400, 4] - assigned GT boxes</text>
    </g>
    
    <g transform="translate(280, 50)">
      <rect x="0" y="0" width="230" height="50" rx="4" fill="#1E3A8A"/>
      <text x="115" y="20" text-anchor="middle" fill="#DBEAFE" font-family="monospace" font-size="11">target_scores</text>
      <text x="115" y="38" text-anchor="middle" fill="#93C5FD" font-family="monospace" font-size="9">[B, 8400, NC] - soft labels</text>
    </g>
    
    <g transform="translate(530, 50)">
      <rect x="0" y="0" width="230" height="50" rx="4" fill="#7C2D12"/>
      <text x="115" y="20" text-anchor="middle" fill="#FED7AA" font-family="monospace" font-size="11">fg_mask</text>
      <text x="115" y="38" text-anchor="middle" fill="#FDBA74" font-family="monospace" font-size="9">[B, 8400] - boolean positive mask</text>
    </g>
  </g>
</svg>

