<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">
  <defs>
    <linearGradient id="imgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="700" fill="#0F172A"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="24" font-weight="bold">
    Step 2: Grid-to-Anchor Mapping
  </text>
  
  <!-- Image with Grid Overlay -->
  <g transform="translate(50, 70)">
    <text x="160" y="0" text-anchor="middle" fill="#94A3B8" font-family="Arial, sans-serif" font-size="14">Input Image with Feature Grid (8×8 example)</text>
    
    <!-- Image background -->
    <rect x="0" y="15" width="320" height="320" rx="4" fill="url(#imgGrad)"/>
    
    <!-- Grid lines -->
    <g stroke="#60A5FA" stroke-width="0.5" opacity="0.5">
      <!-- Vertical lines -->
      <line x1="40" y1="15" x2="40" y2="335"/>
      <line x1="80" y1="15" x2="80" y2="335"/>
      <line x1="120" y1="15" x2="120" y2="335"/>
      <line x1="160" y1="15" x2="160" y2="335"/>
      <line x1="200" y1="15" x2="200" y2="335"/>
      <line x1="240" y1="15" x2="240" y2="335"/>
      <line x1="280" y1="15" x2="280" y2="335"/>
      <!-- Horizontal lines -->
      <line x1="0" y1="55" x2="320" y2="55"/>
      <line x1="0" y1="95" x2="320" y2="95"/>
      <line x1="0" y1="135" x2="320" y2="135"/>
      <line x1="0" y1="175" x2="320" y2="175"/>
      <line x1="0" y1="215" x2="320" y2="215"/>
      <line x1="0" y1="255" x2="320" y2="255"/>
      <line x1="0" y1="295" x2="320" y2="295"/>
    </g>
    
    <!-- Anchor points (dots at cell centers) -->
    <g fill="#FCD34D">
      <!-- Row 1 -->
      <circle cx="20" cy="35" r="3"/><circle cx="60" cy="35" r="3"/><circle cx="100" cy="35" r="3"/><circle cx="140" cy="35" r="3"/>
      <circle cx="180" cy="35" r="3"/><circle cx="220" cy="35" r="3"/><circle cx="260" cy="35" r="3"/><circle cx="300" cy="35" r="3"/>
      <!-- Row 2 -->
      <circle cx="20" cy="75" r="3"/><circle cx="60" cy="75" r="3"/><circle cx="100" cy="75" r="3"/><circle cx="140" cy="75" r="3"/>
      <circle cx="180" cy="75" r="3"/><circle cx="220" cy="75" r="3"/><circle cx="260" cy="75" r="3"/><circle cx="300" cy="75" r="3"/>
      <!-- Row 3 -->
      <circle cx="20" cy="115" r="3"/><circle cx="60" cy="115" r="3"/><circle cx="100" cy="115" r="3"/><circle cx="140" cy="115" r="3"/>
      <circle cx="180" cy="115" r="3"/><circle cx="220" cy="115" r="3"/><circle cx="260" cy="115" r="3"/><circle cx="300" cy="115" r="3"/>
      <!-- Row 4 -->
      <circle cx="20" cy="155" r="3"/><circle cx="60" cy="155" r="3"/><circle cx="100" cy="155" r="3"/><circle cx="140" cy="155" r="3"/>
      <circle cx="180" cy="155" r="3"/><circle cx="220" cy="155" r="3"/><circle cx="260" cy="155" r="3"/><circle cx="300" cy="155" r="3"/>
      <!-- Row 5 -->
      <circle cx="20" cy="195" r="3"/><circle cx="60" cy="195" r="3"/><circle cx="100" cy="195" r="3"/><circle cx="140" cy="195" r="3"/>
      <circle cx="180" cy="195" r="3"/><circle cx="220" cy="195" r="3"/><circle cx="260" cy="195" r="3"/><circle cx="300" cy="195" r="3"/>
      <!-- Row 6 -->
      <circle cx="20" cy="235" r="3"/><circle cx="60" cy="235" r="3"/><circle cx="100" cy="235" r="3"/><circle cx="140" cy="235" r="3"/>
      <circle cx="180" cy="235" r="3"/><circle cx="220" cy="235" r="3"/><circle cx="260" cy="235" r="3"/><circle cx="300" cy="235" r="3"/>
      <!-- Row 7 -->
      <circle cx="20" cy="275" r="3"/><circle cx="60" cy="275" r="3"/><circle cx="100" cy="275" r="3"/><circle cx="140" cy="275" r="3"/>
      <circle cx="180" cy="275" r="3"/><circle cx="220" cy="275" r="3"/><circle cx="260" cy="275" r="3"/><circle cx="300" cy="275" r="3"/>
      <!-- Row 8 -->
      <circle cx="20" cy="315" r="3"/><circle cx="60" cy="315" r="3"/><circle cx="100" cy="315" r="3"/><circle cx="140" cy="315" r="3"/>
      <circle cx="180" cy="315" r="3"/><circle cx="220" cy="315" r="3"/><circle cx="260" cy="315" r="3"/><circle cx="300" cy="315" r="3"/>
    </g>
    
    <!-- Ground Truth Box -->
    <rect x="80" y="95" width="120" height="100" fill="none" stroke="#EF4444" stroke-width="3" rx="2"/>
    <text x="140" y="88" text-anchor="middle" fill="#EF4444" font-family="Arial, sans-serif" font-size="11" font-weight="bold">GT Box</text>
    
    <!-- Highlight anchors inside GT -->
    <g fill="#10B981">
      <circle cx="100" cy="115" r="5"/><circle cx="140" cy="115" r="5"/><circle cx="180" cy="115" r="5"/>
      <circle cx="100" cy="155" r="5"/><circle cx="140" cy="155" r="5"/><circle cx="180" cy="155" r="5"/>
    </g>
    
    <!-- Legend -->
    <g transform="translate(0, 350)">
      <circle cx="10" cy="10" r="4" fill="#FCD34D"/>
      <text x="25" y="14" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11">Anchor point (cell center)</text>
      
      <circle cx="10" cy="35" r="5" fill="#10B981"/>
      <text x="25" y="39" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11">Anchor inside GT box</text>
      
      <rect x="5" y="55" width="15" height="10" fill="none" stroke="#EF4444" stroke-width="2"/>
      <text x="25" y="64" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11">Ground truth box</text>
    </g>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(400, 200)">
    <path d="M 0,50 L 80,50" stroke="#F8FAFC" stroke-width="2" marker-end="url(#arrowhead)"/>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#F8FAFC"/>
      </marker>
    </defs>
  </g>
  
  <!-- Anchor Tensor Visualization -->
  <g transform="translate(500, 70)">
    <text x="175" y="0" text-anchor="middle" fill="#94A3B8" font-family="Arial, sans-serif" font-size="14">Flattened Anchor Tensor [64, 2]</text>
    
    <rect x="0" y="15" width="350" height="320" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    
    <!-- Header -->
    <rect x="10" y="25" width="330" height="30" rx="4" fill="#334155"/>
    <text x="60" y="45" text-anchor="middle" fill="#F8FAFC" font-family="monospace" font-size="12" font-weight="bold">idx</text>
    <text x="150" y="45" text-anchor="middle" fill="#F8FAFC" font-family="monospace" font-size="12" font-weight="bold">anchor_x</text>
    <text x="270" y="45" text-anchor="middle" fill="#F8FAFC" font-family="monospace" font-size="12" font-weight="bold">anchor_y</text>
    
    <!-- Data rows -->
    <g font-family="monospace" font-size="11">
      <text x="60" y="75" text-anchor="middle" fill="#64748B">0</text>
      <text x="150" y="75" text-anchor="middle" fill="#FCD34D">0.5</text>
      <text x="270" y="75" text-anchor="middle" fill="#FCD34D">0.5</text>
      
      <text x="60" y="95" text-anchor="middle" fill="#64748B">1</text>
      <text x="150" y="95" text-anchor="middle" fill="#FCD34D">1.5</text>
      <text x="270" y="95" text-anchor="middle" fill="#FCD34D">0.5</text>
      
      <text x="60" y="115" text-anchor="middle" fill="#64748B">2</text>
      <text x="150" y="115" text-anchor="middle" fill="#FCD34D">2.5</text>
      <text x="270" y="115" text-anchor="middle" fill="#FCD34D">0.5</text>
      
      <text x="175" y="140" text-anchor="middle" fill="#475569">...</text>
      
      <!-- Highlighted rows (inside GT) -->
      <rect x="10" y="150" width="330" height="20" rx="2" fill="#10B981" opacity="0.2"/>
      <text x="60" y="165" text-anchor="middle" fill="#10B981">18</text>
      <text x="150" y="165" text-anchor="middle" fill="#10B981">2.5</text>
      <text x="270" y="165" text-anchor="middle" fill="#10B981">2.5</text>
      
      <rect x="10" y="170" width="330" height="20" rx="2" fill="#10B981" opacity="0.2"/>
      <text x="60" y="185" text-anchor="middle" fill="#10B981">19</text>
      <text x="150" y="185" text-anchor="middle" fill="#10B981">3.5</text>
      <text x="270" y="185" text-anchor="middle" fill="#10B981">2.5</text>
      
      <rect x="10" y="190" width="330" height="20" rx="2" fill="#10B981" opacity="0.2"/>
      <text x="60" y="205" text-anchor="middle" fill="#10B981">20</text>
      <text x="150" y="205" text-anchor="middle" fill="#10B981">4.5</text>
      <text x="270" y="205" text-anchor="middle" fill="#10B981">2.5</text>
      
      <text x="175" y="230" text-anchor="middle" fill="#475569">...</text>
      
      <text x="60" y="255" text-anchor="middle" fill="#64748B">62</text>
      <text x="150" y="255" text-anchor="middle" fill="#FCD34D">6.5</text>
      <text x="270" y="255" text-anchor="middle" fill="#FCD34D">7.5</text>
      
      <text x="60" y="275" text-anchor="middle" fill="#64748B">63</text>
      <text x="150" y="275" text-anchor="middle" fill="#FCD34D">7.5</text>
      <text x="270" y="275" text-anchor="middle" fill="#FCD34D">7.5</text>
    </g>
    
    <!-- Note -->
    <rect x="10" y="290" width="330" height="35" rx="4" fill="#1E293B" stroke="#475569" stroke-width="1"/>
    <text x="175" y="310" text-anchor="middle" fill="#94A3B8" font-family="Arial, sans-serif" font-size="10">offset = 0.5 (cell center)</text>
    <text x="175" y="322" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="9">anchor[i] = (col + 0.5, row + 0.5)</text>
  </g>
  
  <!-- Code snippet -->
  <g transform="translate(50, 480)">
    <rect x="0" y="0" width="800" height="180" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="20" y="25" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="14" font-weight="bold">make_anchors() - Flattening Grid to 1D Tensor</text>
    
    <text x="20" y="55" fill="#7C3AED" font-family="monospace" font-size="11">def</text>
    <text x="45" y="55" fill="#FCD34D" font-family="monospace" font-size="11">make_anchors</text>
    <text x="145" y="55" fill="#94A3B8" font-family="monospace" font-size="11">(x, strides, offset=0.5):</text>
    
    <text x="40" y="80" fill="#94A3B8" font-family="monospace" font-size="11">sx = torch.arange(w) + offset  </text>
    <text x="340" y="80" fill="#6B7280" font-family="monospace" font-size="10"># [0.5, 1.5, 2.5, ...]</text>
    
    <text x="40" y="100" fill="#94A3B8" font-family="monospace" font-size="11">sy = torch.arange(h) + offset  </text>
    <text x="340" y="100" fill="#6B7280" font-family="monospace" font-size="10"># [0.5, 1.5, 2.5, ...]</text>
    
    <text x="40" y="120" fill="#94A3B8" font-family="monospace" font-size="11">sy, sx = torch.meshgrid(sy, sx)</text>
    <text x="340" y="120" fill="#6B7280" font-family="monospace" font-size="10"># Create 2D grid</text>
    
    <text x="40" y="140" fill="#94A3B8" font-family="monospace" font-size="11">anchor_points = torch.stack((sx, sy), -1)</text>
    <text x="400" y="140" fill="#6B7280" font-family="monospace" font-size="10"># [H, W, 2]</text>
    
    <text x="40" y="160" fill="#94A3B8" font-family="monospace" font-size="11">anchor_points = anchor_points.view(-1, 2)</text>
    <text x="400" y="160" fill="#6B7280" font-family="monospace" font-size="10"># [H*W, 2] = flatten!</text>
  </g>
</svg>

