<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 850">
  <!-- Background -->
  <rect width="950" height="850" fill="#0F172A"/>
  
  <!-- Title -->
  <text x="475" y="35" text-anchor="middle" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="22" font-weight="bold">
    Lines 100-102: Creating batch_index for Target Assignment
  </text>
  
  <!-- Code Box -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="850" height="80" rx="8" fill="#1E293B" stroke="#F59E0B" stroke-width="2"/>
    <text x="20" y="25" fill="#64748B" font-family="monospace" font-size="12">Lines 100-102:</text>
    <text x="20" y="48" fill="#F8FAFC" font-family="monospace" font-size="13">batch_index = torch.arange(end=self.bs,</text>
    <text x="20" y="68" fill="#F8FAFC" font-family="monospace" font-size="13">                           dtype=torch.int64, device=true_labels.device)[..., None]</text>
  </g>
  
  <!-- Context Box -->
  <g transform="translate(50, 160)">
    <rect x="0" y="0" width="850" height="70" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="20" y="22" fill="#F59E0B" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Context (Line 101):</text>
    <text x="20" y="42" fill="#94A3B8" font-family="monospace" font-size="11">target_gt_idx = target_gt_idx + batch_index * self.num_max_boxes</text>
    <text x="20" y="60" fill="#64748B" font-family="Arial, sans-serif" font-size="10">Converting per-batch GT indices to global flat indices for tensor indexing</text>
  </g>
  
  <!-- Step 1: torch.arange -->
  <g transform="translate(50, 250)">
    <text x="0" y="0" fill="#10B981" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Step 1: torch.arange(end=self.bs, dtype=torch.int64, device=...)</text>
    <text x="0" y="20" fill="#64748B" font-family="monospace" font-size="11">Example: self.bs = 3 (batch size)</text>
    
    <rect x="0" y="35" width="350" height="70" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="2"/>
    
    <g transform="translate(20, 55)">
      <text x="0" y="0" fill="#94A3B8" font-family="monospace" font-size="11">Shape: [3]</text>
      <g transform="translate(0, 15)">
        <rect x="0" y="0" width="60" height="30" rx="4" fill="#065F46"/><text x="30" y="20" text-anchor="middle" fill="#6EE7B7" font-family="monospace" font-size="14" font-weight="bold">0</text>
        <rect x="65" y="0" width="60" height="30" rx="4" fill="#065F46"/><text x="95" y="20" text-anchor="middle" fill="#6EE7B7" font-family="monospace" font-size="14" font-weight="bold">1</text>
        <rect x="130" y="0" width="60" height="30" rx="4" fill="#065F46"/><text x="160" y="20" text-anchor="middle" fill="#6EE7B7" font-family="monospace" font-size="14" font-weight="bold">2</text>
      </g>
    </g>
  </g>
  
  <!-- Step 2: [..., None] -->
  <g transform="translate(50, 370)">
    <text x="0" y="0" fill="#3B82F6" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Step 2: [..., None] (add dimension at the end)</text>
    <text x="0" y="20" fill="#64748B" font-family="monospace" font-size="11">[..., None] is equivalent to .unsqueeze(-1): [3] becomes [3, 1]</text>
    
    <rect x="0" y="35" width="180" height="130" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="2"/>
    
    <g transform="translate(20, 55)">
      <text x="0" y="0" fill="#94A3B8" font-family="monospace" font-size="11">Shape: [3, 1]</text>
      <g transform="translate(30, 20)">
        <rect x="0" y="0" width="50" height="28" rx="4" fill="#1E3A8A"/><text x="25" y="19" text-anchor="middle" fill="#93C5FD" font-family="monospace" font-size="14" font-weight="bold">0</text>
        <rect x="0" y="32" width="50" height="28" rx="4" fill="#1E3A8A"/><text x="25" y="51" text-anchor="middle" fill="#93C5FD" font-family="monospace" font-size="14" font-weight="bold">1</text>
        <rect x="0" y="64" width="50" height="28" rx="4" fill="#1E3A8A"/><text x="25" y="83" text-anchor="middle" fill="#93C5FD" font-family="monospace" font-size="14" font-weight="bold">2</text>
      </g>
    </g>
    
    <!-- Explanation box -->
    <g transform="translate(220, 35)">
      <rect x="0" y="0" width="300" height="130" rx="6" fill="#1F2937" stroke="#334155"/>
      <text x="15" y="25" fill="#3B82F6" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Why [..., None]?</text>
      <text x="15" y="50" fill="#94A3B8" font-family="Arial, sans-serif" font-size="10">1. Same as unsqueeze(-1)</text>
      <text x="15" y="70" fill="#94A3B8" font-family="Arial, sans-serif" font-size="10">2. Enables broadcasting with [B, 8400]</text>
      <text x="15" y="90" fill="#94A3B8" font-family="Arial, sans-serif" font-size="10">3. Column vector for batch offsets</text>
      <text x="15" y="115" fill="#64748B" font-family="monospace" font-size="9">[3,1] + [3,8400] broadcasts to [3,8400]</text>
    </g>
  </g>
  
  <!-- The Problem We're Solving -->
  <g transform="translate(50, 520)">
    <text x="400" y="0" text-anchor="middle" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Why We Need batch_index × num_max_boxes
    </text>
    
    <rect x="0" y="20" width="850" height="280" rx="8" fill="#1E293B" stroke="#EC4899" stroke-width="2"/>
    
    <!-- Problem explanation -->
    <g transform="translate(20, 45)">
      <text x="0" y="0" fill="#EC4899" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Problem: Converting local GT indices to global flat indices</text>
      
      <!-- Example with num_max_boxes = 4 -->
      <text x="0" y="30" fill="#64748B" font-family="monospace" font-size="10">Example: num_max_boxes = 4, batch_size = 3</text>
      
      <!-- Per-batch GT boxes visualization -->
      <g transform="translate(0, 50)">
        <text x="0" y="0" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11">Ground Truth boxes (flattened):</text>
        
        <!-- Batch 0 -->
        <g transform="translate(0, 20)">
          <text x="-5" y="18" fill="#64748B" font-family="monospace" font-size="9" text-anchor="end">B₀:</text>
          <rect x="0" y="0" width="50" height="28" rx="3" fill="#7C2D12" stroke="#F97316"/><text x="25" y="18" text-anchor="middle" fill="#FED7AA" font-family="monospace" font-size="9">GT₀</text>
          <rect x="55" y="0" width="50" height="28" rx="3" fill="#7C2D12" stroke="#F97316"/><text x="80" y="18" text-anchor="middle" fill="#FED7AA" font-family="monospace" font-size="9">GT₁</text>
          <rect x="110" y="0" width="50" height="28" rx="3" fill="#7C2D12" stroke="#F97316"/><text x="135" y="18" text-anchor="middle" fill="#FED7AA" font-family="monospace" font-size="9">GT₂</text>
          <rect x="165" y="0" width="50" height="28" rx="3" fill="#7C2D12" stroke="#F97316"/><text x="190" y="18" text-anchor="middle" fill="#FED7AA" font-family="monospace" font-size="9">GT₃</text>
          <text x="230" y="18" fill="#64748B" font-family="monospace" font-size="8">flat idx: 0,1,2,3</text>
        </g>
        
        <!-- Batch 1 -->
        <g transform="translate(0, 55)">
          <text x="-5" y="18" fill="#64748B" font-family="monospace" font-size="9" text-anchor="end">B₁:</text>
          <rect x="0" y="0" width="50" height="28" rx="3" fill="#14532D" stroke="#22C55E"/><text x="25" y="18" text-anchor="middle" fill="#BBF7D0" font-family="monospace" font-size="9">GT₀</text>
          <rect x="55" y="0" width="50" height="28" rx="3" fill="#14532D" stroke="#22C55E"/><text x="80" y="18" text-anchor="middle" fill="#BBF7D0" font-family="monospace" font-size="9">GT₁</text>
          <rect x="110" y="0" width="50" height="28" rx="3" fill="#14532D" stroke="#22C55E"/><text x="135" y="18" text-anchor="middle" fill="#BBF7D0" font-family="monospace" font-size="9">GT₂</text>
          <rect x="165" y="0" width="50" height="28" rx="3" fill="#14532D" stroke="#22C55E"/><text x="190" y="18" text-anchor="middle" fill="#BBF7D0" font-family="monospace" font-size="9">GT₃</text>
          <text x="230" y="18" fill="#64748B" font-family="monospace" font-size="8">flat idx: 4,5,6,7</text>
        </g>
        
        <!-- Batch 2 -->
        <g transform="translate(0, 90)">
          <text x="-5" y="18" fill="#64748B" font-family="monospace" font-size="9" text-anchor="end">B₂:</text>
          <rect x="0" y="0" width="50" height="28" rx="3" fill="#1E3A5F" stroke="#3B82F6"/><text x="25" y="18" text-anchor="middle" fill="#BFDBFE" font-family="monospace" font-size="9">GT₀</text>
          <rect x="55" y="0" width="50" height="28" rx="3" fill="#1E3A5F" stroke="#3B82F6"/><text x="80" y="18" text-anchor="middle" fill="#BFDBFE" font-family="monospace" font-size="9">GT₁</text>
          <rect x="110" y="0" width="50" height="28" rx="3" fill="#1E3A5F" stroke="#3B82F6"/><text x="135" y="18" text-anchor="middle" fill="#BFDBFE" font-family="monospace" font-size="9">GT₂</text>
          <rect x="165" y="0" width="50" height="28" rx="3" fill="#1E3A5F" stroke="#3B82F6"/><text x="190" y="18" text-anchor="middle" fill="#BFDBFE" font-family="monospace" font-size="9">GT₃</text>
          <text x="230" y="18" fill="#64748B" font-family="monospace" font-size="8">flat idx: 8,9,10,11</text>
        </g>
      </g>
      
      <!-- Formula visualization -->
      <g transform="translate(400, 50)">
        <rect x="0" y="0" width="420" height="190" rx="6" fill="#1F2937" stroke="#334155"/>
        <text x="15" y="25" fill="#FCD34D" font-family="Arial, sans-serif" font-size="12" font-weight="bold">The Math:</text>
        
        <text x="15" y="55" fill="#F8FAFC" font-family="monospace" font-size="11">target_gt_idx (local):     [0, 2, 1]  # per batch</text>
        <text x="15" y="75" fill="#F8FAFC" font-family="monospace" font-size="11">batch_index:               [[0], [1], [2]]</text>
        <text x="15" y="95" fill="#F8FAFC" font-family="monospace" font-size="11">num_max_boxes:             4</text>
        
        <text x="15" y="125" fill="#10B981" font-family="monospace" font-size="11">batch_index × num_max_boxes:</text>
        <text x="15" y="145" fill="#6EE7B7" font-family="monospace" font-size="11">[[0×4], [1×4], [2×4]] = [[0], [4], [8]]</text>
        
        <text x="15" y="175" fill="#EC4899" font-family="monospace" font-size="11">Final: [0,2,1] + [0,4,8] = [0, 6, 9]</text>
        <text x="300" y="175" fill="#64748B" font-family="monospace" font-size="9">← global indices!</text>
      </g>
    </g>
  </g>
</svg>

