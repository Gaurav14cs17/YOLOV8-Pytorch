<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300">
  <defs>
    <linearGradient id="bgFs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  <rect width="700" height="300" fill="url(#bgFs)"/>
  <text x="350" y="30" fill="#fff" font-family="Georgia, serif" font-size="20" text-anchor="middle" font-weight="bold">Conv-BN Fusion</text>
  
  <!-- Before -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="250" height="100" rx="8" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="125" y="20" fill="#ff6b6b" font-family="Consolas" font-size="11" text-anchor="middle" font-weight="bold">Before (Training)</text>
    <rect x="20" y="35" width="80" height="30" rx="4" fill="#ff6b6b"/>
    <text x="60" y="55" fill="#000" font-family="Consolas" font-size="9" text-anchor="middle">Conv2d</text>
    <text x="115" y="52" fill="#fff" font-size="14">→</text>
    <rect x="130" y="35" width="100" height="30" rx="4" fill="#4ecdc4"/>
    <text x="180" y="55" fill="#000" font-family="Consolas" font-size="9" text-anchor="middle">BatchNorm2d</text>
    <text x="125" y="85" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">2 ops, 4 params</text>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(330, 100)">
    <text x="0" y="0" fill="#ffd93d" font-family="Consolas" font-size="20">→</text>
    <text x="0" y="20" fill="#ffd93d" font-family="Consolas" font-size="9">Fuse</text>
  </g>
  
  <!-- After -->
  <g transform="translate(400, 60)">
    <rect x="0" y="0" width="250" height="100" rx="8" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="125" y="20" fill="#4ecdc4" font-family="Consolas" font-size="11" text-anchor="middle" font-weight="bold">After (Inference)</text>
    <rect x="75" y="35" width="100" height="30" rx="4" fill="#4ecdc4"/>
    <text x="125" y="55" fill="#000" font-family="Consolas" font-size="9" text-anchor="middle">Fused Conv</text>
    <text x="125" y="85" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">1 op, 2 params</text>
  </g>
  
  <!-- Formula -->
  <g transform="translate(50, 180)">
    <rect x="0" y="0" width="600" height="100" rx="8" fill="#1a1a2e"/>
    <text x="300" y="25" fill="#fff" font-family="Consolas" font-size="11" text-anchor="middle" font-weight="bold">Fusion Formula</text>
    <text x="20" y="50" fill="#4ecdc4" font-family="Consolas" font-size="9">W_fused = W_conv * gamma / sqrt(var + eps)</text>
    <text x="20" y="70" fill="#ffd93d" font-family="Consolas" font-size="9">b_fused = beta - mu * gamma / sqrt(var + eps)</text>
    <text x="20" y="90" fill="#888" font-family="Consolas" font-size="8">Result: 10-30% faster inference with identical output</text>
  </g>
</svg>

