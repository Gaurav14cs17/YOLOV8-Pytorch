<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280">
  <defs>
    <linearGradient id="bgYolo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  <rect width="700" height="280" fill="url(#bgYolo)"/>
  <text x="350" y="30" fill="#fff" font-family="Georgia, serif" font-size="20" text-anchor="middle" font-weight="bold">YOLO Class Architecture</text>
  
  <!-- Flow -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="100" height="60" rx="5" fill="#ff6b6b"/>
    <text x="50" y="25" fill="#000" font-family="Consolas" font-size="11" text-anchor="middle" font-weight="bold">Input</text>
    <text x="50" y="45" fill="#000" font-family="Consolas" font-size="9" text-anchor="middle">[B, 3, 640, 640]</text>
  </g>
  <text x="165" y="90" fill="#fff" font-size="16">→</text>
  <g transform="translate(180, 60)">
    <rect x="0" y="0" width="100" height="60" rx="5" fill="#4ecdc4"/>
    <text x="50" y="25" fill="#000" font-family="Consolas" font-size="11" text-anchor="middle" font-weight="bold">Backbone</text>
    <text x="50" y="45" fill="#000" font-family="Consolas" font-size="9" text-anchor="middle">Features</text>
  </g>
  <text x="295" y="90" fill="#fff" font-size="16">→</text>
  <g transform="translate(310, 60)">
    <rect x="0" y="0" width="100" height="60" rx="5" fill="#ffd93d"/>
    <text x="50" y="25" fill="#000" font-family="Consolas" font-size="11" text-anchor="middle" font-weight="bold">Neck</text>
    <text x="50" y="45" fill="#000" font-family="Consolas" font-size="9" text-anchor="middle">FPN/PAN</text>
  </g>
  <text x="425" y="90" fill="#fff" font-size="16">→</text>
  <g transform="translate(440, 60)">
    <rect x="0" y="0" width="100" height="60" rx="5" fill="#9b59b6"/>
    <text x="50" y="25" fill="#fff" font-family="Consolas" font-size="11" text-anchor="middle" font-weight="bold">Head</text>
    <text x="50" y="45" fill="#fff" font-family="Consolas" font-size="9" text-anchor="middle">Detection</text>
  </g>
  <text x="555" y="90" fill="#fff" font-size="16">→</text>
  <g transform="translate(570, 60)">
    <rect x="0" y="0" width="100" height="60" rx="5" fill="#27ae60"/>
    <text x="50" y="25" fill="#fff" font-family="Consolas" font-size="11" text-anchor="middle" font-weight="bold">Output</text>
    <text x="50" y="45" fill="#fff" font-family="Consolas" font-size="9" text-anchor="middle">Predictions</text>
  </g>
  
  <!-- Key methods -->
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="600" height="110" rx="8" fill="#252547"/>
    <text x="300" y="25" fill="#fff" font-family="Consolas" font-size="12" text-anchor="middle" font-weight="bold">YOLO Class Methods</text>
    <text x="20" y="50" fill="#4ecdc4" font-family="Consolas" font-size="10">__init__(width, depth, num_classes):</text>
    <text x="280" y="50" fill="#888" font-family="Consolas" font-size="9">Build backbone, neck, head</text>
    <text x="20" y="70" fill="#ffd93d" font-family="Consolas" font-size="10">forward(x):</text>
    <text x="100" y="70" fill="#888" font-family="Consolas" font-size="9">backbone → neck → head → predictions</text>
    <text x="20" y="90" fill="#ff6b6b" font-family="Consolas" font-size="10">fuse():</text>
    <text x="70" y="90" fill="#888" font-family="Consolas" font-size="9">Fuse Conv-BN layers for faster inference</text>
  </g>
</svg>

