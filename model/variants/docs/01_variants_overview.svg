<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280">
  <defs>
    <linearGradient id="bgVar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  <rect width="700" height="280" fill="url(#bgVar)"/>
  <text x="350" y="30" fill="#fff" font-family="Georgia, serif" font-size="20" text-anchor="middle" font-weight="bold">Model Variants</text>
  
  <!-- RepViT -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="180" height="90" rx="8" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="90" y="25" fill="#ff6b6b" font-family="Consolas" font-size="11" text-anchor="middle" font-weight="bold">RepViT Backbone</text>
    <text x="90" y="45" fill="#888" font-family="Consolas" font-size="9" text-anchor="middle">Mobile-optimized</text>
    <text x="90" y="60" fill="#888" font-family="Consolas" font-size="9" text-anchor="middle">Re-parameterizable</text>
    <text x="90" y="80" fill="#4ecdc4" font-family="Consolas" font-size="8" text-anchor="middle">CPU-friendly deployment</text>
  </g>
  
  <!-- GhostNet -->
  <g transform="translate(260, 60)">
    <rect x="0" y="0" width="180" height="90" rx="8" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="90" y="25" fill="#4ecdc4" font-family="Consolas" font-size="11" text-anchor="middle" font-weight="bold">GhostNeck</text>
    <text x="90" y="45" fill="#888" font-family="Consolas" font-size="9" text-anchor="middle">Cheap operations</text>
    <text x="90" y="60" fill="#888" font-family="Consolas" font-size="9" text-anchor="middle">Ghost modules</text>
    <text x="90" y="80" fill="#ffd93d" font-family="Consolas" font-size="8" text-anchor="middle">Reduce FLOPs by 50%</text>
  </g>
  
  <!-- Light Model -->
  <g transform="translate(470, 60)">
    <rect x="0" y="0" width="180" height="90" rx="8" fill="#252547" stroke="#ffd93d" stroke-width="2"/>
    <text x="90" y="25" fill="#ffd93d" font-family="Consolas" font-size="11" text-anchor="middle" font-weight="bold">YOLOv8Hybrid</text>
    <text x="90" y="45" fill="#888" font-family="Consolas" font-size="9" text-anchor="middle">Combined approach</text>
    <text x="90" y="60" fill="#888" font-family="Consolas" font-size="9" text-anchor="middle">RepViT + Ghost</text>
    <text x="90" y="80" fill="#ff6b6b" font-family="Consolas" font-size="8" text-anchor="middle">Best of both worlds</text>
  </g>
  
  <!-- Use cases -->
  <g transform="translate(50, 170)">
    <rect x="0" y="0" width="600" height="90" rx="8" fill="#1a1a2e"/>
    <text x="300" y="25" fill="#fff" font-family="Consolas" font-size="12" text-anchor="middle" font-weight="bold">Use Cases</text>
    <text x="20" y="50" fill="#ff6b6b" font-family="Consolas" font-size="9">RepViT:</text>
    <text x="80" y="50" fill="#888" font-family="Consolas" font-size="9">Mobile phones, edge devices, ARM CPUs</text>
    <text x="20" y="70" fill="#4ecdc4" font-family="Consolas" font-size="9">GhostNeck:</text>
    <text x="100" y="70" fill="#888" font-family="Consolas" font-size="9">Low-power devices, real-time on weak hardware</text>
    <text x="350" y="50" fill="#ffd93d" font-family="Consolas" font-size="9">Hybrid:</text>
    <text x="410" y="50" fill="#888" font-family="Consolas" font-size="9">Balanced speed/accuracy</text>
  </g>
</svg>

