<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgBlk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bgBlk)"/>
  <text x="400" y="30" fill="#fff" font-family="Georgia, serif" font-size="20" text-anchor="middle" font-weight="bold">Building Blocks Detail</text>
  
  <!-- ConvBlock -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="200" height="140" rx="8" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="100" y="25" fill="#ff6b6b" font-family="Consolas" font-size="12" text-anchor="middle" font-weight="bold">ConvBlock</text>
    <rect x="20" y="40" width="160" height="25" rx="4" fill="#1a1a2e"/>
    <text x="100" y="58" fill="#ccc" font-family="Consolas" font-size="9" text-anchor="middle">Conv2d(in, out, k, s, p)</text>
    <rect x="20" y="70" width="160" height="25" rx="4" fill="#1a1a2e"/>
    <text x="100" y="88" fill="#ccc" font-family="Consolas" font-size="9" text-anchor="middle">BatchNorm2d(out)</text>
    <rect x="20" y="100" width="160" height="25" rx="4" fill="#ffd93d"/>
    <text x="100" y="118" fill="#000" font-family="Consolas" font-size="9" text-anchor="middle">SiLU(inplace=True)</text>
  </g>
  
  <!-- CSPBlock -->
  <g transform="translate(300, 60)">
    <rect x="0" y="0" width="200" height="140" rx="8" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="100" y="25" fill="#4ecdc4" font-family="Consolas" font-size="12" text-anchor="middle" font-weight="bold">CSPBlock</text>
    <text x="100" y="50" fill="#888" font-family="Consolas" font-size="9" text-anchor="middle">Cross Stage Partial</text>
    <rect x="20" y="60" width="70" height="30" rx="4" fill="#ff6b6b"/>
    <text x="55" y="80" fill="#000" font-family="Consolas" font-size="8" text-anchor="middle">Split</text>
    <rect x="110" y="60" width="70" height="30" rx="4" fill="#4ecdc4"/>
    <text x="145" y="80" fill="#000" font-family="Consolas" font-size="8" text-anchor="middle">Residual</text>
    <rect x="50" y="100" width="100" height="25" rx="4" fill="#ffd93d"/>
    <text x="100" y="118" fill="#000" font-family="Consolas" font-size="9" text-anchor="middle">Concat + Conv</text>
  </g>
  
  <!-- SPPBlock -->
  <g transform="translate(550, 60)">
    <rect x="0" y="0" width="200" height="140" rx="8" fill="#252547" stroke="#ffd93d" stroke-width="2"/>
    <text x="100" y="25" fill="#ffd93d" font-family="Consolas" font-size="12" text-anchor="middle" font-weight="bold">SPPBlock (SPPF)</text>
    <text x="100" y="50" fill="#888" font-family="Consolas" font-size="9" text-anchor="middle">Spatial Pyramid Pooling</text>
    <g transform="translate(20, 60)">
      <rect x="0" y="0" width="40" height="25" rx="3" fill="#ff6b6b"/>
      <text x="20" y="17" fill="#000" font-family="Consolas" font-size="8" text-anchor="middle">Pool</text>
      <rect x="45" y="0" width="40" height="25" rx="3" fill="#ff6b6b"/>
      <text x="65" y="17" fill="#000" font-family="Consolas" font-size="8" text-anchor="middle">Pool</text>
      <rect x="90" y="0" width="40" height="25" rx="3" fill="#ff6b6b"/>
      <text x="110" y="17" fill="#000" font-family="Consolas" font-size="8" text-anchor="middle">Pool</text>
      <rect x="135" y="0" width="40" height="25" rx="3" fill="#4ecdc4"/>
      <text x="155" y="17" fill="#000" font-family="Consolas" font-size="8" text-anchor="middle">Cat</text>
    </g>
    <rect x="50" y="100" width="100" height="25" rx="4" fill="#ffd93d"/>
    <text x="100" y="118" fill="#000" font-family="Consolas" font-size="9" text-anchor="middle">Conv(4*c, out)</text>
  </g>
  
  <!-- Usage -->
  <g transform="translate(50, 220)">
    <rect x="0" y="0" width="700" height="160" rx="8" fill="#1a1a2e"/>
    <text x="350" y="25" fill="#fff" font-family="Consolas" font-size="12" text-anchor="middle" font-weight="bold">Usage in YOLOv8</text>
    <text x="20" y="55" fill="#4ecdc4" font-family="Consolas" font-size="10">Backbone:</text>
    <text x="100" y="55" fill="#888" font-family="Consolas" font-size="10">ConvBlock + CSPBlock + SPPBlock (5 stages)</text>
    <text x="20" y="80" fill="#ffd93d" font-family="Consolas" font-size="10">Neck:</text>
    <text x="100" y="80" fill="#888" font-family="Consolas" font-size="10">CSPBlock for FPN/PAN feature fusion</text>
    <text x="20" y="105" fill="#ff6b6b" font-family="Consolas" font-size="10">Head:</text>
    <text x="100" y="105" fill="#888" font-family="Consolas" font-size="10">ConvBlock for classification and regression branches</text>
    <text x="20" y="140" fill="#ccc" font-family="Consolas" font-size="9">All blocks use SiLU activation and BatchNorm for stable training</text>
  </g>
</svg>

