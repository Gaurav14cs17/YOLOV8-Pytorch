<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <defs>
    <linearGradient id="bgModel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="600" fill="url(#bgModel)"/>
  
  <!-- Title -->
  <text x="500" y="40" fill="#fff" font-family="Georgia, serif" font-size="28" text-anchor="middle" font-weight="bold">
    YOLOv8 Model Architecture
  </text>
  
  <!-- Input -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="120" height="80" rx="10" fill="#252547" stroke="#888" stroke-width="2"/>
    <text x="60" y="35" fill="#fff" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">
      Input
    </text>
    <text x="60" y="55" fill="#888" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
      [B, 3, 640, 640]
    </text>
  </g>
  
  <!-- Arrow to Backbone -->
  <path d="M180,120 L220,120" stroke="#4ecdc4" stroke-width="3"/>
  <polygon points="220,112 238,120 220,128" fill="#4ecdc4"/>
  
  <!-- Backbone -->
  <g transform="translate(250, 60)">
    <rect x="0" y="0" width="180" height="300" rx="15" fill="#252547" stroke="#ff6b6b" stroke-width="3"/>
    <text x="90" y="30" fill="#ff6b6b" font-family="Consolas, monospace" font-size="16" text-anchor="middle" font-weight="bold">
      Backbone
    </text>
    
    <!-- Stages -->
    <g transform="translate(15, 45)">
      <rect x="0" y="0" width="150" height="35" rx="5" fill="#1a1a2e"/>
      <text x="75" y="22" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Stage 1: Conv 3x3</text>
    </g>
    <g transform="translate(15, 90)">
      <rect x="0" y="0" width="150" height="35" rx="5" fill="#1a1a2e"/>
      <text x="75" y="22" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Stage 2: Conv+CSP</text>
    </g>
    <g transform="translate(15, 135)">
      <rect x="0" y="0" width="150" height="35" rx="5" fill="#ff6b6b"/>
      <text x="75" y="22" fill="#000" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Stage 3: P3 (80x80)</text>
    </g>
    <g transform="translate(15, 180)">
      <rect x="0" y="0" width="150" height="35" rx="5" fill="#ff6b6b"/>
      <text x="75" y="22" fill="#000" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Stage 4: P4 (40x40)</text>
    </g>
    <g transform="translate(15, 225)">
      <rect x="0" y="0" width="150" height="35" rx="5" fill="#ff6b6b"/>
      <text x="75" y="22" fill="#000" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Stage 5: P5 (20x20)</text>
    </g>
    <text x="90" y="285" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      CSPDarknet
    </text>
  </g>
  
  <!-- Arrows to Neck -->
  <g stroke="#4ecdc4" stroke-width="2">
    <path d="M430,195 L480,195"/>
    <path d="M430,240 L480,240"/>
    <path d="M430,285 L480,285"/>
  </g>
  
  <!-- Neck (FPN/PAN) -->
  <g transform="translate(490, 60)">
    <rect x="0" y="0" width="180" height="300" rx="15" fill="#252547" stroke="#4ecdc4" stroke-width="3"/>
    <text x="90" y="30" fill="#4ecdc4" font-family="Consolas, monospace" font-size="16" text-anchor="middle" font-weight="bold">
      Neck (FPN/PAN)
    </text>
    
    <!-- Top-down path -->
    <g transform="translate(15, 50)">
      <rect x="0" y="0" width="150" height="70" rx="5" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1"/>
      <text x="75" y="20" fill="#4ecdc4" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Top-Down Path</text>
      <text x="75" y="40" fill="#888" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">P5 upsample concat P4</text>
      <text x="75" y="55" fill="#888" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">P4 upsample concat P3</text>
    </g>
    
    <!-- Bottom-up path -->
    <g transform="translate(15, 130)">
      <rect x="0" y="0" width="150" height="70" rx="5" fill="#1a1a2e" stroke="#ffd93d" stroke-width="1"/>
      <text x="75" y="20" fill="#ffd93d" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Bottom-Up Path</text>
      <text x="75" y="40" fill="#888" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">P3 downsample concat</text>
      <text x="75" y="55" fill="#888" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">P4 downsample concat</text>
    </g>
    
    <!-- Output features -->
    <g transform="translate(15, 210)">
      <rect x="0" y="0" width="45" height="30" rx="3" fill="#4ecdc4"/>
      <text x="22" y="20" fill="#000" font-family="Consolas, monospace" font-size="9" text-anchor="middle">P3</text>
    </g>
    <g transform="translate(67, 210)">
      <rect x="0" y="0" width="45" height="30" rx="3" fill="#4ecdc4"/>
      <text x="22" y="20" fill="#000" font-family="Consolas, monospace" font-size="9" text-anchor="middle">P4</text>
    </g>
    <g transform="translate(120, 210)">
      <rect x="0" y="0" width="45" height="30" rx="3" fill="#4ecdc4"/>
      <text x="22" y="20" fill="#000" font-family="Consolas, monospace" font-size="9" text-anchor="middle">P5</text>
    </g>
    
    <text x="90" y="270" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      Multi-scale features
    </text>
  </g>
  
  <!-- Arrows to Head -->
  <g stroke="#4ecdc4" stroke-width="2">
    <path d="M670,195 L720,195"/>
    <path d="M670,240 L720,240"/>
    <path d="M670,285 L720,285"/>
  </g>
  
  <!-- Head -->
  <g transform="translate(730, 60)">
    <rect x="0" y="0" width="220" height="300" rx="15" fill="#252547" stroke="#ffd93d" stroke-width="3"/>
    <text x="110" y="30" fill="#ffd93d" font-family="Consolas, monospace" font-size="16" text-anchor="middle" font-weight="bold">
      Detection Head
    </text>
    
    <!-- Branches -->
    <g transform="translate(15, 50)">
      <rect x="0" y="0" width="90" height="80" rx="5" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="1"/>
      <text x="45" y="20" fill="#ff6b6b" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Bbox Branch</text>
      <text x="45" y="40" fill="#888" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">Conv 3x3</text>
      <text x="45" y="55" fill="#888" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">Conv 3x3</text>
      <text x="45" y="70" fill="#888" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">4*16 ch</text>
    </g>
    <g transform="translate(115, 50)">
      <rect x="0" y="0" width="90" height="80" rx="5" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1"/>
      <text x="45" y="20" fill="#4ecdc4" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Cls Branch</text>
      <text x="45" y="40" fill="#888" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">Conv 3x3</text>
      <text x="45" y="55" fill="#888" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">Conv 3x3</text>
      <text x="45" y="70" fill="#888" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">nc ch</text>
    </g>
    
    <!-- DFL -->
    <g transform="translate(15, 145)">
      <rect x="0" y="0" width="190" height="45" rx="5" fill="#ffd93d"/>
      <text x="95" y="18" fill="#000" font-family="Consolas, monospace" font-size="11" text-anchor="middle" font-weight="bold">DFL (Distribution Focal)</text>
      <text x="95" y="35" fill="#000" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">16 bins softmax regression</text>
    </g>
    
    <!-- Output -->
    <g transform="translate(15, 205)">
      <rect x="0" y="0" width="190" height="70" rx="5" fill="#1a1a2e"/>
      <text x="95" y="20" fill="#fff" font-family="Consolas, monospace" font-size="11" text-anchor="middle">Output per scale:</text>
      <text x="95" y="40" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">[B, 4*16+nc, H, W]</text>
      <text x="95" y="58" fill="#4ecdc4" font-family="Consolas, monospace" font-size="9" text-anchor="middle">8400 predictions total</text>
    </g>
  </g>
  
  <!-- Model Variants Table -->
  <g transform="translate(50, 400)">
    <rect x="0" y="0" width="900" height="180" rx="10" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
    <text x="450" y="25" fill="#fff" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      YOLOv8 Model Variants
    </text>
    
    <!-- Header -->
    <g transform="translate(20, 40)">
      <text x="60" y="15" fill="#4ecdc4" font-family="Consolas, monospace" font-size="11" text-anchor="middle">Variant</text>
      <text x="180" y="15" fill="#4ecdc4" font-family="Consolas, monospace" font-size="11" text-anchor="middle">Depth</text>
      <text x="340" y="15" fill="#4ecdc4" font-family="Consolas, monospace" font-size="11" text-anchor="middle">Width</text>
      <text x="560" y="15" fill="#4ecdc4" font-family="Consolas, monospace" font-size="11" text-anchor="middle">Params</text>
      <text x="700" y="15" fill="#4ecdc4" font-family="Consolas, monospace" font-size="11" text-anchor="middle">mAP</text>
      <text x="820" y="15" fill="#4ecdc4" font-family="Consolas, monospace" font-size="11" text-anchor="middle">Speed</text>
    </g>
    
    <!-- Rows -->
    <g transform="translate(20, 70)">
      <text x="60" y="0" fill="#ff6b6b" font-family="Consolas, monospace" font-size="11" text-anchor="middle">YOLOv8n</text>
      <text x="180" y="0" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">[1,2,2]</text>
      <text x="340" y="0" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">[16,32,64,128,256]</text>
      <text x="560" y="0" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">3.2M</text>
      <text x="700" y="0" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">37.3</text>
      <text x="820" y="0" fill="#4ecdc4" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Fastest</text>
    </g>
    <g transform="translate(20, 95)">
      <text x="60" y="0" fill="#ffd93d" font-family="Consolas, monospace" font-size="11" text-anchor="middle">YOLOv8s</text>
      <text x="180" y="0" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">[1,2,2]</text>
      <text x="340" y="0" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">[32,64,128,256,512]</text>
      <text x="560" y="0" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">11.2M</text>
      <text x="700" y="0" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">44.9</text>
      <text x="820" y="0" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Fast</text>
    </g>
    <g transform="translate(20, 120)">
      <text x="60" y="0" fill="#4ecdc4" font-family="Consolas, monospace" font-size="11" text-anchor="middle">YOLOv8m</text>
      <text x="180" y="0" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">[2,4,4]</text>
      <text x="340" y="0" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">[48,96,192,384,576]</text>
      <text x="560" y="0" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">25.9M</text>
      <text x="700" y="0" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">50.2</text>
      <text x="820" y="0" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Medium</text>
    </g>
    <g transform="translate(20, 145)">
      <text x="60" y="0" fill="#ff6b6b" font-family="Consolas, monospace" font-size="11" text-anchor="middle">YOLOv8l/x</text>
      <text x="180" y="0" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">[3,6,6]</text>
      <text x="340" y="0" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">[64-80, 128-160, ...]</text>
      <text x="560" y="0" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">43-68M</text>
      <text x="700" y="0" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">52-54</text>
      <text x="820" y="0" fill="#ffd93d" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Accurate</text>
    </g>
  </g>
</svg>
