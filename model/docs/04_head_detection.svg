<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <linearGradient id="bgHead" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="480" fill="url(#bgHead)"/>
  
  <!-- Title -->
  <text x="450" y="35" fill="#fff" font-family="Georgia, serif" font-size="24" text-anchor="middle" font-weight="bold">
    YOLOv8 Detection Head
  </text>
  
  <!-- Input Features -->
  <g transform="translate(50, 60)">
    <text x="60" y="0" fill="#4ecdc4" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">Input</text>
    <rect x="0" y="10" width="120" height="35" rx="5" fill="#4ecdc4"/>
    <text x="60" y="32" fill="#000" font-family="Consolas, monospace" font-size="10" text-anchor="middle">[B, C, 80, 80]</text>
    <rect x="0" y="55" width="120" height="35" rx="5" fill="#ffd93d"/>
    <text x="60" y="77" fill="#000" font-family="Consolas, monospace" font-size="10" text-anchor="middle">[B, C, 40, 40]</text>
    <rect x="0" y="100" width="120" height="35" rx="5" fill="#ff6b6b"/>
    <text x="60" y="122" fill="#000" font-family="Consolas, monospace" font-size="10" text-anchor="middle">[B, C, 20, 20]</text>
    <text x="60" y="155" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">3 FPN scales</text>
  </g>
  
  <!-- Decoupled Heads -->
  <g transform="translate(220, 60)">
    <text x="140" y="0" fill="#fff" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">Decoupled Head (per scale)</text>
    
    <!-- BBox Branch -->
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="280" height="70" rx="8" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
      <text x="140" y="20" fill="#ff6b6b" font-family="Consolas, monospace" font-size="11" text-anchor="middle" font-weight="bold">
        Bounding Box Branch
      </text>
      
      <g transform="translate(20, 30)">
        <rect x="0" y="0" width="70" height="28" rx="4" fill="#1a1a2e"/>
        <text x="35" y="18" fill="#ccc" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Conv 3x3</text>
      </g>
      <text x="105" y="48" fill="#fff">→</text>
      <g transform="translate(115, 30)">
        <rect x="0" y="0" width="70" height="28" rx="4" fill="#1a1a2e"/>
        <text x="35" y="18" fill="#ccc" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Conv 3x3</text>
      </g>
      <text x="200" y="48" fill="#fff">→</text>
      <g transform="translate(210, 30)">
        <rect x="0" y="0" width="55" height="28" rx="4" fill="#ff6b6b"/>
        <text x="27" y="18" fill="#000" font-family="Consolas, monospace" font-size="9" text-anchor="middle">64 ch</text>
      </g>
    </g>
    
    <!-- Cls Branch -->
    <g transform="translate(0, 100)">
      <rect x="0" y="0" width="280" height="70" rx="8" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
      <text x="140" y="20" fill="#4ecdc4" font-family="Consolas, monospace" font-size="11" text-anchor="middle" font-weight="bold">
        Classification Branch
      </text>
      
      <g transform="translate(20, 30)">
        <rect x="0" y="0" width="70" height="28" rx="4" fill="#1a1a2e"/>
        <text x="35" y="18" fill="#ccc" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Conv 3x3</text>
      </g>
      <text x="105" y="48" fill="#fff">→</text>
      <g transform="translate(115, 30)">
        <rect x="0" y="0" width="70" height="28" rx="4" fill="#1a1a2e"/>
        <text x="35" y="18" fill="#ccc" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Conv 3x3</text>
      </g>
      <text x="200" y="48" fill="#fff">→</text>
      <g transform="translate(210, 30)">
        <rect x="0" y="0" width="55" height="28" rx="4" fill="#4ecdc4"/>
        <text x="27" y="18" fill="#000" font-family="Consolas, monospace" font-size="9" text-anchor="middle">nc</text>
      </g>
    </g>
  </g>
  
  <!-- DFL Module -->
  <g transform="translate(550, 60)">
    <rect x="0" y="0" width="300" height="180" rx="10" fill="#252547" stroke="#ffd93d" stroke-width="2"/>
    <text x="150" y="25" fill="#ffd93d" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      DFL (Distribution Focal Loss)
    </text>
    
    <g transform="translate(20, 40)">
      <text x="130" y="15" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Input: [B, 4*16, H*W]</text>
      
      <!-- 16 bins visualization -->
      <g transform="translate(0, 30)">
        <text x="0" y="12" fill="#888" font-family="Consolas, monospace" font-size="9">16 bins per edge:</text>
        <g transform="translate(100, 0)">
          <rect x="0" y="0" width="12" height="18" fill="#ffd93d" opacity="0.3"/>
          <rect x="14" y="0" width="12" height="18" fill="#ffd93d" opacity="0.4"/>
          <rect x="28" y="0" width="12" height="18" fill="#ffd93d" opacity="0.5"/>
          <rect x="42" y="0" width="12" height="18" fill="#ffd93d" opacity="0.6"/>
          <rect x="56" y="0" width="12" height="18" fill="#ffd93d" opacity="0.7"/>
          <rect x="70" y="0" width="12" height="18" fill="#ffd93d" opacity="0.8"/>
          <rect x="84" y="0" width="12" height="18" fill="#ffd93d" opacity="0.9"/>
          <rect x="98" y="0" width="12" height="18" fill="#ffd93d"/>
          <text x="55" y="35" fill="#888" font-family="Consolas, monospace" font-size="8" text-anchor="middle">0 1 2 ... 15</text>
        </g>
      </g>
      
      <g transform="translate(0, 75)">
        <text x="130" y="0" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Softmax per edge (4 edges)</text>
        <text x="130" y="20" fill="#4ecdc4" font-family="Consolas, monospace" font-size="10" text-anchor="middle">l, t, r, b = softmax(bins)</text>
      </g>
      
      <g transform="translate(0, 105)">
        <text x="130" y="0" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Expected value (weighted sum):</text>
        <text x="130" y="20" fill="#ff6b6b" font-family="Consolas, monospace" font-size="10" text-anchor="middle">dist = sum(softmax * [0..15])</text>
      </g>
    </g>
  </g>
  
  <!-- Output Format -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="800" height="100" rx="10" fill="#252547" stroke="#888" stroke-width="1"/>
    <text x="400" y="25" fill="#fff" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      Output Tensor Format (Training vs Inference)
    </text>
    
    <!-- Training -->
    <g transform="translate(30, 45)">
      <text x="0" y="0" fill="#ff6b6b" font-family="Consolas, monospace" font-size="11">Training:</text>
      <text x="80" y="0" fill="#ccc" font-family="Consolas, monospace" font-size="10">[B, 4*16+nc, H, W] per scale (3 tensors)</text>
      <text x="80" y="18" fill="#888" font-family="Consolas, monospace" font-size="9">Raw logits, no decoding</text>
    </g>
    
    <!-- Inference -->
    <g transform="translate(30, 80)">
      <text x="0" y="0" fill="#4ecdc4" font-family="Consolas, monospace" font-size="11">Inference:</text>
      <text x="80" y="0" fill="#ccc" font-family="Consolas, monospace" font-size="10">[B, 4+nc, 8400] concatenated all scales</text>
      <text x="80" y="18" fill="#888" font-family="Consolas, monospace" font-size="9">DFL decoded boxes + sigmoid scores</text>
    </g>
  </g>
  
  <!-- Anchor-free Concept -->
  <g transform="translate(50, 370)">
    <rect x="0" y="0" width="800" height="100" rx="10" fill="#1a1a2e"/>
    <text x="400" y="25" fill="#fff" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      YOLOv8 is Anchor-Free
    </text>
    
    <g transform="translate(30, 50)">
      <text x="0" y="0" fill="#4ecdc4" font-family="Consolas, monospace" font-size="10">No predefined anchor boxes</text>
      <text x="0" y="20" fill="#888" font-family="Arial, sans-serif" font-size="10">
        Each grid cell directly predicts distances (l, t, r, b) from cell center to box edges
      </text>
    </g>
    
    <g transform="translate(400, 50)">
      <text x="0" y="0" fill="#ffd93d" font-family="Consolas, monospace" font-size="10">DFL advantage:</text>
      <text x="0" y="20" fill="#888" font-family="Arial, sans-serif" font-size="10">
        Distribution over discrete bins allows flexible, accurate box regression
      </text>
    </g>
    
    <g transform="translate(30, 80)">
      <text x="0" y="0" fill="#ff6b6b" font-family="Consolas, monospace" font-size="10">Total predictions: 80*80 + 40*40 + 20*20 = 8400 per image</text>
    </g>
  </g>
</svg>

