<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <linearGradient id="bgBlocks" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="url(#bgBlocks)"/>
  
  <!-- Title -->
  <text x="500" y="35" fill="#fff" font-family="Georgia, serif" font-size="24" text-anchor="middle" font-weight="bold">
    YOLOv8 Building Blocks
  </text>
  
  <!-- ConvBlock -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="280" height="180" rx="10" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="140" y="25" fill="#ff6b6b" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      ConvBlock
    </text>
    
    <!-- Flow -->
    <g transform="translate(30, 45)">
      <rect x="0" y="0" width="60" height="35" rx="5" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1"/>
      <text x="30" y="22" fill="#4ecdc4" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Conv2d</text>
    </g>
    <path d="M100,62 L120,62" stroke="#fff" stroke-width="2"/>
    <g transform="translate(130, 45)">
      <rect x="0" y="0" width="60" height="35" rx="5" fill="#1a1a2e" stroke="#ffd93d" stroke-width="1"/>
      <text x="30" y="22" fill="#ffd93d" font-family="Consolas, monospace" font-size="10" text-anchor="middle">BN</text>
    </g>
    <path d="M200,62 L220,62" stroke="#fff" stroke-width="2"/>
    <g transform="translate(130, 95)">
      <rect x="0" y="0" width="60" height="35" rx="5" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="1"/>
      <text x="30" y="22" fill="#ff6b6b" font-family="Consolas, monospace" font-size="10" text-anchor="middle">SiLU</text>
    </g>
    
    <text x="140" y="155" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      Standard convolution block
    </text>
    <text x="140" y="170" fill="#666" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">
      Conv + BatchNorm + SiLU activation
    </text>
  </g>
  
  <!-- CSPBlock -->
  <g transform="translate(360, 70)">
    <rect x="0" y="0" width="280" height="180" rx="10" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="140" y="25" fill="#4ecdc4" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      CSPBlock (C2f)
    </text>
    
    <!-- Split -->
    <g transform="translate(20, 50)">
      <rect x="0" y="0" width="50" height="30" rx="5" fill="#ff6b6b"/>
      <text x="25" y="20" fill="#000" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Split</text>
    </g>
    
    <!-- Two paths -->
    <path d="M75,65 L90,50 L110,50" stroke="#fff" stroke-width="1"/>
    <path d="M75,65 L90,80 L110,80" stroke="#fff" stroke-width="1"/>
    
    <!-- Path 1 (direct) -->
    <g transform="translate(115, 35)">
      <rect x="0" y="0" width="60" height="30" rx="5" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
      <text x="30" y="20" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Direct</text>
    </g>
    
    <!-- Path 2 (residual blocks) -->
    <g transform="translate(115, 70)">
      <rect x="0" y="0" width="60" height="30" rx="5" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1"/>
      <text x="30" y="20" fill="#4ecdc4" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Res x n</text>
    </g>
    
    <!-- Concat -->
    <path d="M180,50 L195,65 L180,80" stroke="#fff" stroke-width="1"/>
    <g transform="translate(200, 50)">
      <rect x="0" y="0" width="50" height="50" rx="5" fill="#ffd93d"/>
      <text x="25" y="30" fill="#000" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Cat</text>
    </g>
    
    <text x="140" y="140" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      Cross Stage Partial
    </text>
    <text x="140" y="155" fill="#666" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">
      Split, process, concatenate
    </text>
    <text x="140" y="170" fill="#666" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">
      n = depth parameter
    </text>
  </g>
  
  <!-- SPPBlock -->
  <g transform="translate(670, 70)">
    <rect x="0" y="0" width="280" height="180" rx="10" fill="#252547" stroke="#ffd93d" stroke-width="2"/>
    <text x="140" y="25" fill="#ffd93d" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      SPPBlock (SPPF)
    </text>
    
    <!-- Input conv -->
    <g transform="translate(30, 45)">
      <rect x="0" y="0" width="50" height="25" rx="3" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="1"/>
      <text x="25" y="17" fill="#ff6b6b" font-family="Consolas, monospace" font-size="8" text-anchor="middle">Conv</text>
    </g>
    
    <!-- MaxPool chain -->
    <path d="M85,57 L100,57" stroke="#fff" stroke-width="1"/>
    <g transform="translate(105, 45)">
      <rect x="0" y="0" width="40" height="25" rx="3" fill="#4ecdc4"/>
      <text x="20" y="17" fill="#000" font-family="Consolas, monospace" font-size="7" text-anchor="middle">MP</text>
    </g>
    <path d="M150,57 L160,57" stroke="#fff" stroke-width="1"/>
    <g transform="translate(165, 45)">
      <rect x="0" y="0" width="40" height="25" rx="3" fill="#4ecdc4"/>
      <text x="20" y="17" fill="#000" font-family="Consolas, monospace" font-size="7" text-anchor="middle">MP</text>
    </g>
    <path d="M210,57 L220,57" stroke="#fff" stroke-width="1"/>
    <g transform="translate(225, 45)">
      <rect x="0" y="0" width="40" height="25" rx="3" fill="#4ecdc4"/>
      <text x="20" y="17" fill="#000" font-family="Consolas, monospace" font-size="7" text-anchor="middle">MP</text>
    </g>
    
    <!-- Concat all -->
    <g transform="translate(90, 85)">
      <rect x="0" y="0" width="100" height="30" rx="5" fill="#ffd93d"/>
      <text x="50" y="20" fill="#000" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Concat All</text>
    </g>
    
    <!-- Output conv -->
    <g transform="translate(90, 125)">
      <rect x="0" y="0" width="100" height="25" rx="3" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="1"/>
      <text x="50" y="17" fill="#ff6b6b" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Conv</text>
    </g>
    
    <text x="140" y="170" fill="#888" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">
      Spatial Pyramid Pooling Fast
    </text>
  </g>
  
  <!-- ResidualBlock -->
  <g transform="translate(50, 280)">
    <rect x="0" y="0" width="280" height="150" rx="10" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="140" y="25" fill="#4ecdc4" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      ResidualBlock
    </text>
    
    <!-- Main path -->
    <g transform="translate(30, 50)">
      <rect x="0" y="0" width="60" height="30" rx="5" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="1"/>
      <text x="30" y="20" fill="#ff6b6b" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Conv 3x3</text>
    </g>
    <path d="M95,65 L115,65" stroke="#fff" stroke-width="1"/>
    <g transform="translate(120, 50)">
      <rect x="0" y="0" width="60" height="30" rx="5" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="1"/>
      <text x="30" y="20" fill="#ff6b6b" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Conv 3x3</text>
    </g>
    
    <!-- Skip connection -->
    <path d="M30,50 L30,35 L220,35 L220,65" stroke="#4ecdc4" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
    
    <!-- Add -->
    <g transform="translate(200, 50)">
      <circle cx="20" cy="15" r="15" fill="#ffd93d"/>
      <text x="20" y="20" fill="#000" font-family="Georgia, serif" font-size="16" text-anchor="middle">+</text>
    </g>
    
    <text x="140" y="110" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      Skip connection for gradient flow
    </text>
    <text x="140" y="125" fill="#666" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">
      add=True enables residual addition
    </text>
  </g>
  
  <!-- DFL Block -->
  <g transform="translate(360, 280)">
    <rect x="0" y="0" width="280" height="150" rx="10" fill="#252547" stroke="#ffd93d" stroke-width="2"/>
    <text x="140" y="25" fill="#ffd93d" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      DFL (Distribution Focal)
    </text>
    
    <!-- Process -->
    <g transform="translate(30, 50)">
      <rect x="0" y="0" width="60" height="30" rx="5" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1"/>
      <text x="30" y="20" fill="#4ecdc4" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Reshape</text>
    </g>
    <path d="M95,65 L115,65" stroke="#fff" stroke-width="1"/>
    <g transform="translate(120, 50)">
      <rect x="0" y="0" width="60" height="30" rx="5" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="1"/>
      <text x="30" y="20" fill="#ff6b6b" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Softmax</text>
    </g>
    <path d="M185,65 L205,65" stroke="#fff" stroke-width="1"/>
    <g transform="translate(210, 50)">
      <rect x="0" y="0" width="50" height="30" rx="5" fill="#1a1a2e" stroke="#ffd93d" stroke-width="1"/>
      <text x="25" y="20" fill="#ffd93d" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Conv</text>
    </g>
    
    <text x="140" y="105" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      16-bin distribution to regression
    </text>
    <text x="140" y="120" fill="#666" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">
      Integral over learned distribution
    </text>
    <text x="140" y="135" fill="#666" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">
      Output: [B, 4, anchors]
    </text>
  </g>
  
  <!-- RepViT Block -->
  <g transform="translate(670, 280)">
    <rect x="0" y="0" width="280" height="150" rx="10" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="140" y="25" fill="#ff6b6b" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      RepViTBlock
    </text>
    
    <g transform="translate(30, 50)">
      <rect x="0" y="0" width="70" height="30" rx="5" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1"/>
      <text x="35" y="20" fill="#4ecdc4" font-family="Consolas, monospace" font-size="8" text-anchor="middle">TokenMix</text>
    </g>
    <path d="M105,65 L120,65" stroke="#fff" stroke-width="1"/>
    <g transform="translate(125, 50)">
      <rect x="0" y="0" width="50" height="30" rx="5" fill="#1a1a2e" stroke="#ffd93d" stroke-width="1"/>
      <text x="25" y="20" fill="#ffd93d" font-family="Consolas, monospace" font-size="8" text-anchor="middle">SE</text>
    </g>
    <path d="M180,65 L195,65" stroke="#fff" stroke-width="1"/>
    <g transform="translate(200, 50)">
      <rect x="0" y="0" width="60" height="30" rx="5" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="1"/>
      <text x="30" y="20" fill="#ff6b6b" font-family="Consolas, monospace" font-size="8" text-anchor="middle">ChanMix</text>
    </g>
    
    <text x="140" y="105" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      Re-parameterizable ViT block
    </text>
    <text x="140" y="120" fill="#666" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">
      Mobile-friendly architecture
    </text>
    <text x="140" y="135" fill="#666" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">
      Fuses to single conv at deploy
    </text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(50, 460)">
    <rect x="0" y="0" width="900" height="70" rx="10" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
    <text x="450" y="25" fill="#fff" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">
      Activation Functions
    </text>
    <g transform="translate(100, 40)">
      <rect x="0" y="0" width="80" height="22" rx="3" fill="#ff6b6b"/>
      <text x="40" y="15" fill="#000" font-family="Consolas, monospace" font-size="9" text-anchor="middle">SiLU</text>
    </g>
    <g transform="translate(220, 40)">
      <rect x="0" y="0" width="80" height="22" rx="3" fill="#4ecdc4"/>
      <text x="40" y="15" fill="#000" font-family="Consolas, monospace" font-size="9" text-anchor="middle">ReLU6</text>
    </g>
    <g transform="translate(340, 40)">
      <rect x="0" y="0" width="80" height="22" rx="3" fill="#ffd93d"/>
      <text x="40" y="15" fill="#000" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Sigmoid</text>
    </g>
    <text x="550" y="55" fill="#888" font-family="Arial, sans-serif" font-size="10">
      SiLU = x * sigmoid(x) | Smooth, non-monotonic activation
    </text>
  </g>
</svg>

