<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <linearGradient id="bgBlocks" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="url(#bgBlocks)"/>
  
  <!-- Title -->
  <text x="500" y="35" fill="#fff" font-family="Georgia, serif" font-size="24" text-anchor="middle" font-weight="bold">
    YOLOv8 Building Blocks
  </text>
  
  <!-- ConvBlock -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="280" height="130" rx="10" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="140" y="25" fill="#ff6b6b" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      ConvBlock
    </text>
    
    <g transform="translate(20, 40)">
      <rect x="0" y="0" width="70" height="30" rx="5" fill="#ff6b6b"/>
      <text x="35" y="20" fill="#000" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Conv2d</text>
    </g>
    <text x="105" y="58" fill="#fff" font-size="16">→</text>
    <g transform="translate(115, 40)">
      <rect x="0" y="0" width="60" height="30" rx="5" fill="#4ecdc4"/>
      <text x="30" y="20" fill="#000" font-family="Consolas, monospace" font-size="10" text-anchor="middle">BN</text>
    </g>
    <text x="190" y="58" fill="#fff" font-size="16">→</text>
    <g transform="translate(200, 40)">
      <rect x="0" y="0" width="60" height="30" rx="5" fill="#ffd93d"/>
      <text x="30" y="20" fill="#000" font-family="Consolas, monospace" font-size="10" text-anchor="middle">SiLU</text>
    </g>
    
    <text x="140" y="100" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      Conv(k, s, p) + BatchNorm + SiLU
    </text>
    <text x="140" y="118" fill="#666" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">
      Basic convolution with normalization
    </text>
  </g>
  
  <!-- ResidualBlock -->
  <g transform="translate(360, 60)">
    <rect x="0" y="0" width="280" height="130" rx="10" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="140" y="25" fill="#4ecdc4" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      ResidualBlock
    </text>
    
    <!-- Skip connection -->
    <path d="M30,55 L30,80 L250,80 L250,55" stroke="#4ecdc4" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
    
    <g transform="translate(50, 40)">
      <rect x="0" y="0" width="80" height="25" rx="5" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="1"/>
      <text x="40" y="17" fill="#ccc" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Conv 3x3</text>
    </g>
    <text x="145" y="55" fill="#fff" font-size="14">→</text>
    <g transform="translate(155, 40)">
      <rect x="0" y="0" width="80" height="25" rx="5" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="1"/>
      <text x="40" y="17" fill="#ccc" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Conv 3x3</text>
    </g>
    
    <circle cx="250" cy="55" r="12" fill="#4ecdc4"/>
    <text x="250" y="60" fill="#000" font-family="Arial" font-size="16" text-anchor="middle">+</text>
    
    <text x="140" y="110" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      output = conv(conv(x)) + x
    </text>
  </g>
  
  <!-- CSPBlock -->
  <g transform="translate(670, 60)">
    <rect x="0" y="0" width="280" height="130" rx="10" fill="#252547" stroke="#ffd93d" stroke-width="2"/>
    <text x="140" y="25" fill="#ffd93d" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      CSPBlock (C2f)
    </text>
    
    <!-- Split paths -->
    <g transform="translate(20, 40)">
      <rect x="0" y="0" width="50" height="25" rx="5" fill="#1a1a2e"/>
      <text x="25" y="17" fill="#ccc" font-family="Consolas, monospace" font-size="8" text-anchor="middle">Split</text>
    </g>
    
    <g transform="translate(85, 35)">
      <rect x="0" y="0" width="60" height="20" rx="3" fill="#ffd93d"/>
      <text x="30" y="14" fill="#000" font-family="Consolas, monospace" font-size="8" text-anchor="middle">Path 1</text>
    </g>
    <g transform="translate(85, 58)">
      <rect x="0" y="0" width="60" height="20" rx="3" fill="#ff6b6b"/>
      <text x="30" y="14" fill="#000" font-family="Consolas, monospace" font-size="8" text-anchor="middle">Path 2</text>
    </g>
    
    <g transform="translate(155, 35)">
      <rect x="0" y="0" width="60" height="45" rx="3" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1"/>
      <text x="30" y="17" fill="#ccc" font-family="Consolas, monospace" font-size="8" text-anchor="middle">Residual</text>
      <text x="30" y="32" fill="#ccc" font-family="Consolas, monospace" font-size="8" text-anchor="middle">Blocks</text>
    </g>
    
    <g transform="translate(225, 40)">
      <rect x="0" y="0" width="40" height="25" rx="3" fill="#4ecdc4"/>
      <text x="20" y="17" fill="#000" font-family="Consolas, monospace" font-size="8" text-anchor="middle">Cat</text>
    </g>
    
    <text x="140" y="105" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      Cross Stage Partial
    </text>
    <text x="140" y="120" fill="#666" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">
      Split input, process, concatenate
    </text>
  </g>
  
  <!-- SPPBlock -->
  <g transform="translate(50, 220)">
    <rect x="0" y="0" width="280" height="140" rx="10" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="140" y="25" fill="#ff6b6b" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      SPPBlock (SPPF)
    </text>
    
    <!-- Multi-scale pooling -->
    <g transform="translate(30, 45)">
      <rect x="0" y="0" width="50" height="25" rx="3" fill="#1a1a2e"/>
      <text x="25" y="17" fill="#ccc" font-family="Consolas, monospace" font-size="8" text-anchor="middle">Conv</text>
    </g>
    
    <g transform="translate(95, 35)">
      <rect x="0" y="0" width="40" height="18" rx="3" fill="#ff6b6b"/>
      <text x="20" y="13" fill="#000" font-family="Consolas, monospace" font-size="7" text-anchor="middle">Pool</text>
    </g>
    <g transform="translate(95, 55)">
      <rect x="0" y="0" width="40" height="18" rx="3" fill="#ff6b6b"/>
      <text x="20" y="13" fill="#000" font-family="Consolas, monospace" font-size="7" text-anchor="middle">Pool</text>
    </g>
    <g transform="translate(95, 75)">
      <rect x="0" y="0" width="40" height="18" rx="3" fill="#ff6b6b"/>
      <text x="20" y="13" fill="#000" font-family="Consolas, monospace" font-size="7" text-anchor="middle">Pool</text>
    </g>
    
    <g transform="translate(150, 50)">
      <rect x="0" y="0" width="40" height="35" rx="3" fill="#4ecdc4"/>
      <text x="20" y="22" fill="#000" font-family="Consolas, monospace" font-size="8" text-anchor="middle">Cat</text>
    </g>
    
    <g transform="translate(205, 50)">
      <rect x="0" y="0" width="50" height="35" rx="3" fill="#1a1a2e"/>
      <text x="25" y="22" fill="#ccc" font-family="Consolas, monospace" font-size="8" text-anchor="middle">Conv</text>
    </g>
    
    <text x="140" y="115" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      Spatial Pyramid Pooling Fast
    </text>
    <text x="140" y="130" fill="#666" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">
      Multi-scale features with MaxPool 5x5
    </text>
  </g>
  
  <!-- DFL -->
  <g transform="translate(360, 220)">
    <rect x="0" y="0" width="280" height="140" rx="10" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="140" y="25" fill="#4ecdc4" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      DFL (Distribution Focal)
    </text>
    
    <g transform="translate(20, 45)">
      <rect x="0" y="0" width="240" height="55" rx="5" fill="#1a1a2e"/>
      <text x="120" y="20" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
        Input: [B, 4*16, A] boxes
      </text>
      <text x="120" y="38" fill="#4ecdc4" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
        Softmax over 16 bins per edge
      </text>
      <text x="120" y="52" fill="#888" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">
        Expected value = weighted sum
      </text>
    </g>
    
    <text x="140" y="120" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      Regress bbox as distribution
    </text>
    <text x="140" y="135" fill="#666" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">
      Better localization than direct regression
    </text>
  </g>
  
  <!-- RepViTBlock -->
  <g transform="translate(670, 220)">
    <rect x="0" y="0" width="280" height="140" rx="10" fill="#252547" stroke="#ffd93d" stroke-width="2"/>
    <text x="140" y="25" fill="#ffd93d" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      RepViTBlock
    </text>
    
    <g transform="translate(20, 45)">
      <rect x="0" y="0" width="240" height="55" rx="5" fill="#1a1a2e"/>
      <text x="120" y="18" fill="#ccc" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
        Token Mixer (DWConv + BN)
      </text>
      <text x="120" y="35" fill="#ffd93d" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
        + Channel Mixer (1x1 Conv)
      </text>
      <text x="120" y="50" fill="#888" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">
        Optional: SE attention
      </text>
    </g>
    
    <text x="140" y="120" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">
      Re-parameterizable ViT block
    </text>
    <text x="140" y="135" fill="#666" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">
      Efficient mobile-friendly architecture
    </text>
  </g>
  
  <!-- Block Hierarchy -->
  <g transform="translate(50, 390)">
    <rect x="0" y="0" width="900" height="140" rx="10" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
    <text x="450" y="25" fill="#fff" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">
      Block Hierarchy in YOLOv8
    </text>
    
    <!-- Flow -->
    <g transform="translate(50, 50)">
      <rect x="0" y="0" width="100" height="40" rx="5" fill="#ff6b6b"/>
      <text x="50" y="25" fill="#000" font-family="Consolas, monospace" font-size="10" text-anchor="middle">ConvBlock</text>
    </g>
    <text x="175" y="70" fill="#fff" font-size="18">→</text>
    <g transform="translate(200, 50)">
      <rect x="0" y="0" width="100" height="40" rx="5" fill="#4ecdc4"/>
      <text x="50" y="25" fill="#000" font-family="Consolas, monospace" font-size="10" text-anchor="middle">ResidualBlock</text>
    </g>
    <text x="325" y="70" fill="#fff" font-size="18">→</text>
    <g transform="translate(350, 50)">
      <rect x="0" y="0" width="100" height="40" rx="5" fill="#ffd93d"/>
      <text x="50" y="25" fill="#000" font-family="Consolas, monospace" font-size="10" text-anchor="middle">CSPBlock</text>
    </g>
    <text x="475" y="70" fill="#fff" font-size="18">→</text>
    <g transform="translate(500, 50)">
      <rect x="0" y="0" width="100" height="40" rx="5" fill="#ff6b6b"/>
      <text x="50" y="25" fill="#000" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Backbone</text>
    </g>
    <text x="625" y="70" fill="#fff" font-size="18">→</text>
    <g transform="translate(650, 50)">
      <rect x="0" y="0" width="100" height="40" rx="5" fill="#4ecdc4"/>
      <text x="50" y="25" fill="#000" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Neck</text>
    </g>
    <text x="775" y="70" fill="#fff" font-size="18">→</text>
    <g transform="translate(800, 50)">
      <rect x="0" y="0" width="80" height="40" rx="5" fill="#ffd93d"/>
      <text x="40" y="25" fill="#000" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Head</text>
    </g>
    
    <text x="450" y="115" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      Primitive blocks combine to form complex modules, which form the complete architecture
    </text>
  </g>
</svg>

