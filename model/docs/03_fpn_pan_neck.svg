<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 550">
  <defs>
    <linearGradient id="bgNeck" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fff"/>
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ecdc4"/>
    </marker>
    <marker id="arrowYellow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffd93d"/>
    </marker>
  </defs>
  
  <rect width="950" height="550" fill="url(#bgNeck)"/>
  
  <text x="475" y="35" fill="#fff" font-family="Georgia, serif" font-size="24" text-anchor="middle" font-weight="bold">
    YOLOv8 FPN/PAN Neck Architecture
  </text>
  
  <!-- Legend -->
  <g transform="translate(750, 50)">
    <rect x="0" y="0" width="180" height="90" rx="5" fill="#252547"/>
    <rect x="15" y="15" width="20" height="12" fill="#ff6b6b"/>
    <text x="45" y="25" fill="#ccc" font-family="Consolas" font-size="10">Backbone (P3,P4,P5)</text>
    <rect x="15" y="35" width="20" height="12" fill="#4ecdc4"/>
    <text x="45" y="45" fill="#ccc" font-family="Consolas" font-size="10">Top-Down (FPN)</text>
    <rect x="15" y="55" width="20" height="12" fill="#ffd93d"/>
    <text x="45" y="65" fill="#ccc" font-family="Consolas" font-size="10">Bottom-Up (PAN)</text>
    <rect x="15" y="75" width="20" height="12" fill="#27ae60"/>
    <text x="45" y="85" fill="#ccc" font-family="Consolas" font-size="10">Output (N3,N4,N5)</text>
  </g>
  
  <!-- BACKBONE OUTPUTS -->
  <g transform="translate(50, 80)">
    <text x="50" y="0" fill="#ff6b6b" font-family="Consolas" font-size="14" text-anchor="middle" font-weight="bold">Backbone</text>
    
    <!-- P3 (small, high res) -->
    <rect x="0" y="20" width="100" height="55" rx="5" fill="#ff6b6b"/>
    <text x="50" y="40" fill="#000" font-family="Consolas" font-size="11" text-anchor="middle" font-weight="bold">P3</text>
    <text x="50" y="55" fill="#000" font-family="Consolas" font-size="9" text-anchor="middle">80x80, stride=8</text>
    <text x="50" y="68" fill="#000" font-family="Consolas" font-size="8" text-anchor="middle">feat_small</text>
    
    <!-- P4 (medium) -->
    <rect x="0" y="90" width="100" height="55" rx="5" fill="#ff6b6b"/>
    <text x="50" y="110" fill="#000" font-family="Consolas" font-size="11" text-anchor="middle" font-weight="bold">P4</text>
    <text x="50" y="125" fill="#000" font-family="Consolas" font-size="9" text-anchor="middle">40x40, stride=16</text>
    <text x="50" y="138" fill="#000" font-family="Consolas" font-size="8" text-anchor="middle">feat_mid</text>
    
    <!-- P5 (large, low res) -->
    <rect x="0" y="160" width="100" height="55" rx="5" fill="#ff6b6b"/>
    <text x="50" y="180" fill="#000" font-family="Consolas" font-size="11" text-anchor="middle" font-weight="bold">P5</text>
    <text x="50" y="195" fill="#000" font-family="Consolas" font-size="9" text-anchor="middle">20x20, stride=32</text>
    <text x="50" y="208" fill="#000" font-family="Consolas" font-size="8" text-anchor="middle">feat_large</text>
  </g>
  
  <!-- TOP-DOWN (FPN) PATH -->
  <g transform="translate(200, 80)">
    <text x="130" y="0" fill="#4ecdc4" font-family="Consolas" font-size="14" text-anchor="middle" font-weight="bold">Top-Down Path (FPN)</text>
    
    <!-- Step 1: Upsample P5 -->
    <g transform="translate(0, 160)">
      <rect x="0" y="0" width="70" height="40" rx="4" fill="#4ecdc4"/>
      <text x="35" y="18" fill="#000" font-family="Consolas" font-size="9" text-anchor="middle">Upsample</text>
      <text x="35" y="32" fill="#000" font-family="Consolas" font-size="8" text-anchor="middle">2x</text>
    </g>
    
    <!-- Step 2: Cat with P4, CSP -->
    <g transform="translate(90, 90)">
      <rect x="0" y="0" width="90" height="55" rx="5" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
      <text x="45" y="18" fill="#4ecdc4" font-family="Consolas" font-size="9" text-anchor="middle" font-weight="bold">Cat + CSP</text>
      <text x="45" y="32" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Up(P5) + P4</text>
      <text x="45" y="46" fill="#4ecdc4" font-family="Consolas" font-size="8" text-anchor="middle">merged_mid</text>
    </g>
    
    <!-- Step 3: Upsample merged_mid -->
    <g transform="translate(200, 90)">
      <rect x="0" y="0" width="70" height="40" rx="4" fill="#4ecdc4"/>
      <text x="35" y="18" fill="#000" font-family="Consolas" font-size="9" text-anchor="middle">Upsample</text>
      <text x="35" y="32" fill="#000" font-family="Consolas" font-size="8" text-anchor="middle">2x</text>
    </g>
    
    <!-- Step 4: Cat with P3, CSP -->
    <g transform="translate(290, 20)">
      <rect x="0" y="0" width="90" height="55" rx="5" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
      <text x="45" y="18" fill="#4ecdc4" font-family="Consolas" font-size="9" text-anchor="middle" font-weight="bold">Cat + CSP</text>
      <text x="45" y="32" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Up(m_mid) + P3</text>
      <text x="45" y="46" fill="#4ecdc4" font-family="Consolas" font-size="8" text-anchor="middle">merged_small</text>
    </g>
    
    <!-- Flow arrows for FPN -->
    <path d="M-55,185 L0,185" stroke="#4ecdc4" stroke-width="2" marker-end="url(#arrowCyan)"/>
    <path d="M70,180 L90,135" stroke="#4ecdc4" stroke-width="2" marker-end="url(#arrowCyan)"/>
    <path d="M-55,115 L90,115" stroke="#4ecdc4" stroke-width="2" stroke-dasharray="4,2"/>
    <path d="M180,115 L200,115" stroke="#4ecdc4" stroke-width="2" marker-end="url(#arrowCyan)"/>
    <path d="M270,110 L290,65" stroke="#4ecdc4" stroke-width="2" marker-end="url(#arrowCyan)"/>
    <path d="M-55,45 L290,45" stroke="#4ecdc4" stroke-width="2" stroke-dasharray="4,2"/>
  </g>
  
  <!-- BOTTOM-UP (PAN) PATH -->
  <g transform="translate(550, 80)">
    <text x="130" y="0" fill="#ffd93d" font-family="Consolas" font-size="14" text-anchor="middle" font-weight="bold">Bottom-Up Path (PAN)</text>
    
    <!-- merged_small input (from FPN) -->
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="90" height="55" rx="5" fill="#4ecdc4"/>
      <text x="45" y="18" fill="#000" font-family="Consolas" font-size="9" text-anchor="middle" font-weight="bold">merged_small</text>
      <text x="45" y="32" fill="#000" font-family="Consolas" font-size="8" text-anchor="middle">80x80</text>
      <text x="45" y="46" fill="#000" font-family="Consolas" font-size="8" text-anchor="middle">(from FPN)</text>
    </g>
    
    <!-- Step 1: Downsample merged_small -->
    <g transform="translate(0, 90)">
      <rect x="0" y="0" width="70" height="40" rx="4" fill="#ffd93d"/>
      <text x="35" y="18" fill="#000" font-family="Consolas" font-size="9" text-anchor="middle">Conv 3x3</text>
      <text x="35" y="32" fill="#000" font-family="Consolas" font-size="8" text-anchor="middle">stride=2</text>
    </g>
    
    <!-- Step 2: Cat with merged_mid, CSP -->
    <g transform="translate(90, 90)">
      <rect x="0" y="0" width="90" height="55" rx="5" fill="#252547" stroke="#ffd93d" stroke-width="2"/>
      <text x="45" y="18" fill="#ffd93d" font-family="Consolas" font-size="9" text-anchor="middle" font-weight="bold">Cat + CSP</text>
      <text x="45" y="32" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Down + m_mid</text>
      <text x="45" y="46" fill="#ffd93d" font-family="Consolas" font-size="8" text-anchor="middle">mid_down</text>
    </g>
    
    <!-- Step 3: Downsample mid_down -->
    <g transform="translate(90, 160)">
      <rect x="0" y="0" width="70" height="40" rx="4" fill="#ffd93d"/>
      <text x="35" y="18" fill="#000" font-family="Consolas" font-size="9" text-anchor="middle">Conv 3x3</text>
      <text x="35" y="32" fill="#000" font-family="Consolas" font-size="8" text-anchor="middle">stride=2</text>
    </g>
    
    <!-- Step 4: Cat with P5, CSP -->
    <g transform="translate(180, 160)">
      <rect x="0" y="0" width="90" height="55" rx="5" fill="#252547" stroke="#ffd93d" stroke-width="2"/>
      <text x="45" y="18" fill="#ffd93d" font-family="Consolas" font-size="9" text-anchor="middle" font-weight="bold">Cat + CSP</text>
      <text x="45" y="32" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Down + P5</text>
      <text x="45" y="46" fill="#ffd93d" font-family="Consolas" font-size="8" text-anchor="middle">top_down</text>
    </g>
    
    <!-- Flow arrows for PAN -->
    <path d="M45,75 L45,90" stroke="#ffd93d" stroke-width="2" marker-end="url(#arrowYellow)"/>
    <path d="M70,110 L90,110" stroke="#ffd93d" stroke-width="2" marker-end="url(#arrowYellow)"/>
    <path d="M135,145 L135,160" stroke="#ffd93d" stroke-width="2" marker-end="url(#arrowYellow)"/>
    <path d="M160,180 L180,180" stroke="#ffd93d" stroke-width="2" marker-end="url(#arrowYellow)"/>
    
    <!-- merged_mid input from left -->
    <text x="80" y="138" fill="#888" font-family="Consolas" font-size="7">+ merged_mid</text>
    <!-- P5 input from left -->
    <text x="170" y="208" fill="#888" font-family="Consolas" font-size="7">+ P5 (feat_large)</text>
  </g>
  
  <!-- OUTPUT -->
  <g transform="translate(50, 320)">
    <rect x="0" y="0" width="850" height="80" rx="10" fill="#252547"/>
    <text x="425" y="25" fill="#fff" font-family="Consolas" font-size="14" text-anchor="middle" font-weight="bold">
      Output: 3 Multi-Scale Feature Maps to Detection Head
    </text>
    
    <g transform="translate(80, 40)">
      <rect x="0" y="0" width="200" height="30" rx="4" fill="#27ae60"/>
      <text x="100" y="20" fill="#000" font-family="Consolas" font-size="10" text-anchor="middle" font-weight="bold">N3 = merged_small (80x80)</text>
    </g>
    <g transform="translate(320, 40)">
      <rect x="0" y="0" width="200" height="30" rx="4" fill="#27ae60"/>
      <text x="100" y="20" fill="#000" font-family="Consolas" font-size="10" text-anchor="middle" font-weight="bold">N4 = mid_down (40x40)</text>
    </g>
    <g transform="translate(560, 40)">
      <rect x="0" y="0" width="200" height="30" rx="4" fill="#27ae60"/>
      <text x="100" y="20" fill="#000" font-family="Consolas" font-size="10" text-anchor="middle" font-weight="bold">N5 = top_down (20x20)</text>
    </g>
  </g>
  
  <!-- Code Reference -->
  <g transform="translate(50, 420)">
    <rect x="0" y="0" width="850" height="110" rx="10" fill="#1a1a2e"/>
    <text x="425" y="25" fill="#fff" font-family="Consolas" font-size="12" text-anchor="middle" font-weight="bold">
      Neck Forward Pass (from neck.py)
    </text>
    <text x="30" y="50" fill="#4ecdc4" font-family="Consolas" font-size="10"># Top-Down (FPN)</text>
    <text x="30" y="65" fill="#888" font-family="Consolas" font-size="9">merged_mid = top_to_mid(cat([upsample(P5), P4]))</text>
    <text x="30" y="80" fill="#888" font-family="Consolas" font-size="9">merged_small = mid_to_small(cat([upsample(merged_mid), P3]))</text>
    <text x="450" y="50" fill="#ffd93d" font-family="Consolas" font-size="10"># Bottom-Up (PAN)</text>
    <text x="450" y="65" fill="#888" font-family="Consolas" font-size="9">mid_down = mid_fuse(cat([downsample(merged_small), merged_mid]))</text>
    <text x="450" y="80" fill="#888" font-family="Consolas" font-size="9">top_down = top_fuse(cat([downsample(mid_down), P5]))</text>
    <text x="425" y="100" fill="#27ae60" font-family="Consolas" font-size="10" text-anchor="middle">return merged_small, mid_down, top_down  # N3, N4, N5</text>
  </g>
</svg>
