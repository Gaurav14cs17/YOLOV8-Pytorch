<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgBack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="450" fill="url(#bgBack)"/>
  
  <text x="400" y="35" fill="#fff" font-family="Georgia, serif" font-size="24" text-anchor="middle" font-weight="bold">
    CSPDarknet Backbone
  </text>
  
  <!-- Input -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="100" height="60" rx="8" fill="#4ecdc4"/>
    <text x="50" y="25" fill="#000" font-family="Consolas, monospace" font-size="11" text-anchor="middle" font-weight="bold">Input</text>
    <text x="50" y="45" fill="#000" font-family="Consolas, monospace" font-size="9" text-anchor="middle">[B,3,640,640]</text>
  </g>
  
  <!-- Stages -->
  <g transform="translate(50, 160)">
    <!-- Stage 1 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="120" height="80" rx="8" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
      <text x="60" y="20" fill="#ff6b6b" font-family="Consolas, monospace" font-size="11" text-anchor="middle" font-weight="bold">Stage 1</text>
      <text x="60" y="40" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Conv 3x3, s=2</text>
      <text x="60" y="55" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">320x320</text>
      <text x="60" y="70" fill="#4ecdc4" font-family="Consolas, monospace" font-size="9" text-anchor="middle">16 ch</text>
    </g>
    
    <text x="135" y="40" fill="#fff" font-size="18">→</text>
    
    <!-- Stage 2 -->
    <g transform="translate(150, 0)">
      <rect x="0" y="0" width="120" height="80" rx="8" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
      <text x="60" y="20" fill="#ff6b6b" font-family="Consolas, monospace" font-size="11" text-anchor="middle" font-weight="bold">Stage 2</text>
      <text x="60" y="40" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Conv + CSP</text>
      <text x="60" y="55" fill="#888" font-family="Consolas, monospace" font-size="9" text-anchor="middle">160x160</text>
      <text x="60" y="70" fill="#4ecdc4" font-family="Consolas, monospace" font-size="9" text-anchor="middle">32 ch</text>
    </g>
    
    <text x="285" y="40" fill="#fff" font-size="18">→</text>
    
    <!-- Stage 3 (P3) -->
    <g transform="translate(300, 0)">
      <rect x="0" y="0" width="120" height="80" rx="8" fill="#ff6b6b"/>
      <text x="60" y="20" fill="#000" font-family="Consolas, monospace" font-size="11" text-anchor="middle" font-weight="bold">Stage 3 (P3)</text>
      <text x="60" y="40" fill="#000" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Conv + CSP</text>
      <text x="60" y="55" fill="#000" font-family="Consolas, monospace" font-size="9" text-anchor="middle">80x80</text>
      <text x="60" y="70" fill="#000" font-family="Consolas, monospace" font-size="9" text-anchor="middle">64 ch</text>
    </g>
    
    <text x="435" y="40" fill="#fff" font-size="18">→</text>
    
    <!-- Stage 4 (P4) -->
    <g transform="translate(450, 0)">
      <rect x="0" y="0" width="120" height="80" rx="8" fill="#ffd93d"/>
      <text x="60" y="20" fill="#000" font-family="Consolas, monospace" font-size="11" text-anchor="middle" font-weight="bold">Stage 4 (P4)</text>
      <text x="60" y="40" fill="#000" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Conv + CSP</text>
      <text x="60" y="55" fill="#000" font-family="Consolas, monospace" font-size="9" text-anchor="middle">40x40</text>
      <text x="60" y="70" fill="#000" font-family="Consolas, monospace" font-size="9" text-anchor="middle">128 ch</text>
    </g>
    
    <text x="585" y="40" fill="#fff" font-size="18">→</text>
    
    <!-- Stage 5 (P5) -->
    <g transform="translate(600, 0)">
      <rect x="0" y="0" width="120" height="80" rx="8" fill="#4ecdc4"/>
      <text x="60" y="20" fill="#000" font-family="Consolas, monospace" font-size="11" text-anchor="middle" font-weight="bold">Stage 5 (P5)</text>
      <text x="60" y="40" fill="#000" font-family="Consolas, monospace" font-size="9" text-anchor="middle">CSP + SPPF</text>
      <text x="60" y="55" fill="#000" font-family="Consolas, monospace" font-size="9" text-anchor="middle">20x20</text>
      <text x="60" y="70" fill="#000" font-family="Consolas, monospace" font-size="9" text-anchor="middle">256 ch</text>
    </g>
  </g>
  
  <!-- Output arrows -->
  <g transform="translate(50, 270)">
    <path d="M360,0 L360,40" stroke="#ff6b6b" stroke-width="2"/>
    <polygon points="355,40 360,55 365,40" fill="#ff6b6b"/>
    <text x="360" y="75" fill="#ff6b6b" font-family="Consolas, monospace" font-size="10" text-anchor="middle">P3 Output</text>
    
    <path d="M510,0 L510,40" stroke="#ffd93d" stroke-width="2"/>
    <polygon points="505,40 510,55 515,40" fill="#ffd93d"/>
    <text x="510" y="75" fill="#ffd93d" font-family="Consolas, monospace" font-size="10" text-anchor="middle">P4 Output</text>
    
    <path d="M660,0 L660,40" stroke="#4ecdc4" stroke-width="2"/>
    <polygon points="655,40 660,55 665,40" fill="#4ecdc4"/>
    <text x="660" y="75" fill="#4ecdc4" font-family="Consolas, monospace" font-size="10" text-anchor="middle">P5 Output</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(50, 370)">
    <rect x="0" y="0" width="700" height="60" rx="8" fill="#1a1a2e"/>
    <text x="350" y="20" fill="#fff" font-family="Consolas, monospace" font-size="12" text-anchor="middle" font-weight="bold">
      Backbone returns 3 feature maps: (P3, P4, P5) for multi-scale detection
    </text>
    <text x="350" y="45" fill="#888" font-family="Consolas, monospace" font-size="10" text-anchor="middle">
      P3: small objects (stride 8) | P4: medium objects (stride 16) | P5: large objects (stride 32)
    </text>
  </g>
</svg>

