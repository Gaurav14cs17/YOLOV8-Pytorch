<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350">
  <defs>
    <linearGradient id="bgHd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  <rect width="700" height="350" fill="url(#bgHd)"/>
  <text x="350" y="30" fill="#fff" font-family="Georgia, serif" font-size="20" text-anchor="middle" font-weight="bold">Decoupled Detection Head</text>
  
  <!-- Input -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="80" height="90" rx="4" fill="#4ecdc4"/>
    <text x="40" y="20" fill="#000" font-family="Consolas" font-size="9" text-anchor="middle">Feature</text>
    <text x="40" y="35" fill="#000" font-family="Consolas" font-size="9" text-anchor="middle">[B,C,H,W]</text>
    <text x="40" y="55" fill="#000" font-family="Consolas" font-size="8" text-anchor="middle">3 scales</text>
    <text x="40" y="70" fill="#000" font-family="Consolas" font-size="8" text-anchor="middle">from Neck</text>
  </g>
  
  <!-- Decoupled branches -->
  <g transform="translate(180, 50)">
    <!-- Bbox branch -->
    <rect x="0" y="0" width="200" height="55" rx="4" fill="#252547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="100" y="18" fill="#ff6b6b" font-family="Consolas" font-size="10" text-anchor="middle" font-weight="bold">Bbox Branch</text>
    <text x="100" y="35" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Conv3x3 → Conv3x3 → Conv1x1</text>
    <text x="100" y="48" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Output: 4*16 channels (DFL)</text>
    
    <!-- Cls branch -->
    <rect x="0" y="65" width="200" height="55" rx="4" fill="#252547" stroke="#4ecdc4" stroke-width="2"/>
    <text x="100" y="83" fill="#4ecdc4" font-family="Consolas" font-size="10" text-anchor="middle" font-weight="bold">Class Branch</text>
    <text x="100" y="100" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Conv3x3 → Conv3x3 → Conv1x1</text>
    <text x="100" y="113" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Output: num_classes channels</text>
  </g>
  
  <!-- DFL -->
  <g transform="translate(430, 50)">
    <rect x="0" y="0" width="200" height="120" rx="4" fill="#252547" stroke="#ffd93d" stroke-width="2"/>
    <text x="100" y="20" fill="#ffd93d" font-family="Consolas" font-size="10" text-anchor="middle" font-weight="bold">DFL Module</text>
    <text x="100" y="40" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Distribution Focal Loss</text>
    <text x="100" y="60" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">16 bins per edge</text>
    <text x="100" y="80" fill="#888" font-family="Consolas" font-size="8" text-anchor="middle">Softmax → Expected value</text>
    <text x="100" y="100" fill="#4ecdc4" font-family="Consolas" font-size="8" text-anchor="middle">Output: l, t, r, b distances</text>
  </g>
  
  <!-- Output -->
  <g transform="translate(50, 190)">
    <rect x="0" y="0" width="580" height="130" rx="8" fill="#1a1a2e"/>
    <text x="290" y="25" fill="#fff" font-family="Consolas" font-size="11" text-anchor="middle" font-weight="bold">Output Format</text>
    
    <text x="20" y="50" fill="#ff6b6b" font-family="Consolas" font-size="9">Training:</text>
    <text x="90" y="50" fill="#888" font-family="Consolas" font-size="9">[B, 4*16+nc, H, W] per scale - raw logits</text>
    
    <text x="20" y="75" fill="#4ecdc4" font-family="Consolas" font-size="9">Inference:</text>
    <text x="90" y="75" fill="#888" font-family="Consolas" font-size="9">[B, 4+nc, 8400] - decoded boxes + sigmoid scores</text>
    
    <text x="20" y="100" fill="#ffd93d" font-family="Consolas" font-size="9">Anchors:</text>
    <text x="90" y="100" fill="#888" font-family="Consolas" font-size="9">80*80 + 40*40 + 20*20 = 8400 predictions total</text>
    
    <text x="20" y="120" fill="#ccc" font-family="Consolas" font-size="8">Anchor-free: directly predict distances from grid cell center to box edges</text>
  </g>
</svg>

